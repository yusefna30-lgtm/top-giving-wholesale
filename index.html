<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 120px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .tab { padding: 8px 15px; background: #111; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #aaa; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 25px; padding: 20px; max-width: 450px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 20px; padding: 15px; text-align: center; }
        .slider-container { position: relative; height: 300px; overflow: hidden; border-radius: 15px; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #bfa030; border: none; width: 40px; height: 40px; cursor: pointer; font-size: 20px; z-index: 5; }
        .btn-add { background: #bfa030; color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0; }
        .btn-q { background: #222; border: 1px solid #444; color: #fff; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; }
        .model-num { color: #bfa030; font-weight: bold; margin: 5px 0; font-size: 14px; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #050505; padding: 15px; text-align: center; border-top: 1px solid #333; z-index: 100; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show('tshirts', this)">تيشيرتات</div>
        <div class="tab" onclick="show('sets', this)">أطقم</div>
        <div class="tab" onclick="show('shorts', this)">شورتات/بناطيل</div>
    </div>
</div>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card">
        <div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button><img src="smile-white.png" class="product-img active"><img src="smile-black.png" class="product-img"><img src="smile-olive.png" class="product-img"><img src="smile-beige.png" class="product-img"><button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button></div>
        <b>تيشيرت SMILE</b><div class="model-num">موديل: 08047</div>
        <div class="qty-control"><button class="btn-q" onclick="c(this, 16)">+</button><span class="qty" id="q1">16</span><button class="btn-q" onclick="c(this, -16)">-</button></div>
        <button class="btn-add" onclick="add('SMILE 08047', 'q1')">إضافة للطلب</button>
    </div>
    <div class="card">
        <div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button><img src="kenz-blue.png" class="product-img active"><img src="kenz-black.png" class="product-img"><img src="kenz-grey.png" class="product-img"><img src="kenz-sage.png" class="product-img"><button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button></div>
        <b>كينز بولو</b><div class="model-num">موديل: 08076</div>
        <div class="qty-control"><button class="btn-q" onclick="c(this, 16)">+</button><span class="qty" id="q2">16</span><button class="btn-q" onclick="c(this, -16)">-</button></div>
        <button class="btn-add" onclick="add('KENZ 08076', 'q2')">إضافة للطلب</button>
    </div>
</div></div>

<div id="sets" class="tab-content"><div class="grid">
    <div class="card">
        <div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button><img src="sea-black.png" class="product-img active"><img src="sea-navy.png" class="product-img"><img src="sea-red.png" class="product-img"><button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button></div>
        <b>طقم بحر</b><div class="model-num">موديل: SEA</div>
        <div class="qty-control"><button class="btn-q" onclick="c(this, 12)">+</button><span class="qty" id="q3">12</span><button class="btn-q" onclick="c(this, -12)">-</button></div>
        <button class="btn-add" onclick="add('SEA SET', 'q3')">إضافة للطلب</button>
    </div>
</div></div>

<div id="shorts" class="tab-content"><div class="grid">
    <div class="card">
        <div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button><img src="mps0033-black.png" class="product-img active"><img src="mps0033-green.png" class="product-img"><img src="mps0033-heavenly.png" class="product-img"><img src="mps0033-white.png" class="product-img"><button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button></div>
        <b>شورت MPS0033</b><div class="model-num">موديل: 0033</div>
        <div class="qty-control"><button class="btn-q" onclick="c(this, 20)">+</button><span class="qty" id="q4">20</span><button class="btn-q" onclick="c(this, -20)">-</button></div>
        <button class="btn-add" onclick="add('SHORT 0033', 'q4')">إضافة للطلب</button>
    </div>
</div></div>

<div class="cart-bar"><button class="btn-add" style="max-width:300px; margin-top:0" onclick="send()">إرسال الطلب للواتساب 📲</button></div>

<script>
    let myCart = {};
    function show(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function slide(btn, dir) {
        const cont = btn.parentElement; const imgs = cont.querySelectorAll('.product-img');
        let active = cont.querySelector('.product-img.active');
        let idx = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        idx = (idx + dir + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
    }
    function c(btn, val) {
        let span = btn.parentElement.querySelector('.qty');
        let n = parseInt(span.innerText) + val;
        if(n >= Math.abs(val)) span.innerText = n;
    }
    function add(name, id) { myCart[name] = document.getElementById(id).innerText; alert("تمت إضافة " + name); }
    function send() {
        let msg = "طلب جديد:\n";
        for(let item in myCart) { msg += item + ": " + myCart[item] + " قطعة\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
