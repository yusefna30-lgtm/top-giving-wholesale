<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #000; --card: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        
        /* تصميم الأقسام */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--gold); cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .product-img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; }
        .btn-add { background: var(--gold); border: none; padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 15px; text-align: center; border-top: 2px solid var(--gold); display: none; }
    </style>
</head>
<body>

<div class="tabs" id="tabs-container"></div>
<div class="grid" id="catalog"></div>

<div id="cart-bar">
    <h3 id="total-text"></h3>
    <button onclick="sendOrder()" style="background:green; color:white; border:none; padding:10px 20px; border-radius:8px;">إرسال الطلب عبر واتساب 💬</button>
</div>

<script>
    const products = [
        { name: 'تيشيرت 01', cat: 'تيشيرتات', img: 'n5-back.png.png' },
        { name: 'تيشيرت 02', cat: 'تيشيرتات', img: 't1-white.png' },
        { name: 'طقم 01', cat: 'أطقم', img: 's1-white.png.png' },
        { name: 'طقم 02', cat: 'أطقم', img: 's2-black.jpg' },
        { name: 'شورت 182', cat: 'شورتات', img: 'mps182-beige.png' }
        // أضف أي منتج جديد هنا مع تحديد الـ cat الخاصة به
    ];

    function renderCatalog(filter = 'الكل') {
        const container = document.getElementById('catalog');
        container.innerHTML = '';
        const filtered = (filter === 'الكل') ? products : products.filter(p => p.cat === filter);
        
        filtered.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.img}" class="product-img">
                    <p>${p.name}</p>
                    <button class="btn-add" onclick="addToCart('${p.name}')">إضافة للطلب</button>
                </div>
            `;
        });
    }

    function renderTabs() {
        const categories = ['الكل', 'تيشيرتات', 'أطقم', 'شورتات'];
        const container = document.getElementById('tabs-container');
        categories.forEach(cat => {
            container.innerHTML += `<button class="tab-btn" onclick="setActive(this, '${cat}')">${cat}</button>`;
        });
    }

    function setActive(el, cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderCatalog(cat);
    }

    let cart = [];
    function addToCart(name) {
        cart.push(name);
        document.getElementById('cart-bar').style.display = 'block';
        document.getElementById('total-text').innerText = `تم اختيار ${cart.length} منتج`;
    }

    function sendOrder() {
        let msg = "📦 طلب من TOP GIVING:\n" + cart.join("\n");
        window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
    }

    renderTabs();
    renderCatalog();
</script>
</body>
</html>
