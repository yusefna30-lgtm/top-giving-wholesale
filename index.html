<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 140px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #1a1a1a; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .tab { padding: 8px 15px; background: #0a0a0a; border: 1px solid #222; border-radius: 20px; cursor: pointer; color: #aaa; font-size: 13px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 16px; padding: 15px; text-align: center; }
        .slider-container { position: relative; height: 300px; overflow: hidden; border-radius: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #bfa030; border: none; width: 30px; height: 30px; cursor: pointer; }
        .arrow-btn.prev { left: 5px; } .arrow-btn.next { right: 5px; }
        .btn-q { background: none; border: 1px solid #333; color: #fff; width: 30px; height: 30px; cursor: pointer; }
        .btn-add { background: transparent; color: #bfa030; border: 1px solid #bfa030; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
        .cart-navbar { position: fixed; bottom: 0; width: 100%; background: #050505; padding: 15px; display: flex; justify-content: space-between; transform: translateY(100%); transition: 0.3s; }
        .cart-navbar.active { transform: translateY(0); }
        .badge { background: #bfa030; color: #000; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show(this, 'tshirts')">تيشيرتات</div>
        <div class="tab" onclick="show(this, 'sets')">أطقم صيفية</div>
        <div class="tab" onclick="show(this, 'others')">شورتات وبناطيل</div>
    </div>
</div>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card"><div class="slider-container"><img id="s1" src="smile-white.png" class="product-img" data-images='["smile-white.png", "smile-black.png"]' data-index="0"><button class="arrow-btn prev" onclick="slide('s1',-1)">‹</button><button class="arrow-btn next" onclick="slide('s1',1)">›</button></div><p>تيشيرت SMILE</p><button class="btn-add" onclick="add('SMILE', 's1')">إضافة</button></div>
    <div class="card"><div class="slider-container"><img id="s2" src="tshirt-gravity1.jpg" class="product-img" data-images='["tshirt-gravity1.jpg", "tshirt-gravity2.jpg"]' data-index="0"><button class="arrow-btn prev" onclick="slide('s2',-1)">‹</button><button class="arrow-btn next" onclick="slide('s2',1)">›</button></div><p>تيشيرت GRAVITY</p><button class="btn-add" onclick="add('GRAVITY', 's2')">إضافة</button></div>
</div></div>

<div id="sets" class="tab-content"><div class="grid">
    <div class="card"><div class="slider-container"><img id="s3" src="sea-black.png" class="product-img" data-images='["sea-black.png", "sea-navy.png"]' data-index="0"><button class="arrow-btn prev" onclick="slide('s3',-1)">‹</button><button class="arrow-btn next" onclick="slide('s3',1)">›</button></div><p>طقم بحر</p><button class="btn-add" onclick="add('SEA SET', 's3')">إضافة</button></div>
</div></div>

<div id="others" class="tab-content"><div class="grid">
    <div class="card"><div class="slider-container"><img id="s4" src="mps0033-black.png" class="product-img" data-images='["mps0033-black.png", "mps0033-white.png"]' data-index="0"><button class="arrow-btn prev" onclick="slide('s4',-1)">‹</button><button class="arrow-btn next" onclick="slide('s4',1)">›</button></div><p>شورت MPS0033</p><button class="btn-add" onclick="add('SHORT 0033', 's4')">إضافة</button></div>
</div></div>

<div id="cart-navbar" class="cart-navbar">
    <div>الطلبات: <span id="cart-count" class="badge">0</span></div>
    <button onclick="send()" style="background:#bfa030; border:none; padding:10px; border-radius:5px;">إرسال للواتساب 📲</button>
</div>

<script>
    let cart = {};
    function show(el, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function slide(id, dir) {
        const img = document.getElementById(id);
        const imgs = JSON.parse(img.dataset.images);
        let idx = (parseInt(img.dataset.index) + dir + imgs.length) % imgs.length;
        img.dataset.index = idx;
        img.src = imgs[idx];
    }
    function add(name, id) {
        cart[name] = 1;
        document.getElementById('cart-count').innerText = Object.keys(cart).length;
        document.getElementById('cart-navbar').classList.add('active');
    }
    function send() { window.open('https://wa.me/966560564719?text=' + encodeURIComponent(JSON.stringify(cart))); }
</script>
</body>
</html>
