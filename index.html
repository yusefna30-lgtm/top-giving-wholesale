<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 150px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .tab { padding: 8px 12px; background: #111; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #aaa; font-size: 13px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px; max-width: 600px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 15px; padding: 15px; text-align: center; }
        /* تكبير الصور لتناسب الجوال */
        .slider-container { position: relative; height: 350px; overflow: hidden; border-radius: 10px; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #bfa030; border: none; width: 40px; height: 40px; font-size: 24px; cursor: pointer; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .btn-q { background: #222; border: 1px solid #444; color: #fff; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 20px; }
        .btn-add { background: #bfa030; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cart-navbar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; box-sizing: border-box; display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show(this, 'tshirts')">تيشيرتات</div>
        <div class="tab" onclick="show(this, 'sets')">أطقم</div>
        <div class="tab" onclick="show(this, 'shorts')">شورتات</div>
    </div>
</div>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide('s1',-1)">‹</button>
            <img id="s1" src="smile-white.png" class="product-img" data-images='["smile-white.png", "smile-black.png", "smile-olive.png", "smile-beige.png"]' data-index="0">
            <button class="arrow-btn" style="right:0" onclick="slide('s1',1)">›</button>
        </div>
        <p>تيشيرت SMILE</p>
        <div class="qty-control">
            <button class="btn-q" onclick="changeQty('qt1', 1)">+</button>
            <span id="qt1">16</span>
            <button class="btn-q" onclick="changeQty('qt1', -1)">-</button>
        </div>
        <button class="btn-add" onclick="add('SMILE', 'qt1')">إضافة للطلب</button>
    </div>
</div></div>

<div id="cart" class="cart-navbar"><button class="btn-add" onclick="send()">إرسال الطلب للواتساب 📲</button></div>

<script>
    let cart = {};
    function show(el, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function slide(id, dir) {
        const img = document.getElementById(id);
        const imgs = JSON.parse(img.dataset.images);
        let idx = (parseInt(img.dataset.index) + dir + imgs.length) % imgs.length;
        img.dataset.index = idx;
        img.src = imgs[idx];
    }
    function changeQty(id, dir) {
        let span = document.getElementById(id);
        let val = parseInt(span.innerText) + (dir * 4); // الزيادة والنقصان
        if(val < 4) val = 4;
        span.innerText = val;
    }
    function add(name, qtyId) {
        cart[name] = document.getElementById(qtyId).innerText;
        document.getElementById('cart').style.display = 'block';
        alert("تم إضافة " + name);
    }
    function send() { window.open('https://wa.me/966560564719?text=' + encodeURIComponent(JSON.stringify(cart))); }
</script>
</body>
</html>
