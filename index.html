<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --beige: #f5f5dc; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; }
        
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 80px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .zoom-icon { position: absolute; bottom: 8px; left: 8px; cursor: pointer; z-index: 10; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 5px; }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; height: 30px; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); }
        
        .model-name { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: var(--gold); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #imgFull { max-width: 90%; max-height: 90%; border-radius: 12px; background: #fff; }

        .customer-inputs { display: none; background: #111; padding: 15px; border-top: 1px solid var(--accent); position: fixed; bottom: 80px; left: 0; right: 0; z-index: 999; }
        .input-group { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .back-to-top { position: fixed; bottom: 150px; right: 20px; background: var(--gold); color: #000; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 998; }
    </style>
</head>
<body onload="initApp()">

    <div id="btnTop" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⬆️</div>

    <script>
        // ... (نفس السكريبت الخاص بك مع إصلاح دالة التمرير)
        window.onscroll = function() {
            let btn = document.getElementById("btnTop");
            if (document.documentElement.scrollTop > 300) {
                btn.style.display = "flex";
            } else {
                btn.style.display = "none";
            }
        };
        // بقية الدوال الخاصة بك تعمل بشكل صحيح
    </script>
</body>
</html>
