<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        /* التنسيقات العامة للموقع */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 100px; /* مساحة بالأسفل لكي لا تغطي السلة المنتجات */
        }

        .header {
            text-align: center;
            padding: 20px;
            background-color: #000000;
            border-bottom: 1px solid #222;
        }

        .brand-logo {
            max-width: 150px;
            height: auto;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .tab {
            padding: 10px 20px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active, .tab:hover {
            background-color: #d4af37;
            color: #000;
            font-weight: bold;
        }

        /* شبكة المنتجات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كارت المنتج */
        .card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            display: none;
        }

        .card.show {
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px #d4af37;
            border-color: #d4af37;
        }

        /* حاوي السلايدر والصورة للكمبيوتر */
        .slider-container {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            border-radius: 10px;
            background-color: #000000;
            cursor: zoom-in; /* تلميح للزبون بإمكانية التكبير */
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.5s ease;
        }

        .card:hover .product-img {
            transform: scale(1.05);
        }

        /* 📱 تعديل خاص بالجوال لتصغير حجم الصور وتناسقها 📱 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
                padding: 20px 10px;
            }
            .slider-container {
                height: 200px;
            }
            .model-name {
                font-size: 15px;
                margin: 10px 0;
            }
            .btn-add {
                padding: 10px;
                font-size: 14px;
            }
        }

        /* أزرار الأسهم داخل السلايدر */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #d4af37;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .arrow-btn:hover {
            background: #d4af37;
            color: #000;
        }

        .arrow-btn.prev { left: 10px; }
        .arrow-btn.next { right: 10px; }

        .model-name {
            font-size: 18px;
            margin: 15px 0;
            font-weight: 500;
        }

        /* التحكم بالكميات وأزرار الإضافة */
        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            background-color: #0a0a0a;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .btn-q {
            background: none;
            border: 1px solid #d4af37;
            color: #d4af37;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-q:hover {
            background-color: #d4af37;
            color: #000;
        }

        .btn-add {
            background-color: #d4af37;
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-add:hover {
            background-color: #bfa030;
        }

        /* 🛒 تنسيقات سلة المشتريات الثابتة في الأسفل 🛒 */
        .cart-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #111111;
            border-top: 2px solid #d4af37;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .cart-icon {
            font-size: 24px;
            color: #d4af37;
        }

        .badge {
            background-color: #d4af37;
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-send-cart {
            background-color: #25d366; /* لون الواتساب الأخضر الفخم */
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .btn-send-cart:hover {
            background-color: #20ba5a;
        }

        /* 🔍 نافذة تكبير الصور (Zoom LightBox) 🔍 */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-lightbox:hover {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" onclick="filterProducts('set')">أطقم صيفية</div>

    <div class="grid">

        <div class="card tshirt show" data-images='["boxy-fashion1.png.png", "boxy-fashion2.png.png", "boxy-fashion3.png.png", "boxy-fashion4.png.png"]' data-index="0">
            <div class="slider-container" onclick="openLightbox(this)">
                <button class="arrow-btn prev" onclick="prevImg(this); event.stopPropagation();">‹</button>

        <div class="card tshirt show" data-images='["n5-back.png.png", "n5-purple.png.png", "n5-white.png.png", "n5-black.png.png"]' data-index="0">
            <div class="slider-container" onclick="openLightbox(this)">
                <button class="arrow-btn prev" onclick="prevImg(this); event.stopPropagation();">‹</button>

        </div>

        <div class="card tshirt show" data-images='["boxy-fashion2.png.png"]' data-index="0">
            <div class="slider-container" onclick="openLightbox(this)">
                <button class="arrow-btn prev" onclick="prevImg(this); event.stopPropagation();">‹</button>
                <img src="boxy-fashion2.png.png" class="product-img">
                <button class="arrow-btn next" onclick="nextImg(this); event.stopPropagation();">›</button>
            </div>
            <div class="model-name">تيشيرت 02</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt02', 16)">+</button>
                <span id="qt02">16</span>
                <button class="btn-q" onclick="c('qt02', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('تيشيرت 02','qt02')">إضافة للطلب</button>
        </div>

        <div class="card tshirt show" data-images='["boxy-fashion1.png.png"]' data-index="0">
            <div class="slider-container" onclick="openLightbox(this)">
                <button class="arrow-btn prev" onclick="prevImg(this); event.stopPropagation();">‹</button>
                <img src="boxy-fashion1.png.png" class="product-img">
                <button class="arrow-btn next" onclick="nextImg(this); event.stopPropagation();">›</button>
            </div>
            <div class="model-name">تيشيرت 03</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt03', 16)">+</button>
                <span id="qt03">16</span>
                <button class="btn-q" onclick="c('qt03', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('تيشيرت 03','qt03')">إضافة للطلب</button>
        </div>

    </div>

    <div class="cart-navbar">
        <div class="cart-info">
            <span class="cart-icon">🛒</span>
            <span>عدد الموديلات في السلة:</span>
            <span id="cart-count" class="badge">0</span>
        </div>
        <button class="btn-send-cart" onclick="sendOrderWhatsApp()">
            <span>إرسال الطلب عبر الواتساب</span>📲
        </button>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Zoomed Product">
    </div>

    <script>
        // مصفوفة لتخزين عناصر السلة
        let cart = {};

        function filterProducts(category) {
            const cards = document.querySelectorAll('.card');
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            cards.forEach(card => {
                if (card.classList.contains(category)) {
                    card.classList.add('show');
                } else {
                    card.classList.remove('show');
                }
            });
        }

        function prevImg(btn) {
            const card = btn.closest('.card');
            const images = JSON.parse(card.getAttribute('data-images'));
            let index = parseInt(card.getAttribute('data-index'));
            
            index = (index === 0) ? images.length - 1 : index - 1;
            card.setAttribute('data-index', index);
            card.querySelector('.product-img').src = images[index];
        }

        function nextImg(btn) {
            const card = btn.closest('.card');
            const images = JSON.parse(card.getAttribute('data-images'));
            let index = parseInt(card.getAttribute('data-index'));
            
            index = (index === images.length - 1) ? 0 : index + 1;
            card.setAttribute('data-index', index);
            card.querySelector('.product-img').src = images[index];
        }

        function c(id, amount) {
            const span = document.getElementById(id);
            let current = parseInt(span.innerText);
            current += amount;
            if (current < 16) current = 16;
            span.innerText = current;
        }

        // 🛒 نظام إضافة المنتجات وتحديث السلة 🛒
        function addToCart(name, id) {
            const qty = parseInt(document.getElementById(id).innerText);
            
            // إضافة المنتج أو تحديث الكمية إذا كان موجوداً مسبقاً
            cart[name] = qty;
            
            // تحديث العدد في الشريط السفلي بناءً على عدد الأنواع المضافة
            document.getElementById('cart-count').innerText = Object.keys(cart).length;
            
            alert(`تم إضافة ${qty} حبة من (${name}) إلى السلة بنجاح!`);
        }

        // 📲 إرسال كافة محتويات السلة بالواتساب دفعة واحدة 📲
        function sendOrderWhatsApp() {
            if (Object.keys(cart).length === 0) {
                alert("السلة فارغة حالياً. يرجى إضافة منتجات أولاً!");
                return;
            }

            const phoneNumber = "966560564719"; 
            let message = `مرحباً براند TOP GIVING، أرغب في تقديم طلبية جديدة:\n\n`;
            let totalItems = 0;

            // كشف بجميع المنتجات المضافة في السلة
            for (const [name, qty] of Object.entries(cart)) {
                message += `📦 *المنتج:* ${name}\n🔢 *الكمية:* ${qty} حبة\n-------------------------\n`;
                totalItems += qty;
            }

            message += `\n📊 *إجمالي القطع المضافة
