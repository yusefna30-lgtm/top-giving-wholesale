<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.4); --black: #000; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; direction: rtl; }
        
        .brand { font-size: 2.8rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 10px var(--gold-glow); }

        .main-section-header {
            background: linear-gradient(to right, transparent, #4a3a1d, var(--gold), #4a3a1d, transparent);
            padding: 15px; font-size: 1.6rem; font-weight: 900; color: #000; margin: 30px 0;
            border-top: 1px solid #f1d38e; border-bottom: 1px solid #f1d38e;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* تأثير الزوم والتوهج الذهبي عند التمرير */
        .card { 
            background: #0c0c0e; padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; 
            display: flex; flex-direction: column; transition: all 0.3s ease-in-out; 
            position: relative; overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-5px) scale(1.02);
            border-color: var(--gold); 
            box-shadow: 0 10px 25px var(--gold-glow);
        }

        .img-box { width: 100%; height: 210px; border-radius: 10px; overflow: hidden; background: #111; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .product-img { transform: scale(1.1); } /* زوم للصورة */
        
        /* دوائر الألوان الأربعة */
        .color-dots { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #fff; cursor: pointer; transition: 0.3s; }
        .dot:hover { transform: scale(1.4); box-shadow: 0 0 8px #fff; }

        .model-name { font-size: 0.95rem; font-weight: bold; margin: 5px 0; color: #fff; }
        .packing-info { font-size: 0.8rem; color: var(--gold); margin-bottom: 12px; font-weight: bold; }

        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 6px; border-radius: 8px; border: 1px solid #333; }
        .btn-q { background: #333; color: #fff; border: none; width: 34px; height: 34px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.3rem; }
        .btn-q:hover { background: var(--gold); color: #000; }
        .q-val { font-weight: bold; color: var(--gold); min-width: 35px; font-size: 1.2rem; }

        .btn-add { 
            background: linear-gradient(to bottom, #e2c06d, #8a6d3b); 
            color: #000; padding: 12px; border-radius: 10px; 
            font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 1rem;
            transition: 0.3s;
        }
        .btn-add:hover { filter: brightness(1.2); }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.96); border-top: 2px solid var(--gold); padding: 20px; z-index: 1000; display: none; backdrop-filter: blur(10px); }
