<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 140px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background-color: #000000;
            border-bottom: 1px solid #1a1a1a;
        }

        .brand-logo {
            max-width: 160px;
            height: auto;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .tab {
            padding: 10px 25px;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 25px;
            color: #aaaaaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab.active, .tab:hover {
            background-color: #bfa030;
            color: #000000;
            font-weight: bold;
            border-color: #bfa030;
            box-shadow: 0 0 15px rgba(191, 160, 48, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: #0a0a0a;
            border: 1px solid #151515;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #bfa030;
            box-shadow: 0 15px 35px rgba(191, 160, 48, 0.15);
        }

        .product-img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #050505;
        }

        .model-name {
            font-size: 16px;
            margin: 15px 0 10px 0;
            font-weight: 600;
            color: #ffffff;
        }

        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            background-color: #020202;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #111111;
        }

        .btn-q {
            background: none;
            border: 1px solid #333333;
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-q:hover {
            border-color: #bfa030;
            color: #bfa030;
        }

        .qty-num {
            font-size: 16px;
            font-weight: bold;
            min-width: 30px;
            color: #bfa030;
        }

        .btn-add {
            background-color: transparent;
            color: #bfa030;
            border: 1px solid #bfa030;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background-color: #bfa030;
            color: #000000;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
                padding: 15px 10px;
            }
            .card { padding: 10px; border-radius: 12px; }
            .product-img { height: 195px; }
            .model-name { font-size: 13px; margin: 10px 0 6px 0; }
            .qty-control { gap: 10px; padding: 6px; }
            .btn-q { width: 26px; height: 26px; font-size: 14px; }
            .qty-num { font-size: 13px; }
            .btn-add { padding: 8px; font-size: 12px; }
        }

        .cart-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #050505;
            border-top: 1px solid #222222;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transform: translateY(120px);
            transition: transform 0.4s ease;
        }

        .cart-navbar.active {
            transform: translateY(0);
        }

        .badge {
            background-color: #bfa030;
            color: #000000;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn-send-cart {
            background-color: #bfa030;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active">تيشيرتات</div>
            <div class="tab">أطقم صيفية</div>
            <div class="tab">شورتات</div>
        </div>
    </div>

    <div class="grid">

        <div class="card">
            <img src="smile-white.png" class="product-img">
            <div class="model-name">تيشيرت SMILE أبيض</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_sm_w', 16)">+</button>
                <span id="qt_sm_w" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_sm_w', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('SMILE أبيض','qt_sm_w')">إضافة للطلب</button>
        </div>

        <div class="card">
            <img src="smile-black.png" class="product-img">
            <div class="model-name">تيشيرت SMILE أسود</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_sm_b', 16)">+</button>
                <span id="qt_sm_b" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_sm_b', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('SMILE أسود','qt_sm_b')">إضافة للطلب</button>
        </div>

        <div class="card">
            <img src="smile-olive.png" class="product-img">
            <div class="model-name">تيشيرت SMILE زيتي</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_sm_o', 16)">+</button>
                <span id="qt_sm_o" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_sm_o', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('SMILE زيتي','qt_sm_o')">إضافة للطلب</button>
        </div>

        <div class="card">
            <img src="smile-beige.png" class="product-img">
            <div class="model-name">تيشيرت SMILE بيج</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_sm_bg', 16)">+</button>
                <span id="qt_sm_bg" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_sm_bg', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('SMILE بيج','qt_sm_bg')">إضافة للطلب</button>
        </div>


        <div class="card">
            <img src="Picsart_26-06-24_10-00-55-685.jpg" class="product-img">
            <div class="model-name">كينز بولو | أزرق ملكي</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_kp_bl', 16)">+</button>
                <span id="qt_kp_bl" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_kp_bl', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('كينز بولو أزرق','qt_kp_bl')">إضافة للطلب</button>
        </div>

        <div class="card">
            <img src="Picsart_26-06-24_10-01-17-884.jpg" class="product-img">
            <div class="model-name">كينز بولو | رمادي فاتح</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_kp_gr', 16)">+</button>
                <span id="qt_kp_gr" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_kp_gr', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('كينز بولو رمادي','qt_kp_gr')">إضافة للطلب</button>
        </div>

        <div class="card">
            <img src="Picsart_26-06-24_10-01-39-351.jpg" class="product-img">
            <div class="model-name">كينز بولو | كحلي غامق</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_kp_nv', 16)">+</button>
                <span id="qt_kp_nv" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_kp_nv', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('كينز بولو كحلي','qt_kp_nv')">إضافة للطلب</button>
        </div>

        <div class="card">
            <img src="Picsart_26-06-24_10-02-02-733.jpg" class="product-img">
            <div class="model-name">كينز بولو | زيتي/رمادي مخضر</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_kp_sg', 16)">+</button>
                <span id="qt_kp_sg" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_kp_sg', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('كينز بولو زيتي','qt_kp_sg')">إضافة للطلب</button>
        </div>

    </div>

    <div id="cart-navbar" class="cart-navbar">
        <div style="font-size: 15px; color: #cccccc;">
            <span>الموديلات المضافة:</span>
            <span id="cart-count" class="badge">0</span>
        </div>
        <button class="btn-send-cart" onclick="sendOrderWhatsApp()">إرسال الطلب بالكامل 📲</button>
    </div>

    <script>
        let cart = {};

        function c(id, amount) {
            const span = document.getElementById(id);
            let current = parseInt(span.innerText);
            current += amount;
            if (current < 16) current = 16; 
            span.innerText = current;
        }

        function addToCart(name, id) {
            const qty = parseInt(document.getElementById(id).innerText);
            cart[name] = qty;
            
            const modelsCount = Object.keys(cart).length;
            document.getElementById('cart-count').innerText = modelsCount;
            
            if(modelsCount > 0) {
                document.getElementById('cart-navbar').classList.add('active');
            }
            alert(`تم إضافة ${qty} حبة من (${name}) إلى الطلب.`);
        }

        function sendOrderWhatsApp() {
            if (Object.keys(cart).length === 0) return;
            const phoneNumber = "966560564719"; 
            let message = `مرحباً براند TOP GIVING، أرغب في تأكيد طلبية جملة:\n\n`;
            let totalItems = 0;

            for (const [name, qty] of Object.entries(cart)) {
                message += `📦 *المنتج:* ${name} -> *الكمية:* ${qty} حبة\n`;
                totalItems += qty;
            }
            message += `\n📊 *إجمالي القطع:* ${totalItems} حبة`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
