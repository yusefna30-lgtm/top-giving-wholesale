<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; }
        .tab { padding: 8px 15px; background: #1a1a1a; border: 1px solid #333; cursor: pointer; border-radius: 5px; color: #888; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; border-color: #bfa030; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* تصميم الكرت مطابق للصورة */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: #0a0a0a; border-radius: 15px; padding: 15px; width: 300px; text-align: center; border: 1px solid #1a1a1a; }
        .img-box { position: relative; height: 350px; overflow: hidden; border-radius: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        .btn-arrow { position: absolute; top: 50%; background: rgba(0,0,0,0.5); color: #bfa030; border: none; padding: 10px; cursor: pointer; }
        
        .title { margin: 15px 0 5px 0; font-size: 18px; }
        .model { color: #bfa030; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: #bfa030; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="show('tshirts', this)">التيشيرتات</div>
    <div class="tab" onclick="show('sets', this)">الأطقم</div>
</div>

<div id="tshirts" class="tab-content active">
    <div class="grid">
        <div class="card">
            <div class="img-box">
                <button class="btn-arrow" style="left:0" onclick="move(this, -1)">‹</button>
                <img src="smile-white.png" class="product-img active">
                <img src="smile-black.png" class="product-img">
                <button class="btn-arrow" style="right:0" onclick="move(this, 1)">›</button>
            </div>
            <div class="title">تيشيرت SMILE</div>
            <div class="model">موديل: 08047</div>
            <button class="btn-add">إضافة للطلب</button>
        </div>
    </div>
</div>

<div id="sets" class="tab-content">
    <div class="grid">
        </div>
</div>

<script>
    function show(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function move(btn, dir) {
        const box = btn.parentElement;
        const imgs = box.querySelectorAll('.product-img');
        let active = box.querySelector('.product-img.active');
        let i = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        i = (i + dir + imgs.length) % imgs.length;
        imgs[i].classList.add('active');
    }
</script>
</body>
</html>
