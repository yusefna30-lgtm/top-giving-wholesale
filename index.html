<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | متجر الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab { background: #111; color: #fff; padding: 8px 25px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 170px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 95%; max-height: 95%; object-fit: contain; transform: scale(1.1); transition: 0.4s; }
        .product-img:hover { transform: scale(1.25); } /* تأثير الزوم [cite: 156, 334] */
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; min-height: 25px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.1); }
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 5, 5, 0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt"><div class="img-box"><img src="n5-back.png.png" id="p-t1" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('p-t1','n5-back.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('p-t1','n5-purple.png.png',this)"></div><div class="dot" style="background:#fff" onclick="v('p-t1','n5-white.png.png',this)"></div></div><div class="model-name">تيشيرت 01</div><div class="qty-control"><button class="btn-q" onclick="c('q-t1',16)">+</button><span id="q-t1">16</span><button class="btn-q" onclick="c('q-t1',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 01','q-t1',this)">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="sea-black.png" id="p-sea" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('p-sea','sea-black.png',this)"></div><div class="dot" style="background:red" onclick="v('p-sea','sea-red.png',this)"></div><div class="dot" style="background:navy" onclick="v('p-sea','sea-navy.png',this)"></div></div><div class="model-name">طقم شورت Sea</div><div class="qty-control"><button class="btn-q" onclick="c('q-sea',12)">+</button><span id="q-sea">12</span><button class="btn-q" onclick="c('q-sea',-12)">-</button></div><button class="btn-add" onclick="add('طقم Sea','q-sea',this)">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="sea1-off-withe.png" id="p-sea2" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#f5f5f5" onclick="v('p-sea2','sea1-off-withe.png',this)"></div><div class="dot" style="background:#000" onclick="v('p-sea2','sea1-black.png',this)"></div><div class="dot" style="background:navy" onclick="v('p-sea2','sea1-navy.png',this)"></div></div><div class="model-name">طقم شورت Sea 02</div><div class="qty-control"><button class="btn-q" onclick="c('q-sea2',12)">+</button><span id="q-sea2">12</span><button class="btn-q" onclick="c('q-sea2',-12)">-</button></div><button class="btn-add" onclick="add('طقم Sea 02','q-sea2',this)">إضافة</button></div>
    </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><div id="cart-info" style="color:var(--gold); font-weight:900;">الإجمالي: 0 حبة</div><button class="btn-add" style="width:auto; padding:10px 20px;" onclick="send()">إرسال ✅</button></div></div>

    <script>
        let order = [];
        function filterProducts(cat) {
            let cards = document.querySelectorAll('.card');
            cards.forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; let dots = el.parentElement.querySelectorAll('.dot'); dots.forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function c(id, val) { 
            let el = document.getElementById(id); 
            let curr = parseInt(el.innerText); 
            let min = (id.includes('sea')) ? 12 : 16; /* نظام الشد الذكي [cite: 783] */
            if (curr + val >= min) el.innerText = curr + val; 
        }
        function add(name, qtyId, btn) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`;
            btn.innerText = "تمت الإضافة ✅"; /* تأكيد الإضافة [cite: 707] */
        }
        function send() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank'); /* ربط واتساب [cite: 784] */
        }
    </script>
</body>
</html>
