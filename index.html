<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Models 01 & 02</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); transition: 0.3s; }
        
        .img-box { 
            width: 100%; height: 250px; border-radius: 15px; overflow: hidden; 
            background: #fff; margin-bottom: 15px; display: flex; 
            align-items: center; justify-content: center;
            border: 2px solid transparent; transition: 0.4s;
        }
        .product-img { max-width: 85%; max-height: 85%; object-fit: contain; transition: 0.5s; }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 20px 5px rgba(212, 175, 55, 0.4); }
        .card:hover .product-img { transform: scale(1.1); }

        .color-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 8px var(--gold); }

        .qty-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; background: #151515; padding: 10px; border-radius: 12px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 1.5rem; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 40px; font-size: 1.3rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 15px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <div class="img-box">
                <img src="n5-back.png.png" id="img-01" class="product-img">
            </div>
            <div class="color-dots">
                <div class="dot active" style="background: #e0e0e0;" onclick="v('01', 'n5-back.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('01', 'n5-purple.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('01', 'n5-black.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('01', 'n5-white.png.png', this)"></div>
            </div>
            <div class="model-name">تيشيرت موديل 01</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-01', 16)">+</button>
                <span id="q-01" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-01', -16)">-</button>
            </div>
            <button class="btn-add">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="t1-white.png" id="img-02" class="product-img">
            </div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="v('02', 't1-white.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('02', 't1-black.png', this)"></div>
                <div class="dot" style="background: blue;" onclick="v('02', 't1-blue.png', this)"></div>
                <div class="dot" style="background: gold;" onclick="v('02', 't1-yellow.png', this)"></div>
            </div>
            <div class="model-name">تيشيرت موديل 02</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-02', 16)">+</button>
                <span id="q-02" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-02', -16)">-</button>
            </div>
            <button class="btn-add">إضافة للطلب</button>
        </div>
    </div>

    <script>
        function v(id, path, el) {
            document.getElementById('img-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }
        function c(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }
    </script>
</body>
</html>
