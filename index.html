<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Official Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        /* رأس الصفحة - Brand Header */
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1001; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: #111; color: #777; padding: 6px 15px; border-radius: 20px; border: 1px solid #222; font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }

        /* شبكة المنتجات */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 15px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); transition: 0.3s; }
        
        /* إطار الصورة الموزون لمنع الفراغات */
        .img-box { 
            width: 100%; height: 165px; border-radius: 12px; overflow: hidden; background: #fff; 
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
            border: 1.5px solid transparent; transition: 0.4s;
        }
        @media (min-width: 992px) { .img-box { height: 210px; } }

        /* تكبير المودل لملء الفراغ الأبيض */
        .product-img { 
            max-width: 92%; max-height: 92%; object-fit: contain; 
            transform: scale(1.15); transition: 0.5s; 
        }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .card:hover .product-img { transform: scale(1.3); }

        /* الألوان والأزرار */
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); }
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: #eee; }
