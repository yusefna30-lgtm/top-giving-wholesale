<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Giving Wholesale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Top Giving">
        </div>
        <nav class="categories">
            <button class="cat-btn">شورتات</button>
            <button class="cat-btn">أطقم صيفية</button>
            <button class="cat-btn active">تيشيرتات</button>
        </nav>
    </header>

    <main class="grid">
        <!-- المنتج الأول -->
        <div class="card tshirt show" data-images="smile-beige.png,smile-black.png,smile-olive.png,smile-white.png" data-index="0">
            <div class="img-box">
                <span class="arrow arrow-right" onclick="navImg(this, 1)">&gt;</span>
                <img src="smile-beige.png" id="it08003" class="product-img">
                <span class="arrow arrow-left" onclick="navImg(this, -1)">&lt;</span>
            </div>
            <div class="model-info">
                <div class="item-cat">الصنف: تيشيرت بوكس</div>
                <div class="item-mod">موديل: 08095</div>
            </div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt012', 1)">+</button>
                <span id="qt012">16</span>
                <button class="btn-add" onclick="add('01', 'تيشيرت', 'qt012', this)">إضافة للطلب</button>
            </div>
        </div>

        <!-- المنتج الثاني -->
        <div class="card tshirt show" data-images="tshirt-gravity1.jpg,tshirt-gravity2.jpg,tshirt-gravity3.jpg,tshirt-gravity4.jpg" data-index="0">
            <div class="img-box">
                <span class="arrow arrow-right" onclick="navImg(this, 1)">&gt;</span>
                <img src="tshirt-gravity1.jpg" id="it08000" class="product-img">
                <span class="arrow arrow-left" onclick="navImg(this, -1)">&lt;</span>
            </div>
            <div class="model-info">
                <div class="item-cat">الصنف: تيشيرت بوكس</div>
                <div class="item-mod">موديل: 08086</div>
            </div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt010', 1)">+</button>
                <span id="qt010">16</span>
                <button class="btn-add" onclick="add('01', 'تيشيرت', 'qt010', this)">إضافة للطلب</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
