<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* إعداد المتغيرات البرمجية للألوان */
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e; 
            --accent: #1a1a1a; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--black); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 120px; 
        }
        
        .brand { 
            font-size: 2.5rem; 
            color: var(--gold); 
            margin: 30px 0; 
            font-weight: 900; 
            letter-spacing: 4px; 
        }

        /* تصميم الفواصل الذهبية الأنيقة */
        .section-header { 
            margin: 50px 0 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .section-header::before, .section-header::after { 
            content: ""; 
            height: 2px; 
            width: 60px; 
            background: var(--gold); 
            margin: 0 15px; 
            border-radius: 2px; 
        }
        .section-title { 
            color: var(--gold); 
            font-size: 1.4rem; 
            font-weight: 700; 
        }

        /* شبكة العرض المرنة المتجاوبة للجوال والكمبيوتر */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 15px; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid var(--accent); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            transition: 0.3s; 
        }
        
        .img-box { 
            width: 100%; 
            height: 230px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 15px; 
        }
        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .color-dots { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .dot { 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            border: 2px solid #333; 
            cursor: pointer; 
        }
        .dot.active { 
            border-color: var(--gold); 
            transform: scale(1.1); 
            box-shadow: 0 0 8px var(--gold); 
        }
        
        .model-name { 
            font-size: 1rem; 
            margin-bottom: 12px; 
            font-weight: 700; 
            color: #eee; 
        }
        
        .qty-control { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            background: #151515; 
            padding: 8px; 
            border-radius: 12px; 
        }
        .btn-q { 
            background: #252525; 
            color: #fff; 
            border: none; 
            width: 35px; 
            height: 35px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.2rem; 
        }
        .q-val { 
            color: var(--gold); 
            font-weight: 900; 
            min-width: 35px; 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #D4AF37, #8A6D3B); 
            color: #000; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 900; 
            border: none; 
            width: 100%; 
            font-size: 0.9rem; 
            cursor: pointer; 
        }
        
        .cart-bar { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(10, 10, 10, 0.95); 
            border-top: 1px solid var(--gold); 
            padding: 20px; 
            display: none; 
            z-index: 1000; 
        }

        /* شاشات الكمبيوتر والأجهزة الكبيرة */
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(3, 1fr); gap: 25px; } 
            .img-box { height: 380px; } 
        }
    </style>
</head>

    <!-- شريط تجميع وإرسال الطلبات السفلي -->
    <div id="cart-bar" class="cart-bar">
        <button class="btn-add" style="width:auto; padding:12px 60px; background:#fff;" onclick="sendWA()">إرسال الطلب عبر واتساب</button>
    </div>

    <script>
        let items = [];
        let selColors = { '01':'أبيض', '02':'بنفسجي', '03':'أبيض', '04':'أحمر', '05':'أبيض', '06':'رصاصي', 'p1':'رصاصي غامق', 'p2':'أسود', 's1':'أبيض' };

        // وظيفة تحديث مسار الصورة التفاعلية وإدارة النقاط النشطة
        function update(id, src, c, el) {
            document.getElementById('img-' + id).src = src;
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selColors[id] = c;
        }

        // التحكم في عداد الكميات بناءً على نوع المنتج (تيشيرتات مضاعفات 16، بناطيل وأطقم مضاعفات 12)
        function chg(id, v) {
            let q = document.getElementById(id);
            let res = parseInt(q.innerText) + v;
            let min = (id.startsWith('q0') || id === 'q01' || id === 'q02' || id === 'q03' || id === 'q04' || id === 'q05' || id === 'q06') ? 16 : 12;
            if(res < min) res = min;
            q.innerText = res;
        }

        // تجميع المنتجات المختارة وضخها داخل السلة المنبثقة
        function buy(id, name) {
            let qId = (id === '01' || id === '02' || id === '03' || id === '04' || id === '05' || id === '06') ? 'q' + id : 'q' + id;
            let qVal = document.getElementById(qId).innerText;
            items.push(`${name} (${selColors[id]}) - كمية: ${qVal}`);
            document.getElementById('cart-bar').style.display = 'block';
            alert('تمت إضافة ' + name + ' بنجاح');
        }

        // تشفير بيانات السلة والتوجيه التام إلى حساب الواتساب
        function sendWA() {
            let msg = encodeURIComponent("طلب جملة جديد من TOP GIVING:\n" + items.join("\n"));
            window.location.href = "https://wa.me/966560564719?text=" + msg;
        }
    </script>
