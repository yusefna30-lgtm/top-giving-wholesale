<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #222; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 80px; width: auto; margin-bottom: 15px; filter: drop-shadow(0 0 8px var(--gold)); }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 50px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }
        .back-to-top { position: fixed; bottom: 100px; right: 20px; background: var(--gold); color: #000; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 998; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show"><div class="img-box"><img src="n5-back.png.png" class="product-img"></div><div>تيشيرت 01</div></div>
        <div class="card tshirt show"><div class="img-box"><img src="t1-white.png" class="product-img"></div><div>تيشيرت 02</div></div>
        <div class="card tshirt show"><div class="img-box"><img src="t2-black.png.png" class="product-img"></div><div>تيشيرت 03</div></div>
        <div class="card tshirt show"><div class="img-box"><img src="tr1-red.png.png" class="product-img"></div><div>تيشيرت 04</div></div>
        <div class="card tshirt show"><div class="img-box"><img src="te1-black.png.png" class="product-img"></div><div>تيشيرت 05</div></div>

        <div class="card set"><div class="img-box"><img src="s1-white.png.png" class="product-img"></div><div>طقم 01</div></div>
        <div class="card set"><div class="img-box"><img src="s2-black.jpg" class="product-img"></div><div>طقم 02</div></div>
        <div class="card set"><div class="img-box"><img src="s3-black.jpg" class="product-img"></div><div>طقم 03</div></div>
        <div class="card set"><div class="img-box"><img src="s4-black.jpg" class="product-img"></div><div>طقم 04</div></div>
        <div class="card set"><div class="img-box"><img src="s5-black.jpg" class="product-img"></div><div>طقم 05</div></div>
        <div class="card set"><div class="img-box"><img src="sea-black.png" class="product-img"></div><div>طقم Sea 01</div></div>
        <div class="card set"><div class="img-box"><img src="sea1-off-withe.png" class="product-img"></div><div>طقم Sea 02</div></div>
        <div class="card set"><div class="img-box"><img src="sea2-brown.png" class="product-img"></div><div>طقم Sea 03</div></div>

        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" class="product-img"></div><div>شورت 182</div></div>
        <div class="card pants"><div class="img-box"><img src="mps185-grey.png" class="product-img"></div><div>شورت 185</div></div>
        <div class="card pants"><div class="img-box"><img src="mps0033-heavenly.png" class="product-img"></div><div>شورت 0033</div></div>
        <div class="card pants"><div class="img-box"><img src="mps176-white.png" class="product-img"></div><div>شورت 176</div></div>
    </div>

    <div id="back-to-top" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⬆️</div>

    <script>
        window.onscroll = function() {
            document.getElementById("back-to-top").style.display = (window.scrollY > 300) ? "flex" : "none";
        };
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { 
                c.style.display = c.classList.contains(cat) ? 'flex' : 'none'; 
            });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
    </script>
</body>
</html>
