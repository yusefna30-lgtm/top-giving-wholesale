<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold-main: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.5); --black: #000; --card-bg: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; direction: rtl; }
        .brand { font-size: 3rem; color: var(--gold-main); margin: 35px 0; font-weight: 900; letter-spacing: 5px; }

        .main-section-header {
            background: linear-gradient(to right, transparent, #4a3a1d, var(--gold-main), #4a3a1d, transparent);
            padding: 15px; font-size: 1.7rem; font-weight: 900; color: #000; margin: 30px 0;
            border-top: 1px solid var(--gold-main); border-bottom: 1px solid var(--gold-main);
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* تأثير التوهج والزوم الفخم */
        .card { 
            background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-10px) scale(1.03); 
            border-color: var(--gold-main); 
            box-shadow: 0 0 25px var(--gold-glow); 
        }

        .img-box { width: 100%; height: 210px; border-radius: 10px; overflow: hidden; background: #111; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .product-img { transform: scale(1.15); } /* زوم إضافي للصورة */
        
        .color-dots { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #fff; transition: 0.3s; }
        .dot:hover { transform: scale(1.3); }

        .model-name { font-size: 1rem; font-weight: bold; margin: 10px 0; color: #fff; }
        .packing-info { font-size: 0.85rem; color: var(--gold-main); margin-bottom: 12px; font-weight: bold; }

        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #000; padding: 7px; border-radius: 8px; border: 1px solid #333; }
        .btn-q { background: #222; color: #fff; border: none; width: 35px; height: 35px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.3rem; }
        .btn-q:hover { background: var(--gold-main); color: #000; }
        .q-val { font-weight: bold; color: var(--gold-main); min-width: 35px; font-size: 1.3rem; }

        .btn-add { 
            background: linear-gradient(to bottom, #f1d38e, #8a6d3b); 
            color: #000; padding: 12px; border-radius: 10px; 
            font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s;
        }
        .btn-add:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold-main); padding: 18px; z-index: 1000; display: none; backdrop-filter: blur(10px); }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 320px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="main-section-header">القسم الرجالي</div>

    <div class="grid">
        <div class="card">
            <div class="model-name">تيشيرت موديل 01</div>

            <div class="qty-control"><button class="btn-q" onclick="chg('t1',-16,16)">-</button><span id="t1" class="q-val">16</span><button class="btn-q" onclick="chg('t1',16,16)">+</button></div>
            <button class="btn-add" onclick="buy('موديل 01','t1')">إضافة للطلب</button>
        </div>

        <div class="card">

            <div class="color-dots">
                <div class="dot" style="background: maroon;"></div>

                <div class="dot" style="background: #333;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة</div>
            <div class="qty-control"><button class="btn-q" onclick="chg('t2',-16,16)">-</button><span id="t2" class="q-val">16</span><button class="btn-q" onclick="chg('t2',16,16)">+</button></div>
            <button class="btn-add" onclick="buy('موديل 02','t2')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-name">تيشيرت موديل 03</div>
            <div class="img-box"><img src="tshert-oversize13.png" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: navy;"></div>
                <div class="dot" style="background: white;"></div>
                <div class="dot" style="background: black;"></div>
                <div class="dot" style="background: grey;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة</div>
            <div class="qty-control"><button class="btn-q" onclick="chg('t3',-16,16)">-</button><span id="t3" class="q-val">16</span><button class="btn-q" onclick="chg('t3',16,16)">+</button></div>
            <button class="btn-add" onclick="buy('موديل 03','t3')">إضافة للطلب</button>
        </div>

                <div class="dot" style="background: navy;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة</div>
            <div class="qty-control"><button class="btn-q" onclick="chg('t4',-16,16)">-</button><span id="t4" class="q-val">16</span><button class="btn-q" onclick="chg('t4',16,16)">+</button></div>
            <button class="btn-add" onclick="buy('موديل 04','t4')">إضافة للطلب</button>
        </div>

            <div class="color-dots">

                <div class="dot" style="background: #000;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة</div>
            <div class="qty-control"><button class="btn-q" onclick="chg('t5',-16,16)">-</button><span id="t5" class="q-val">16</span><button class="btn-q" onclick="chg('t5',16,16)">+</button></div>
            <button class="btn-add" onclick="buy('موديل 05','t5')">إضافة للطلب</button>
        </div>
    </div>

    <div id="cart-bar" class="cart-bar">
        <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center;">
            <div style="color:var(--gold-main); font-weight:bold;">الأصناف: <span id="c-count" style="font-size:1.5rem;">0</span></div>
            <button class="btn-add" style="width:auto; padding:10px 40px; background:#fff; color:#000;" onclick="sendWA()">إرسال طلب TOP GIVING</button>
        </div>
    </div>

    <script>
        let items = [];
        function chg(id, s, m) {
            let e = document.getElementById(id);
            let v = parseInt(e.innerText) + s;
            if (v < m) v = m;
            e.innerText = v;
        }
        function buy(n, qId) {
            let q = document.getElementById(qId).innerText;
            items.push(`*${n}* ← ${q} حبة`);
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('c-count').innerText = items.length;
            alert('تمت إضافة ' + n);
        }
        function sendWA() {
            let msg = "طلب جملة جديد:\n\n" + items.join("\n");
            window.location.href = `https://wa.me/966560564719?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
