<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر الجملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Cairo', sans-serif; padding: 20px; margin: 0; }
        
        /* تنسيق الشعار */
        .logo-box { text-align: center; margin-bottom: 20px; }
        .logo-box img { max-width: 180px; height: auto; border-radius: 10px; border: 2px solid #D4AF37; }

        /* شريط التنقل */
        .nav { position: sticky; top: 0; z-index: 1000; background: #000; padding: 15px; text-align: center; border-bottom: 2px solid #D4AF37; margin-bottom: 30px; }
        .nav a { color: #D4AF37; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* الكارد والأزرار */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .main-img { width: 100%; height: 220px; object-fit: contain; background: #fff; border-radius: 10px; }
        
        /* الأزرار الموحدة (هنا سر التناسق) */
        .btn-style { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: block; box-sizing: border-box; }
        .details-btn { background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37; color: #D4AF37; }
        .order-btn { background: #25D366; color: #000; }
        .pack-qty { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="TOP GIVING logo.jpg" alt="Logo">
    </div>

    <nav class="nav">
        <a href="#tshirts">تيشرتات</a>
        <a href="#pants">بناطيل</a>
        <a href="#sets">أطقم</a>
    </nav>

    <section id="tshirts">
        <div class="grid">
            <div class="card">
                <img src="mps0033-black.png" class="main-img">
                <h3>تيشيرت بوكس</h3>
                <button class="btn-style details-btn">📋 عرض التفاصيل</button>
                <input type="number" class="pack-qty" placeholder="عدد الشدات">
                <button class="btn-style order-btn">اطلب الشدة 🛒</button>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox-plus-jquery.min.js"></script>
</body>
</html>
