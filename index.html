<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; --sub-bg: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        
        /* القسم الرئيسي (رجالي / جامبو) */
        .main-section { 
            background: linear-gradient(90deg, transparent, var(--gold), transparent); 
            color: #000; padding: 12px; font-size: 1.5rem; font-weight: 900; 
            margin: 40px 0 20px 0; text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        /* المجموعات المختصرة */
        .group-title {
            color: var(--gold); font-size: 1.1rem; font-weight: bold;
            margin: 25px 0 15px 0; padding-bottom: 5px;
            border-bottom: 1px solid #333; display: inline-block; width: 80%;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: auto; padding: 0 12px; }
        .card { background: var(--card); padding: 10px; border-radius: 15px; border: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s; }
        .img-wrapper { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; background: #111; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .model-title { font-size: 0.85rem; font-weight: bold; margin: 10px 0; color: #ddd; height: 35px; overflow: hidden; }
        
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .qty-btn { background: #222; color: #fff; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; }
        .qty-val { font-weight: bold; color: var(--gold); min-width: 20px; }
        .add-btn { background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 0.8rem; }

        .order-summary { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-wrapper { height: 320px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="main-section">القسم الرجالي</div>

    <div class="group-title">التيشيرتات والقمصان</div>
    <div class="grid">
        <div class="card">
            <div class="model-title">تيشيرت رجالي</div>
            <div class="img-wrapper"><img src="pant-mens01.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('rt1', -12, 12)">-</button><span id="rt1" class="qty-val">12</span><button class="qty-btn" onclick="changeQty('rt1', 12, 12)">+</button>
            </div>
            <button class="add-btn" onclick="add('تيشيرت رجالي', 'rt1')">إضافة للطلب</button>
        </div>
        </div>

    <div class="group-title">البناطيل والشورتات</div>
    <div class="grid">
        <div class="card">
            <div class="model-title">بنطلون رجالي</div>
            <div class="img-wrapper"><img src="pant-mens02.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('rb1', -6, 6)">-</button><span id="rb1" class="qty-val">6</span><button class="qty-btn" onclick="changeQty('rb1', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('بنطلون رجالي', 'rb1')">إضافة للطلب</button>
        </div>
    </div>

    <div class="group-title">الأطقم الكاملة</div>
    <div class="grid">
        <div class="card">
            <div class="model-title">طقم رجالي قطعتين</div>
            <div class="img-wrapper"><img src="mens-set02.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('rs1', -6, 6)">-</button><span id="rs1" class="qty-val">6</span><button class="qty-btn" onclick="changeQty('rs1', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('طقم رجالي', 'rs1')">إضافة للطلب</button>
        </div>
    </div>

    <div class="main-section">القسم الجامبو</div>

    <div class="group-title">التيشيرتات والقمصان (جامبو)</div>
    <div class="grid">
        <div class="card">
            <div class="model-title">تيشيرت جامبو</div>
            <div class="img-wrapper"><img src="tshert-jampo01.png" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('jt1', -12, 12)">-</button><span id="jt1" class="qty-val">12</span><button class="qty-btn" onclick="changeQty('jt1', 12, 12)">+</button>
            </div>
            <button class="add-btn" onclick="add('تيشيرت جامبو', 'jt1')">إضافة للطلب</button>
        </div>
    </div>

    <div id="cart-summary" class="order-summary">
        <button class="add-btn" style="background:#fff; color:#000;" onclick="sendWA()">إرسال طلب TOP GIVING المجمع (<span id="count">0</span>)</button>
    </div>

    <script>
        let cart = [];
        function changeQty(id, step, min) {
            let el = document.getElementById(id);
            let val = parseInt(el.innerText) + step;
            if (val < min) val = min;
            el.innerText = val;
        }
        function add(name, qId) {
            let qty = document.getElementById(qId).innerText;
            cart.push(`*${name}* ← الكمية: ${qty}`);
            document.getElementById('cart-summary').style.display = 'block';
            document.getElementById('count').innerText = cart.length;
            alert('تمت الإضافة للسلة');
        }
        function sendWA() {
            let msg = "أهلاً TOP GIVING، طلب جملة جديد:\n\n" + cart.join("\n");
            window.location.href = `https://wa.me/966560564719?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
