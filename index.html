<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --gray: #888; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0 10px; font-weight: 900; letter-spacing: 3px; }
        .tagline { color: var(--gray); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; position: sticky; top: 0; background: var(--black); z-index: 100; padding: 10px; }
        .tab-btn { background: var(--accent); color: #fff; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; transition: 0.3s; }
        
        /* تأثير التوهج والزوم المطلبين */
        .img-box { 
            width: 100%; height: 220px; border-radius: 12px; overflow: hidden; background: #fff; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; transition: 0.4s;
        }
        .product-img { max-width: 88%; max-height: 88%; object-fit: contain; transition: 0.5s; }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 20px 5px rgba(212, 175, 55, 0.4); }
        .card:hover .product-img { transform: scale(1.1); }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); }

        .model-name { font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #151515; padding: 10px; border-radius: 12px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 35px; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 20px; display: none; z-index: 1000; }
        .cart-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 280px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>
    <div class="tagline">WHOLESALE - الشد المشكل الأصلي</div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openSection('tshirts', this)">التيشيرتات</button>
        <button class="tab-btn" onclick="openSection('sets', this)">الأطقم</button>
    </div>

                    <div class="dot" style="background: #000;" onclick="view('m1','n5-black.png.png',this)"></div>
                    <div class="dot" style="background: purple;" onclick="view('m1','n5-purple.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 01</div>

                </div>
                <button class="btn-add" onclick="add('موديل 01', 'qm1')">إضافة الشد المشكل</button>

                    <div class="dot" style="background: #fff;" onclick="view('m2','t2-white.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('m2','t2-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 02</div>
                <div class="qty-control">

                </div>
                <button class="btn-add" onclick="add('موديل 02', 'qm2')">إضافة الشد المشكل</button>
            </div>
