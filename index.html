<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي المطور</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #222; }
        body { font-family: sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 50px; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .tab { background: #111; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid var(--accent); }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .card { display: none; background: var(--card-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--accent); }
        .card.show { display: block; }
        .img-box { position: relative; height: 150px; background: #fff; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .zoom { position: absolute; bottom: 5px; left: 5px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        .dots { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); }
        .btn-add { background: var(--gold); width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal img { max-width: 90%; max-height: 80%; }
    </style>
</head>
<body onload="filter('tshirt')">

    <div class="header">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filter('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filter('set')">أطقم</div>
            <div class="tab" id="tab-pants" onclick="filter('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid" id="grid">
        <div class="card tshirt"><div class="img-box"><img src="n5-back.png.png" id="it01"><div class="zoom" onclick="zoom('it01')">🔍</div></div><div class="dots"><div class="dot active" style="background:beige" onclick="v('it01','n5-back.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('it01','n5-purple.png.png',this)"></div></div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt"><div class="img-box"><img src="t1-white.png" id="it02"><div class="zoom" onclick="zoom('it02')">🔍</div></div><div class="dots"><div class="dot active" style="background:#fff" onclick="v('it02','t1-white.png',this)"></div><div class="dot" style="background:#000" onclick="v('it02','t1-black.png',this)"></div></div><button class="btn-add">إضافة</button></div>
        
        <div class="card set"><div class="img-box"><img src="s1-white.png.png" id="is01"><div class="zoom" onclick="zoom('is01')">🔍</div></div><div class="dots"><div class="dot active" style="background:#fff" onclick="v('is01','s1-white.png.png',this)"></div><div class="dot" style="background:#000" onclick="v('is01','s1-black.png.png',this)"></div></div><button class="btn-add">إضافة</button></div>
        
        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" id="ip01"><div class="zoom" onclick="zoom('ip01')">🔍</div></div><div class="dots"><div class="dot active" style="background:#d2b48c" onclick="v('ip01','mps182-beige.png',this)"></div><div class="dot" style="background:#000" onclick="v('ip01','mps182-black.png',this)"></div></div><button class="btn-add">إضافة</button></div>
    </div>

    <div id="modal" class="modal" onclick="this.style.display='none'"><img id="imgFull"></div>

    <script>
        function filter(cat) {
            document.querySelectorAll('.card').forEach(c => c.style.display = c.classList.contains(cat) ? 'block' : 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function zoom(id) { document.getElementById('imgFull').src = document.getElementById(id).src; document.getElementById('modal').style.display = 'flex'; }
    </script>
</body>
</html>
