<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر تفاعلي</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .product-img { width: 100%; height: 160px; object-fit: contain; cursor: zoom-in; }
        .color-btn { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #555; cursor: pointer; display: inline-block; margin: 3px; }
        .size-btn { padding: 5px 10px; margin: 2px; border: 1px solid #444; background: #222; color: #fff; cursor: pointer; }
        .btn-add { background: #D4AF37; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid" id="catalog"></div>

    <script>
        fetch('products.json').then(r => r.json()).then(data => {
            const grid = document.getElementById('catalog');
            grid.innerHTML = data.map((p, i) => `
                <div class="card">
                    <img src="${p.img}" id="img-${i}" class="product-img">
                    <p><b>${p.name}</b></p>
                    <div>${p.colors.map(c => `<span class="color-btn" style="background:${c}" onclick="document.getElementById('img-${i}').src='${p.img}'"></span>`).join('')}</div>
                    
                    <div style="margin:10px 0;">
                        ${p.sizes.map(s => `<button class="size-btn">${s}</button>`).join('')}
                    </div>
                    
                    <button class="btn-add" onclick="alert('تمت إضافة ${p.name} للسلة')">إضافة للسلة 🛒</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
