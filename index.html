<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | النسخة النهائية الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab { background: #111; color: #fff; padding: 8px 25px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 170px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 95%; max-height: 95%; object-fit: contain; transform: scale(1.1); transition: 0.4s; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; min-height: 25px; flex-wrap: wrap; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.1); }
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 5, 5, 0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; backdrop-filter: blur(10px); }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-clear { background: #441111; color: #ff5555; border: 1px solid #662222; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">بنطلون وشورت</div>
        </div>
    </div>

    <div class="grid" id="main-grid">
        </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><button class="btn-clear" onclick="clearCart()">تصفير 🗑️</button><div id="cart-info" style="color:var(--gold); font-weight:900;">الإجمالي: 0 حبة</div><button class="btn-add" style="width:auto; padding:10px 20px;" onclick="send()">إرسال ✅</button></div></div>

    <script>
        // مصفوفة المنتجات الكاملة لليوم
        const products = [
            { cat: 'tshirt', name: 'تيشيرت 01', img: 'n5-back.png.png', colors: [{c:'#000', p:'n5-back.png.png'},{c:'purple', p:'n5-purple.png.png'},{c:'#fff', p:'n5-white.png.png'}], q: 16 },
            { cat: 'set', name: 'طقم Sea 03', img: 'sea2-brown.png', colors: [{c:'#8b4513', p:'sea2-brown.png'},{c:'#ffc0cb', p:'sea2-pink.png'},{c:'#808080', p:'sea2-grey.png'}], q: 12 },
            { cat: 'pants', name: 'بنطلون 182', img: 'mps182-beige.png', colors: [{c:'#d2b48c', p:'mps182-beige.png'},{c:'#000', p:'mps182-black.png'},{c:'blue', p:'mps182-blue.png'},{c:'#fff', p:'mps182-white.png'}], q: 20 },
            { cat: 'pants', name: 'بنطلون 185', img: 'mps185-grey.png', colors: [{c:'#808080', p:'mps185-grey.png'},{c:'#000', p:'mps185-black.png'},{c:'#4b5320', p:'mps185-green.png'},{c:'#fff', p:'mps185-white.png'}], q: 20 },
            { cat: 'pants', name: 'بنطلون 0033', img: 'mps0033-heavenly.png', colors: [{c:'#87CEEB', p:'mps0033-heavenly.png'},{c:'#000', p:'mps0033-black.png'},{c:'#fff', p:'mps0033-white.png'},{c:'#4b5320', p:'mps0033-green.png'}], q: 20 },
            // الموديل الأخير
            { cat: 'pants', name: 'بنطلون 176', img: 'mps176-white.png', colors: [{c:'#fff', p:'mps176-white.png'},{c:'#000', p:'mps176-black.png'},{c:'#808080', p:'mps176-grey.png'},{c:'#8b4513', p:'mps176-brown.png'}], q: 20 }
        ];

        function render() {
            let html = '';
            products.forEach((p, i) => {
                html += `<div class="card ${p.cat}">
                    <div class="img-box"><img src="${p.img}" id="img${i}" class="product-img"></div>
                    <div class="color-dots">`;
                p.colors.forEach(col => {
                    html += `<div class="dot" style="background:${col.c}" onclick="v('img${i}','${col.p}',this)"></div>`;
                });
                html += `</div><div class="model-name">${p.name}</div>
                    <div class="qty-control"><button class="btn-q" onclick="c('q${i}',${p.q})">+</button><span id="q${i}">${p.q}</span><button class="btn-q" onclick="c('q${i}',-${p.q})">-</button></div>
                    <button class="btn-add" onclick="add('${p.name}','q${i}',this)">إضافة للطلب</button>
                </div>`;
            });
            document.getElementById('main-grid').innerHTML = html;
        }

        let order = [];
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; let dots = el.parentElement.querySelectorAll('.dot'); dots.forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function c(id, val) { let el = document.getElementById(id); let curr = parseInt(el.innerText); if (curr + val >= Math.abs(val)) el.innerText = curr + val; }
        function add(name, qtyId, btn) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`;
            btn.innerText = "تمت الإضافة ✅"; setTimeout(() => btn.innerText = "إضافة للطلب", 1500);
        }
        function clearCart() { if(confirm("مسح السلة؟")) { order = []; document.getElementById('cart-bar').style.display = 'none'; } }
        function send() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
        render();
    </script>
</body>
</html>
