<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --beige: #f5f5dc; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 100px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: var(--gold); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; z-index: 10; font-weight: bold; user-select: none; }
        .arrow-right { right: 5px; } .arrow-left { left: 5px; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; height: 30px; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 5px var(--gold); }
        .model-name { font-size: 1rem; font-weight: 700; margin-bottom: 12px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show"><div class="img-box"><span class="arrow arrow-right" onclick="moveImg(this,1)">></span><img src="n5-back.png" id="it01" class="product-img"><span class="arrow arrow-left" onclick="moveImg(this,-1)"><</span></div><div class="color-dots"><div class="dot active" style="background:var(--beige)" onclick="v('it01','n5-back.png',this)"></div><div class="dot" style="background:purple" onclick="v('it01','n5-purple.png',this)"></div><div class="dot" style="background:#fff" onclick="v('it01','n5-white.png',this)"></div><div class="dot" style="background:black" onclick="v('it01','n5-black.png',this)"></div></div><div class="model-name">تيشيرت 01</div><div class="qty-control"><button class="btn-q" onclick="c('qt01',16)">+</button><span id="qt01">16</span><button class="btn-q" onclick="c('qt01',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 01','qt01',this)">إضافة</button></div>
        
        </div>

    <script>
        function filterProducts(cat) { document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); }); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-' + cat).classList.add('active'); }
        function v(id, path, el) { let img = document.getElementById(id); if(img) img.src = path; let dots = el.parentElement.querySelectorAll('.dot'); dots.forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function moveImg(btn, dir) { let dots = btn.parentElement.parentElement.querySelectorAll('.dot'); let curr = Array.from(dots).findIndex(d => d.classList.contains('active')); let next = (curr + dir + dots.length) % dots.length; dots[next].click(); }
        function c(id, val) { let el = document.getElementById(id); if(el) { let n = parseInt(el.innerText); if(n+val >= 0) el.innerText = n+val; } }
        function add(n, q, b) { b.innerText = "تمت ✅"; setTimeout(() => b.innerText = "إضافة", 1500); }
    </script>
</body>
</html>
