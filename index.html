<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        img { width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="grid" id="catalog"></div>

    <script>
        fetch('products.json')
            .then(res => res.json())
            .then(data => {
                const catalog = document.getElementById('catalog');
                catalog.innerHTML = data.map(p => `
                    <div class="card">
                        <img src="${p.img}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p>${p.cat}</p>
                    </div>
                `).join('');
            })
            .catch(err => console.error("خطأ في تحميل البيانات:", err));
    </script>
</body>
</html>
