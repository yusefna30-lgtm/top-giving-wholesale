<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        .logo-box { text-align: center; padding: 20px; }
        .logo-box img { max-width: 200px; border-radius: 10px; border: 2px solid #D4AF37; }
        
        /* القائمة في الوسط */
        .nav { position: sticky; top: 0; z-index: 1000; background: #000; padding: 15px; text-align: center; border-bottom: 2px solid #D4AF37; display: flex; justify-content: center; gap: 20px; }
        .nav a { color: #D4AF37; text-decoration: none; font-weight: bold; font-size: 18px; }
        
        .section-title { color: #D4AF37; border-bottom: 2px solid #D4AF37; display: inline-block; padding: 10px; margin-right: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .main-img { width: 100%; height: 220px; object-fit: contain; background: #fff; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-box"><img src="TOP GIVING logo.jpg" alt="Logo"></div>

    <nav class="nav">
        <a href="#tshirts">تيشرتات</a>
        <a href="#pants">بناطيل</a>
        <a href="#sets">أطقم</a>
    </nav>

    <section id="tshirts">
        <h2 class="section-title">قسم التيشرتات</h2>
        <div class="grid">
            <div class="card">
                <img src="mps0033-black.png" class="main-img">
                <h3>تيشيرت بوكس</h3>
            </div>
        </div>
    </section>

    <section id="pants">
        <h2 class="section-title">قسم البناطيل</h2>
        <div class="grid">
            <div class="card">
                <img src="mps176-black.png" class="main-img">
                <h3>بنطال كلاسيك</h3>
            </div>
        </div>
    </section>

</body>
</html>
