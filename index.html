<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر احترافي</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .product-img { width: 100%; height: 150px; object-fit: contain; cursor: zoom-in; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin: 2px; border: 1px solid #555; }
        button { cursor: pointer; border-radius: 5px; border: none; margin: 5px; padding: 5px 10px; }
        .btn-add { background: #D4AF37; }
    </style>
</head>
<body>

    <div id="tabs"></div>
    <div class="grid" id="catalog"></div>

    <script>
        let allProducts = [];
        fetch('products.json').then(r => r.json()).then(data => {
            allProducts = data;
            renderCatalog(allProducts);
        });

        function renderCatalog(items) {
            const grid = document.getElementById('catalog');
            grid.innerHTML = items.map((p, i) => `
                <div class="card">
                    <img src="${p.img}" class="product-img" onclick="alert('تكبير الصورة: ${p.img}')">
                    <p>${p.name}</p>
                    <div>${p.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('')}</div>
                    <button onclick="alert('${p.details}')">التفاصيل والمقاسات</button>
                    <button class="btn-add" onclick="addToCart('${p.name}')">إضافة للسلة</button>
                </div>
            `).join('');
        }

        function addToCart(name) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(name);
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('تمت إضافة ' + name + ' للسلة');
        }
    </script>
    
    <div style="position:fixed; bottom:20px; right:20px;">
        <button onclick="window.open('https://wa.me/966560564719')">طلب الواتساب 💬</button>
    </div>
</body>
</html>
