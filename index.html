<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 100px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; height: 30px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 5px var(--gold); }
        .model-name { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show">
            <div class="img-box"><img src="n5-back.png.png" id="t01-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#000" onclick="v('t01-img','n5-back.png.png',this)"></div>
                <div class="dot" style="background:purple" onclick="v('t01-img','n5-purple.png.png',this)"></div>
                <div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('t01-img','n5-white.png.png',this)"></div>
            </div>
            <div class="model-name">تيشيرت 01</div>
            <div class="qty-control"><button class="btn-q" onclick="c('t01-q',16)">+</button><span id="t01-q">16</span><button class="btn-q" onclick="c('t01-q',-16)">-</button></div>
            <button class="btn-add" onclick="add('تيشيرت 01','t01-q',this)">إضافة</button>
        </div>

        <div class="card tshirt show">
            <div class="img-box"><img src="t1-white.png" id="t02-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#fff; border:1px solid #ccc" onclick="v('t02-img','t1-white.png',this)"></div>
                <div class="dot" style="background:#000" onclick="v('t02-img','t1-black.png',this)"></div>
                <div class="dot" style="background:blue" onclick="v('t02-img','t1-blue.png',this)"></div>
                <div class="dot" style="background:yellow" onclick="v('t02-img','t1-yellow.png',this)"></div>
            </div>
            <div class="model-name">تيشيرت 02</div>
            <div class="qty-control"><button class="btn-q" onclick="c('t02-q',16)">+</button><span id="t02-q">16</span><button class="btn-q" onclick="c('t02-q',-16)">-</button></div>
            <button class="btn-add" onclick="add('تيشيرت 02','t02-q',this)">إضافة</button>
        </div>

        <div class="card tshirt show">
            <div class="img-box"><img src="t2-black.png.png" id="t03-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#000" onclick="v('t03-img','t2-black.png.png',this)"></div>
                <div class="dot" style="background:purple" onclick="v('t03-img','t2-purple.png.png',this)"></div>
                <div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('t03-img','t2-white.png.png',this)"></div>
                <div class="dot" style="background:gray" onclick="v('t03-img','t2-grey.png.png',this)"></div>
            </div>
            <div class="model-name">تيشيرت 03</div>
            <div class="qty-control"><button class="btn-q" onclick="c('t03-q',16)">+</button><span id="t03-q">16</span><button class="btn-q" onclick="c('t03-q',-16)">-</button></div>
            <button class="btn-add" onclick="add('تيشيرت 03','t03-q',this)">إضافة</button>
        </div>

        <div class="card set">
            <div class="img-box"><img src="s1-white.png.png" id="s01-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#fff; border:1px solid #ccc" onclick="v('s01-img','s1-white.png.png',this)"></div>
                <div class="dot" style="background:gray" onclick="v('s01-img','s1-grey.png.png',this)"></div>
                <div class="dot" style="background:blue" onclick="v('s01-img','s1-blue.png.png',this)"></div>
                <div class="dot" style="background:#000" onclick="v('s01-img','s1-black.png.png',this)"></div>
            </div>
            <div class="model-name">طقم 01</div>
            <div class="qty-control"><button class="btn-q" onclick="c('s01-q',16)">+</button><span id="s01-q">16</span><button class="btn-q" onclick="c('s01-q',-16)">-</button></div>
            <button class="btn-add" onclick="add('طقم 01','s01-q',this)">إضافة</button>
        </div>

        <div class="card set">
            <div class="img-box"><img src="s2-black.jpg" id="s02-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#000" onclick="v('s02-img','s2-black.jpg',this)"></div>
                <div class="dot" style="background:blue" onclick="v('s02-img','s2-blue.jpg',this)"></div>
                <div class="dot" style="background:gray" onclick="v('s02-img','s2-grey.jpg',this)"></div>
                <div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('s02-img','s2-white.jpg',this)"></div>
            </div>
            <div class="model-name">طقم 02</div>
            <div class="qty-control"><button class="btn-q" onclick="c('s02-q',16)">+</button><span id="s02-q">16</span><button class="btn-q" onclick="c('s02-q',-16)">-</button></div>
            <button class="btn-add" onclick="add('طقم 02','s02-q',this)">إضافة</button>
        </div>

        <div class="card set">
            <div class="img-box"><img src="s5-black.jpg" id="s05-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#000" onclick="v('s05-img','s5-black.jpg',this)"></div>
                <div class="dot" style="background:gray" onclick="v('s05-img','s5-grey.jpg',this)"></div>
                <div class="dot" style="background:beige" onclick="v('s05-img','s5-beige.jpg',this)"></div>
                <div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('s05-img','s5-white.jpg',this)"></div>
            </div>
            <div class="model-name">طقم 05</div>
            <div class="qty-control"><button class="btn-q" onclick="c('s05-q',16)">+</button><span id="s05-q">16</span><button class="btn-q" onclick="c('s05-q',-16)">-</button></div>
            <button class="btn-add" onclick="add('طقم 05','s05-q',this)">إضافة</button>
        </div>

        <div class="card set">
            <div class="img-box"><img src="sea-black.png" id="sea01-img" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#000" onclick="v('sea01-img','sea-black.png',this)"></div>
                <div class="dot" style="background:red" onclick="v('sea01-img','sea-red.png',this)"></div>
                <div class="dot" style="background:navy" onclick="v('sea01-img','sea-navy.png',this)"></div>
            </div>
            <div class="model-name">طقم Sea 01</div>
            <div class="qty-control"><button class="btn-q" onclick="c('sea01-q',12)">+</button><span id="sea01-q">12</span><button class="btn-q" onclick="c('sea01-q',-12)">-</button></div>
            <button class="btn-add" onclick="add('طقم Sea 01','sea01-q',this)">إضافة</button>
        </div>

        <div class="card tshirt show"><div class="img-box"><img src="tr1-red.png.png" id="t04i" class="product-img"></div><div class="model-name">تيشيرت 04</div><button class="btn-add" onclick="add('تيشيرت 04','q-none',this)">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="te1-black.png.png" id="t05i" class="product-img"></div><div class="model-name">تيشيرت 05</div><button class="btn-add" onclick="add('تيشيرت 05','q-none',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" id="sh1i" class="product-img"></div><div class="model-name">شورت 182</div><div class="qty-control"><button class="btn-q" onclick="c('shq1',20)">+</button><span id="shq1">20</span><button class="btn-q" onclick="c('shq1',-20)">-</button></div><button class="btn-add" onclick="add('شورت 182','shq1',this)">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps185-grey.png" id="sh2i" class="product-img"></div><div class="model-name">شورت 185</div><button class="btn-add" onclick="add('شورت 185','q-none',this)">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps0033-heavenly.png" id="sh3i" class="product-img"></div><div class="model-name">شورت 0033</div><button class="btn-add" onclick="add('شورت 0033','q-none',this)">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps176-white.png" id="sh4i" class="product-img"></div><div class="model-name">شورت 176</div><button class="btn-add" onclick="add('شورت 176','q-none',this)">إضافة</button></div>
    </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><div id="cart-info" style="color:var(--gold); font-weight:bold;">الإجمالي: 0 حبة</div><button class="btn-add" style="width:auto; padding:8px 20px;" onclick="send()">إرسال ✅</button></div></div>

    <script>
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { 
            let img = document.getElementById(id);
            if(img) img.src = path;
            let dots = el.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        function c(id, val) { 
            let el = document.getElementById(id); if(!el) return;
            let curr = parseInt(el.innerText); 
            let min = (id.includes('sh')) ? 20 : (id.includes('sea') ? 12 : 16);
            if (curr + val >= min) el.innerText = curr + val; 
        }
        let order = [];
        function add(name, qtyId, btn) {
            let el = document.getElementById(qtyId);
            let qty = el ? parseInt(el.innerText) : 16;
            order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`;
            btn.innerText = "تمت ✅"; setTimeout(() => btn.innerText = "إضافة", 1500);
        }
        function send() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
