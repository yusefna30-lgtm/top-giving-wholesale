<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 70px; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; padding: 10px; background: #111; position: sticky; top: 0; z-index: 50; }
        .tab { padding: 6px 10px; background: #222; cursor: pointer; border-radius: 4px; font-size: 13px; transition: 0.3s; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .page { display: none; padding: 10px; }
        .page.active { display: block; }
        
        /* كروت صغيرة ومدمجة - تعديل لإضافة الهالة */
        .card { 
            background: #0a0a0a; 
            border: 1px solid #222; 
            padding: 8px; 
            border-radius: 10px; 
            width: 150px; 
            display: inline-block; 
            margin: 5px; 
            vertical-align: top; 
            transition: 0.4s; /* تأثير سلس */
        }
        
        /* تأثير الهالة المضيئة عند تمرير الماوس على الكرت */
        .card:hover { 
            border-color: #bfa030; 
            box-shadow: 0 0 15px rgba(191,160,48,0.5); 
        }
        
        /* تعديل لإضافة الزوم */
        .img-box { height: 180px; overflow: hidden; border-radius: 8px; background: #000; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; /* تأثير زوم سلس */ }
        
        /* تأثير الزوم عند تمرير الماوس على الصورة */
        .img-box:hover .product-img { transform: scale(1.1); }
        
        h3 { font-size: 13px; margin: 5px 0; }
        .model { color: #bfa030; font-size: 11px; margin-bottom: 5px; }
        
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 8px; }
        .btn-qty { background: #333; border: none; color: #fff; width: 25px; height: 25px; border-radius: 3px; font-size: 14px; cursor: pointer; }
        .qty-val { font-size: 14px; font-weight: bold; width: 30px; color: #bfa030; }
        
        .btn-add { background: #bfa030; border: none; padding: 6px; width: 100%; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 8px; display: flex; justify-content: space-around; z-index: 100; }
        .cart-btn { padding: 8px 15px; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="go('tshirt-page', this)">تيشيرتات</div>
    <div class="tab" onclick="go('set-page', this)">أطقم</div>
    <div class="tab" onclick="go('short-page', this)">شورتات</div>
</div>

<div id="tshirt-page" class="page active">
    <div class="card">
        <div class="img-box"><img src="smile-white.png" class="product-img"></div>
        <h3>تيشيرت SMILE</h3>
        <div class="model">موديل: 08047</div>
        <div class="qty-box" data-step="16">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">16</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت SMILE - 08047', this)">إضافة</button>
    </div>
</div>

<div id="set-page" class="page"></div>
<div id="short-page" class="page"></div>

<div class="cart-bar">
    <button class="cart-btn" style="background:#bfa030;" onclick="sendOrder()">إرسال الطلب 📲</button>
    <button class="cart-btn" style="background:#444; color:#fff;" onclick="clearCart()">تفريغ 🗑️</button>
</div>

<script>
    let cart = {};

    function go(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function changeQty(btn, dir) {
        let parent = btn.parentElement;
        let step = parseInt(parent.getAttribute('data-step'));
        let span = parent.querySelector('.qty-val');
        let newVal = parseInt(span.innerText) + (dir * step);
        if(newVal >= step) span.innerText = newVal;
    }

    function addToCart(item, btn) {
        let qty = btn.parentElement.querySelector('.qty-val').innerText;
        cart[item] = qty;
        alert("تمت إضافة " + qty + " قطعة من: " + item);
    }

    function clearCart() {
        cart = {};
        alert("تم تفريغ السلة");
    }

    function sendOrder() {
        if(Object.keys(cart).length === 0) { alert("السلة فارغة!"); return; }
        let msg = "طلب جملة جديد:\n";
        for(let item in cart) { msg += "- " + item + ": " + cart[item] + " قطعة\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
