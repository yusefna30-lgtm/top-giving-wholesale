<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; margin: 0; padding-bottom: 150px; text-align: center; }
        
        .brand { font-size: 2.2rem; color: var(--gold); margin: 20px 0; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 15px; }

        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid #1a1a1a; padding: 15px; transition: 0.3s; }

        /* --- تصغير مربع الصورة وضبط التوهج الخارجي --- */
        .img-box { 
            width: 140px; /* تصغير العرض */
            height: 140px; /* تصغير الارتفاع */
            background: #fff; 
            border-radius: 12px; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            transition: 0.4s;
            border: 2px solid transparent;
        }
        
        .product-img { max-width: 80%; max-height: 80%; object-fit: contain; transition: 0.4s; }

        /* التوهج حول حدود الإطار بالكامل عند اللمس */
        .card:hover .img-box {
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.05);
        }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

        .model-name { font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; }

        /* --- تنسيق الأزرار لتعمل بشكل صحيح --- */
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; background: #151515; padding: 8px; border-radius: 10px; margin-bottom: 15px; }
        .btn-q { 
            background: #252525; color: var(--gold); border: none; 
            width: 35px; height: 35px; border-radius: 8px; 
            font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .q-val { font-weight: 900; min-width: 30px; font-size: 1.2rem; color: #fff; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 2000; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body onload="initDefaults()">

    <div class="brand">TOP GIVING</div>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="upd('01','t1-white.png','أبيض',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('01','t1-black.png','أسود',this)"></div>
                <div class="dot" style="background: #00f;" onclick="upd('01','t1-blue.png','أزرق',this)"></div>
                <div class="dot" style="background: #daa520;" onclick="upd('01','t1-yellow.png','خردلي',this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q01', 16)">+</button>
                <span id="q01" class="q-val">16</span>
                <button class="btn-q" onclick="chg('q01', -16)">-</button>
            </div>
            <button class="btn-add" onclick="buy('01','موديل 01','q01')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t2-purple.png.png" id="img-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #A020F0;" onclick="upd('02','t2-purple.png.png','بنفسجي',this)"></div>
                <div class="dot" style="background: #fff;" onclick="upd('02','t2-white.png.png','أبيض',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('02','t2-black.png.png','أسود',this)"></div>
            </div>
            <div class="model-name">موديل 02</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q02', 16)">+</button>
                <span id="q02" class="q-val">16</span>
                <button class="btn-q" onclick="chg('q02', -16)">-</button>
            </div>
            <button class="btn-add" onclick="buy('02','موديل 02','q02')">إضافة للطلب</button>
        </div>
        
        </div>

    <div id="cart-bar" class="cart-bar">
        <button class="btn-add" onclick="sendWA()" style="background:#fff; color:#000; width: auto; padding: 10px 40px;">إرسال عبر واتساب</button>
    </div>

    <script>
        let cart = {}; let selColors = {};

        function initDefaults() { 
            selColors['01']='أبيض'; selColors['02']='بنفسجي'; 
        }

        function upd(id, src, c, el) {
            document.getElementById('img-' + id).src = src;
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active'); selColors[id] = c;
        }

        // دالة تغيير الكمية (تعمل الآن بشكل مباشر)
        function chg(id, step) {
            let qSpan = document.getElementById(id);
            let current = parseInt(qSpan.innerText);
            let result = current + step;
            if (result < 16) result = 16;
            qSpan.innerText = result;
        }

        function buy(id, name, qId) {
            let color = selColors[id] || "أساسي";
            let qty = document.getElementById(qId).innerText;
            cart[id + '_' + color] = { name: name, color: color, qty: qty };
            document.getElementById('cart-bar').style.display = 'block';
            alert("تمت الإضافة للسلة!");
        }

        function sendWA() {
            let msg = "📦 طلب جملة جديد:\n";
            for (let k in cart) { msg += `• ${cart[k].name} (${cart[k].color}) x${cart[k].qty}\n`; }
            window.open("https://wa.me/966560564719?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
