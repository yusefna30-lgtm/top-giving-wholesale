<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* تصميم الفاصل الأنيق */
        .section-header {
            margin: 50px 0 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .section-header::before, .section-header::after {
            content: "";
            height: 1px;
            width: 80px;
            background: linear-gradient(to right, transparent, var(--gold));
            margin: 0 15px;
        }
        .section-header::after { background: linear-gradient(to left, transparent, var(--gold)); }
        
        .section-title { 
            background: #111;
            padding: 8px 25px;
            border-radius: 50px;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; transition: 0.4s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .img-box { width: 100%; height: 230px; border-radius: 15px; overflow: hidden; background: #fff; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }
        
        .color-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .dot.active { border-color: var(--gold); transform: scale(1.2); box-shadow: 0 0 10px var(--gold); }
