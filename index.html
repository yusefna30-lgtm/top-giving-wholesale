<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Pro Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        /* الرأس - Header */
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1001; }
        .brand-name { font-size: 2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: #111; color: #777; padding: 6px 15px; border-radius: 20px; border: 1px solid #222; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }

        /* الشبكة - Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 1200px; margin: 15px auto; padding: 0 10px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--accent); transition: 0.3s; }
        
        /* الإطار المصلح: ارتفاع أقل لمنع الفراغ */
        .img-box { 
            width: 100%; height: 160px; /* تقليل الارتفاع لمنع التراجع */
            border-radius: 10px; overflow: hidden; background: #fff; 
            margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
            border: 1.5px solid transparent; transition: 0.4s;
        }
        @media (min-width: 992px) { .img-box { height: 210px; } }

        .product-img { 
            width: 100%; height: 100%; object-fit: contain; 
            transform: scale(1.15); /* تكبير الموديل لتقليل البياض */
            transition: 0.5s; 
        }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .card:hover .product-img { transform: scale(1.3); }

        /* الألوان والأزرار */
        .color-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); }
        .model-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; background: #151515; padding: 6px; border-radius: 8px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 25px; font-size: 0.9rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 0.85rem; }

        /* السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab active">التيشيرتات</div>
            <div class="tab">الأطقم</div>
            <div class="tab">البنطلونات</div>
            <div class="tab">القمصان</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="n5-back.png.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #e0e0e0;" onclick="v('01', 'n5-back.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('01', 'n5-purple.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('01', 'n5-black.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('01', 'n5-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-01', 16)">+</button><span id="q-01" class="q-val">16</span><button class="btn-q" onclick="c('q-01', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 01', 'q-01')">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="img-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="v('02', 't1-white.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('02', 't1-black.png', this)"></div>
                <div class="dot" style="background: blue;" onclick="v('02', 't1-blue.png', this)"></div>
                <div class="dot" style="background: gold;" onclick="v('02', 't1-yellow.png', this)"></div>
            </div>
            <div class="model-name">موديل 02</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-02', 16)">+</button><span id="q-02" class="q-val">16</span><button class="btn-q" onclick="c('q-02', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 02', 'q-02')">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t2-black.png.png" id="img-03" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #000;" onclick="v('03', 't2-black.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('03', 't2-purple.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('03', 't2-white.png.png', this)"></div>
                <div class="dot" style="background: gray;" onclick="v('03', 't2-grey.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 03</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-03', 16)">+</button><span id="q-03" class="q-val">16</span><button class="btn-q" onclick="c('q-03', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 03', 'q-03')">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="tr1-red.png.png" id="img-04" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: red;" onclick="v('04', 'tr1-red.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('04', 'tr2-black.png.png', this)"></div>
                <div class="dot" style="background: gray;" onclick="v('04', 'tr3-grey.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('04', 'tr4-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 04</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-04', 16)">+</button><span id="q-04" class="q-val">16</span><button class="btn-q" onclick="c('q-04', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 04', 'q-04')">إضافة</button>
        </div>
    </div>

    <div class="cart-bar" id="cart-bar">
        <div class="cart-flex">
            <div id="cart-info" style="font-weight: 900; color: var(--gold);">الإجمالي: 0 شدة</div>
            <button class="btn-add" style="width: auto; padding: 8px 15px;" onclick="sendWhatsApp()">إرسال الطلب</button>
        </div>
    </div>

    <script>
        let order = [];
        function v(id, path, el) {
            document.getElementById('img-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }
        function c(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }
        function addToOrder(name, qtyId) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            let item = order.find(i => i.name === name);
            if (item) { item.qty += qty; } else { order.push({ name: name, qty: qty }); }
            updateCartBar();
        }
        function updateCartBar() {
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('cart-info').innerText = `الإجمالي: ${total/16} شدة`;
        }
        function sendWhatsApp() {
            let msg = "📦 *طلب جملة من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} قطعة ( ${i.qty/16} شدة )\n`; });
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            msg += `\n💰 *الإجمالي:* ${total/16} شدة`;
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
