<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* تعريف المتغيرات اللونية الأساسية للهوية البصرية */
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e; 
            --accent: #1a1a1a; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--black); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 140px; 
        }
        
        .brand { 
            font-size: 2.2rem; 
            color: var(--gold); 
            margin: 25px 0; 
            font-weight: 900; 
            letter-spacing: 3px; 
        }
        
        /* تنسيق عناوين الأقسام الأربعة */
        .section-header { 
            margin: 40px 0 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .section-header::before, .section-header::after { 
            content: ""; 
            height: 2px; 
            width: 40px; 
            background: var(--gold); 
            margin: 0 15px; 
            border-radius: 2px; 
        }
        .section-title { 
            color: var(--gold); 
            font-size: 1.2rem; 
            font-weight: 700; 
        }

        /* شبكة العرض المستجيبة (2 في الجوال و 4 في الشاشات الكبيرة) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 10px; 
        }

        /* بطاقة المنتج */
        .card { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        
        /* التحكم بأبعاد الصور */
        .img-box { 
            width: 100%; 
            height: 160px; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 10px; 
        }
        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        /* دوائر الألوان */
        .color-dots { 
            display: flex; 
            justify-content: center; 
            gap: 6px; 
            margin-bottom: 10px; 
            height: 25px; 
        }
        .dot { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            border: 2px solid #333; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .dot.active { 
            border-color: var(--gold); 
            transform: scale(1.1); 
            box-shadow: 0 0 6px var(--gold); 
        }

        /* اسم الموديل */
        .model-name { 
            font-size: 0.8rem; 
            margin-bottom: 10px; 
            font-weight: 700; 
            color: #eee; 
            min-height: 35px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* عناصر التحكم بالكمية والإضافة (نظام الأزرار الأربعة) */
        .qty-control { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 12px; 
            background: #151515; 
            padding: 6px; 
            border-radius: 10px; 
        }
        .btn-q { 
            background: #252525; 
            color: #fff; 
            border: none; 
            width: 30px; 
            height: 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold; 
        }
        .q-val { 
            color: var(--gold); 
            font-weight: 900; 
            min-width: 30px; 
            font-size: 1rem; 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #D4AF37, #8A6D3B); 
            color: #000; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 900; 
            border: none; 
            width: 100%; 
            font-size: 0.85rem; 
            cursor: pointer; 
        }

        /* استعلام الشاشات الكبيرة */
        @media (min-width: 992px) { 
            .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } 
            .img-box { height: 190px; } 
        }

        /* شريط السلة */
        .cart-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(10, 10, 10, 0.95); 
            border-top: 1px solid var(--gold); 
            padding: 15px; 
            display: none; 
            z-index: 1000; 
            backdrop-filter: blur(8px); 
        }
        .btn-wa { 
            background: #25D366; 
            color: #fff; 
            padding: 12px 40px; 
            border-radius: 10px; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            font-size: 1rem; 
        }
    </style>
</head>
<body onload="initDefaults()">

                <div class="dot" style="background: #000;" onclick="upd('03','te1-black.png.png','أسود',this)"></div>
            </div>

            <div class="qty-control">
                <button class="btn-q" onclick="chg('q03',-16)">-</button>
                <span id="q03" class="q-val">16</span>

            </div>
            <button class="btn-add" onclick="buy('03','موديل 03','q03')">إضافة للطلب</button>

        <!-- موديل 04 -->
        <div class="card">
            <div class="img-box"><img src="tr1-red.png.png" id="img-04" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #BA1313;" onclick="upd('04','tr1-red.png.png','أحمر',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('04','tr2-black.png.png','أسود',this)"></div>
            </div>
            <div class="model-name">موديل 04 (TREND)</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q04',-16)">-</button>
                <span id="q04" class="q-val">16</span>
                <button class="btn-q" onclick="chg('q04',16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('04','موديل 04','q04')">إضافة للطلب</button>
        </div>

        <!-- موديل 05 -->
        <div class="card">
            <div class="img-box"><img src="n5-white.png.png" id="img-05" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="upd('05','n5-white.png.png','أبيض',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('05','n5-black.png.png','أسود',this)"></div>
                <div class="dot" style="background: #A020F0;" onclick="upd('05','n5-purple.png.png','بنفسجي',this)"></div>
            </div>
            <div class="model-name">موديل 05 (N.C)</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q05',-16)">-</button>

            <button class="btn-add" onclick="buy('05','موديل 05','q05')">إضافة للطلب</button>

    </div>

    <!-- 2. قسم البنطلونات والشورتات -->
    <div class="section-header"><div class="section-title">البنطلونات والشورتات</div></div>
    <div class="grid">
        <!-- بنطلون رجالي -->
        <div class="card">
            <div class="img-box"><img src="Picsart_26-05-28_16-16-16-2.jpg" id="img-p1" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #000;" onclick="upd('p1','Picsart_26-05-28_16-16-16-2.jpg','أسود',this)"></div>
            </div>
            <div class="model-name">بنطلون رجالي فاخر</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('qp1',-16)">-</button>
                <span id="qp1" class="q-val">16</span>
                <button class="btn-q" onclick="chg('qp1',16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('p1','بنطلون رجالي','qp1')">إضافة للطلب</button>
        </div>
    </div>

    <!-- 3. قسم الأطقم الرياضية -->
    <div class="section-header"><div class="section-title">الأطقم الرياضية</div></div>
    <div class="grid">
        <!-- طقم رياضي موديل S1 -->
        <div class="card">
            <div class="img-box"><img src="s1-white.png.png" id="img-s1" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="upd('s1','s1-white.png.png','أبيض',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('s1','s1-black.png.png','أسود',this)"></div>
                <div class="dot" style="background: #808080;" onclick="upd('s1','s1-grey.png.png','رصاصي',this)"></div>
                <div class="dot" style="background: #0000FF;" onclick="upd('s1','s1-blue.png.png','أزرق',this)"></div>
            </div>

    <div class="grid">
        <!-- قميص موديل Sh1 -->
        <div class="card">
            <div class="img-box"><img src="shirt-default.png" id="img-sh1" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="upd('sh1','shirt-white.png','أبيض',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('sh1','shirt-black.png','أسود',this)"></div>
            </div>
            <div class="model-name">قميص موديل Sh1</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('qsh1',-16)">-</button>
                <span id="qsh1" class="q-val">16</span>
                <button class="btn-q" onclick="chg('qsh1',16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('sh1','قميص Sh1','qsh1')">إضافة للطلب</button>
        </div>
    </div>

    <!-- شريط السلة السفلي للواتساب -->
    <div id="cart-bar" class="cart-bar">
        <button class="btn-wa" onclick="sendWA()">إرسال الطلب عبر واتساب 💬</button>
    </div>

    <script>
        let cart = {}; 
        let selColors = {};

        // تهيئة قيم الألوان الافتراضية لكافة الموديلات
        function initDefaults() {
            selColors['01'] = 'أبيض'; selColors['02'] = 'بنفسجي';
            selColors['03'] = 'بيج'; selColors['04'] = 'أحمر';
            selColors['05'] = 'أبيض'; selColors['p1'] = 'أسود';
            selColors['s1'] = 'أبيض'; selColors['sh1'] = 'أبيض';
        }

        // دالة تبديل الصور والألوان
        function upd(id, src, c, el) {
            let img = document.getElementById('img-' + id);
            if(img) img.src = src;
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selColors[id] = c;
        }

        // دالة التحكم بالكميات بحد أدنى موحد 16 قطعة
        function chg(id, v) {
            let q = document.getElementById(id);
            let res = parseInt(q.innerText) + v;
            let min = 16; 
            if(res < min) res = min;
            q.innerText = res;
        }

        // دالة معالجة السلة وتحديث البيانات
        function buy(id, name, qId) {
            let color = selColors[id] || "أساسي";
            let qty = parseInt(document.getElementById(qId).innerText);
            let itemKey = id + '_' + color; 
            
            if (cart[itemKey]) { 
                cart[itemKey].qty += qty; 
            } else { 
                cart[itemKey] = { name: name, color: color, qty: qty }; 
            }
            document.getElementById('cart-bar').style.display = 'block';
            alert(`تمت إضافة ${name} - ${color} (الكمية: ${qty}) بنجاح.`);
        }

        // إرسال البيانات النهائية مشفرة إلى الواتساب
        function sendWA() {
            let lines = [];
            for (let k in cart) { 
                lines.push(`• ${cart[k].name} (${cart[k].color}) x${cart[k].qty}`); 
            }
            let msgText = "طلب جملة جديد من TOP GIVING:\n\n" + lines.join("\n");
            window.location.href = "https://wa.me/966560564719?text=" + encodeURIComponent(msgText);
        }
    </script>
</body>
</html>
