<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: #0c0c0e; padding: 15px; border-radius: 15px; border: 1px solid #1a1a1a; }
        .product-img { width: 100%; height: 180px; object-fit: contain; }
        .btn-add { background: #D4AF37; color: #000; padding: 10px; border-radius: 5px; border: none; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="product-grid" class="grid"></div>

<script>
// المصفوفة التي تحتوي على المنتجات (تم إضافة التيشيرت الجديد في الأسفل)
const products = [
    { id: "it01", name: "تيشيرت 01", images: ["n5-back.png.png"] },
    { id: "is01", name: "طقم 01", images: ["s1-white.png.png"] },
    { id: "boxy01", name: "تيشيرت Boxy", images: ["boxy1.png"] } 
];

// دالة لبناء المتجر
function buildStore() {
    const grid = document.getElementById('product-grid');
    products.forEach(p => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${p.images[0]}" class="product-img">
            <p>${p.name}</p>
            <button class="btn-add" onclick="window.open('https://wa.me/966560564719?text=أريد طلب ${p.name}')">طلب عبر الواتساب</button>
        `;
        grid.appendChild(card);
    });
}
buildStore();
</script>
</body>
</html>
