<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هيكل الأقسام</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; }
        .tab { padding: 10px 20px; background: #222; border: 1px solid #444; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; padding: 50px; border: 1px solid #333; margin: 20px; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="tab active" onclick="showSection('tshirts', this)">التيشيرتات</div>
        <div class="tab" onclick="showSection('sets', this)">الأطقم</div>
        <div class="tab" onclick="showSection('shorts', this)">الشورتات</div>
    </div>

    <div id="tshirts" class="tab-content active">قسم التيشيرتات (سيكون هنا)</div>
    <div id="sets" class="tab-content">قسم الأطقم (سيكون هنا)</div>
    <div id="shorts" class="tab-content">قسم الشورتات (سيكون هنا)</div>

    <script>
        function showSection(id, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
