<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--black); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 120px; 
        }
        
        .brand { 
            font-size: 2.2rem; 
            color: var(--gold); 
            margin: 20px 0; 
            font-weight: 900; 
            letter-spacing: 3px; 
        }
        
        /* شبكة عرض الموديلات - عمودين في الجوال */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 10px; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            transition: 0.3s ease-in-out; 
        }
        .card:hover { 
            border-color: var(--gold); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); 
        }
        
        /* حجم الصندوق الصغير للجوال */
        .img-box { 
            width: 100%; 
            height: 220px; 
            border-radius: 10px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 12px; 
        }
        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .color-dots { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 12px; 
        }
        .dot { 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            border: 2px solid #fff; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .dot.active { 
            border-color: var(--gold); 
            box-shadow: 0 0 8px var(--gold); 
            transform: scale(1.1); 
        }
        
        .model-name { 
            font-size: 0.9rem; 
            margin-bottom: 10px; 
            font-weight: bold; 
        }
        
        .qty-control { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 12px; 
            background: #1a1a1a; 
            padding: 6px; 
            border-radius: 8px; 
        }
        .btn-q { 
            background: #333; 
            color: #fff; 
            border: none; 
            width: 32px; 
            height: 32px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold; 
        }
        .q-val { 
            font-weight: bold; 
            color: var(--gold); 
            min-width: 30px; 
            font-size: 1.1rem; 
        }
        
        .btn-add { 
            background: linear-gradient(to bottom, #e2c06d, #8a6d3b); 
            color: #000; 
            padding: 10px; 
            border-radius: 10px; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            font-size: 0.85rem; 
        }

        .cart-bar { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(0, 0, 0, 0.95); 
            border-top: 2px solid var(--gold); 
            padding: 15px; 
            display: none; 
            z-index: 1000;
        }

        /* تعديلات الكمبيوتر */
        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .img-box { height: 380px; }
            .dot { width: 32px; height: 32px; }
            .model-name { font-size: 1.2rem; }
            .btn-add { font-size: 1.1rem; padding: 15px; }
        }
    </style>
</head>
