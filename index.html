<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold-main: #D4AF37; --gold-light: #f1d38e; --black: #000; --card-bg: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; direction: rtl; }
        .brand { font-size: 3rem; color: var(--gold-main); margin: 35px 0; font-weight: 900; letter-spacing: 5px; }

        .main-section-header {
            background: linear-gradient(to right, transparent, #4a3a1d, var(--gold-main), #4a3a1d, transparent);
            padding: 15px; font-size: 1.7rem; font-weight: 900; color: #000; margin: 30px 0;
            border-top: 1px solid var(--gold-light); border-bottom: 1px solid var(--gold-light);
        }

        .sub-group-title {
            color: var(--gold-light); font-size: 1.3rem; font-weight: bold;
            margin: 25px 0 15px 0; display: block; border-bottom: 1px solid #222;
            padding-bottom: 10px; width: 85%; margin: 0 auto;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        .card { 
            background: var(--card-bg); padding: 12px; border-radius: 15px; 
            border: 1px solid #1a1a1a; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; transition: 0.3s;
        }

        .img-box { width: 100%; height: 210px; border-radius: 10px; overflow: hidden; background: #111; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        
        .color-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #fff; }

        .model-name { font-size: 0.9rem; font-weight: bold; margin: 12px 0; color: #fff; min-height: 40px; }
        .packing-info { font-size: 0.75rem; color: var(--gold-light); margin-bottom: 10px; }

        .qty-control { 
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin: 12px 0; background: #000; padding: 6px; 
            border-radius: 8px; border: 1px solid #333; 
        }
        .btn-q { background: #222; color: #fff; border: none; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .q-val { font-weight: bold; color: var(--gold-main); min-width: 30px; font-size: 1.2rem; }

        .btn-add { 
            background: linear-gradient(to bottom, #f1d38e, #8a6d3b); 
            color: #000; padding: 12px; border-radius: 10px; 
            font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 0.95rem;
        }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.92); border-top: 2px solid var(--gold-main); padding: 18px; z-index: 1000; display: none; backdrop-filter: blur(8px); }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } .img-box { height: 350px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="main-section-header">القسم الرجالي</div>

    <div class="sub-group-title">تيشيرتات الموديلات الجديدة (شد 16 حبة)</div>
    <div class="grid">
        
        <div class="card">
            <div class="model-name">تيشيرت موديل 01</div>
            <div class="img-box"><img src="t1.jpg" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: black;"></div>
                <div class="dot" style="background: white;"></div>
                <div class="dot" style="background: navy;"></div>
                <div class="dot" style="background: grey;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة مشكل ألوان</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('t1',-16,16)">-</button>
                <span id="t1" class="q-val">16</span>
                <button class="btn-q" onclick="chg('t1',16,16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('تيشيرت موديل 01','t1')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-name">تيشيرت موديل 02</div>
            <div class="img-box"><img src="t2.jpg" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: black;"></div>
                <div class="dot" style="background: #800000;"></div>
                <div class="dot" style="background: white;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة مشكل ألوان</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('t2',-16,16)">-</button>
                <span id="t2" class="q-val">16</span>
                <button class="btn-q" onclick="chg('t2',16,16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('تيشيرت موديل 02','t2')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-name">تيشيرت موديل 03</div>
            <div class="img-box"><img src="t3.jpg" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: black;"></div>
                <div class="dot" style="background: blue;"></div>
                <div class="dot" style="background: grey;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة مشكل ألوان</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('t3',-16,16)">-</button>
                <span id="t3" class="q-val">16</span>
                <button class="btn-q" onclick="chg('t3',16,16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('تيشيرت موديل 03','t3')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-name">تيشيرت موديل 04</div>
            <div class="img-box"><img src="t4.jpg" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: black;"></div>
                <div class="dot" style="background: white;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة مشكل ألوان</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('t4',-16,16)">-</button>
                <span id="t4" class="q-val">16</span>
                <button class="btn-q" onclick="chg('t4',16,16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('تيشيرت موديل 04','t4')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-name">تيشيرت موديل 05</div>
            <div class="img-box"><img src="t5.jpg" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: black;"></div>
                <div class="dot" style="background: grey;"></div>
            </div>
            <div class="packing-info">الشد: 16 حبة مشكل ألوان</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('t5',-16,16)">-</button>
                <span id="t5" class="q-val">16</span>
                <button class="btn-q" onclick="chg('t5',16,16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('تيشيرت موديل 05','t5')">إضافة للطلب</button>
        </div>

    </div>

    <div id="cart-bar" class="cart-bar">
        <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center;">
            <div style="color:var(--gold-main); font-weight:bold;">الأصناف: <span id="c-count" style="font-size:1.4rem;">0</span></div>
            <button class="btn-add" style="width:auto; padding:10px 30px; background:#fff; color:#000;" onclick="sendWA()">إرسال الطلب (واتساب)</button>
        </div>
    </div>

    <script>
        let items = [];
        function chg(id, s, m) {
            let e = document.getElementById(id);
            let v = parseInt(e.innerText) + s;
            if (v < m) v = m;
            e.innerText = v;
        }
        function buy(n, qId) {
            let q = document.getElementById(qId).innerText;
            items.push(`*${n}* ← الكمية: ${q} حبة`);
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('c-count').innerText = items.length;
            alert('تمت إضافة ' + n);
        }
        function sendWA() {
            let msg = "أهلاً TOP GIVING، طلب جملة جديد:\n\n" + items.join("\n");
            window.location.href = `https://wa.me/966560564719?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
