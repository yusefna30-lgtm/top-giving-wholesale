<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        .brand { font-size: 3rem; color: var(--gold); margin: 40px 0; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        
        /* تنسيق عناوين الأقسام لجعلها واضحة وتفصل بين المنتجات */
        .section-header { 
            width: 100%; background: #1a1a1a; color: var(--gold); 
            padding: 15px 20px; margin: 40px 0 20px 0; font-size: 1.4rem; 
            font-weight: bold; border-right: 6px solid var(--gold); 
            text-align: right; box-sizing: border-box; clear: both;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; max-width: 1200px; margin: auto; padding: 0 15px; 
        }
        
        .card { background: var(--card); padding: 12px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.15); display: flex; flex-direction: column; transition: 0.3s; }
        .img-wrapper { width: 100%; height: 220px; border-radius: 12px; overflow: hidden; background: #111; margin-bottom: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .model-title { color: #fff; font-size: 0.95rem; font-weight: bold; margin-bottom: 10px; height: 40px; display: flex; align-items: center; justify-content: center; }
        
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; background: #111; padding: 6px; border-radius: 10px; }
        .qty-btn { background: #333; color: #fff; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: bold; color: var(--gold); min-width: 30px; font-size: 1.1rem; }
        .add-btn { background: var(--gold); color: #000; padding: 12px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        .order-summary { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 20px; z-index: 1000; display: none; backdrop-filter: blur(10px); }
        
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } .img-wrapper { height: 350px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="section-header">قسم الرجالي (MENS)</div>
    <div class="grid">
        
        <div class="card">
            <div class="model-title">شورت رجالي موديل 0295</div>
            <div class="img-wrapper"><img src="short-men02.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('m1', -6, 6)">-</button>
                <span id="m1" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('m1', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('شورت رجالي 0295', 'm1')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">بنطلون رجالي PM0269</div>
            <div class="img-wrapper"><img src="pant-mens01.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('m2', -6, 6)">-</button>
                <span id="m2" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('m2', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('بنطلون رجالي PM0269', 'm2')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">بنطلون رجالي PM0342</div>
            <div class="img-wrapper"><img src="pant-mens02.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('m3', -12, 12)">-</button>
                <span id="m3" class="qty-val">12</span>
                <button class="qty-btn" onclick="changeQty('m3', 12, 12)">+</button>
            </div>
            <button class="add-btn" onclick="add('بنطلون رجالي PM0342', 'm3')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">طقم رجالي موديل 02</div>
            <div class="img-wrapper"><img src="mens-set02.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('m4', -6, 6)">-</button>
                <span id="m4" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('m4', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('طقم رجالي موديل 02', 'm4')">إضافة للطلب</button>
        </div>

    </div>

    <div class="section-header">قسم الجامبو (JAMPO)</div>
    <div class="grid">
        
        <div class="card">
            <div class="model-title">بنطلون جامبو موديل 01</div>
            <div class="img-wrapper"><img src="pant-jampo01.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('j1', -6, 6)">-</button>
                <span id="j1" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('j1', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('بنطلون جامبو 01', 'j1')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">تيشيرت جامبو موديل 01</div>
            <div class="img-wrapper"><img src="tshert-jampo01.png" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('j2', -12, 12)">-</button>
                <span id="j2" class="qty-val">12</span>
                <button class="qty-btn" onclick="changeQty('j2', 12, 12)">+</button>
            </div>
            <button class="add-btn" onclick="add('تيشيرت جامبو 01', 'j2')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">طقم جامبو موديل 01</div>
            <div class="img-wrapper"><img src="jampo-set 01.jpg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('j3', -6, 6)">-</button>
                <span id="j3" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('j3', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('طقم جامبو 01', 'j3')">إضافة للطلب</button>
        </div>

    </div>

    <div id="cart-summary" class="order-summary">
        <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center;">
            <div style="color:var(--gold); font-weight:bold;">سلة طلبات TOP GIVING (<span id="count">0</span>)</div>
            <button class="add-btn" style="width:auto; padding:10px 40px;" onclick="sendWA()">إرسال واتساب</button>
        </div>
    </div>

    <script>
        let cart = [];
        function changeQty(id, step, min) {
            let el = document.getElementById(id);
            let val = parseInt(el.innerText) + step;
            if (val < min) val = min;
            el.innerText = val;
        }
        function add(name, qId) {
            let qty = document.getElementById(qId).innerText;
            cart.push(`*${name}* - الكمية: ${qty}`);
            document.getElementById('cart-summary').style.display = 'block';
            document.getElementById('count').innerText = cart.length;
            alert('تمت إضافة المنتج');
        }
        function sendWA() {
            let msg = "أهلاً TOP GIVING، طلب جملة جديد:\n\n" + cart.join("\n");
            window.location.href = `https://wa.me/966560564719?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
