<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 140px; }
        .header { text-align: center; padding: 30px 20px; }
        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .tab { padding: 10px 25px; background-color: #0a0a0a; border: 1px solid #222; border-radius: 25px; cursor: pointer; color: #aaa; transition: 0.3s; }
        .tab.active { background-color: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background-color: #0a0a0a; border: 1px solid #151515; border-radius: 16px; padding: 18px; text-align: center; }
        .slider-container { position: relative; width: 100%; height: 340px; border-radius: 12px; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #bfa030; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .arrow-btn.prev { left: 10px; } .arrow-btn.next { right: 10px; }
        .btn-q { background: none; border: 1px solid #333; color: #fff; width: 32px; height: 32px; cursor: pointer; }
        .btn-add { background: transparent; color: #bfa030; border: 1px solid #bfa030; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; }
        .cart-navbar { position: fixed; bottom: 0; left: 0; right: 0; background: #050505; padding: 15px 25px; display: flex; justify-content: space-between; transform: translateY(120px); transition: 0.4s; z-index: 1000; }
        .cart-navbar.active { transform: translateY(0); }
        .btn-send-cart { background: #bfa030; color: #000; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" alt="TOP GIVING" style="max-width: 160px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="showTab('tshirts', this)">تيشيرتات</div>
        <div class="tab" onclick="showTab('sets', this)">أطقم صيفية</div>
        <div class="tab" onclick="showTab('shorts-pants', this)">شورتات وبناطيل</div>
    </div>
</div>

<div id="tshirts" class="tab-content active">
    <div class="grid">
        </div>
</div>

<div id="sets" class="tab-content">
    <div class="grid">
        </div>
</div>

<div id="shorts-pants" class="tab-content">
    <div class="grid">
        </div>
</div>

<script>
    function showTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    function c(id, amount, min) {
        const span = document.getElementById(id);
        let val = parseInt(span.innerText) + amount;
        span.innerText = val < min ? min : val;
    }

    // هنا تضع دوال addToCart و changeSlide و sendOrderWhatsApp التي كانت عندك سابقاً
</script>
</body>
</html>
