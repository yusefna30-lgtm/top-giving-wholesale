<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 70px; }
        .nav-tabs { display: flex; justify-content: flex-start; gap: 5px; padding: 10px; background: #111; position: sticky; top: 0; z-index: 50; overflow-x: auto; white-space: nowrap; }
        .tab { padding: 8px 12px; background: #222; cursor: pointer; border-radius: 4px; font-size: 12px; transition: 0.3s; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        
        .page { display: none; padding: 10px; }
        .page.active { display: block; }
        
        .card { background: #0a0a0a; border: 1px solid #222; padding: 8px; border-radius: 10px; width: 145px; display: inline-block; margin: 5px; vertical-align: top; transition: 0.4s; }
        .card:hover { border-color: #bfa030; box-shadow: 0 0 15px rgba(191,160,48,0.5); }
        
        .img-box { height: 160px; overflow: hidden; border-radius: 8px; background: #000; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; display: none; }
        .product-img.active { display: block; }
        .img-box:hover .product-img { transform: scale(1.1); }
        
        /* زر تبديل اللون */
        .btn-color { background: #444; border: none; color: #fff; padding: 4px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; margin-bottom: 5px; }
        
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 8px; }
        .btn-qty { background: #333; border: none; color: #fff; width: 25px; height: 25px; border-radius: 3px; font-size: 14px; cursor: pointer; }
        .qty-val { font-size: 13px; font-weight: bold; width: 30px; color: #bfa030; }
        
        .btn-add { background: #bfa030; border: none; padding: 6px; width: 100%; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 10px; display: flex; justify-content: space-around; z-index: 100; border-top: 1px solid #333; }
        .cart-btn { padding: 8px 15px; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="go('tshirt-page', this)">تيشيرتات</div>
    <div class="tab" onclick="go('set-page', this)">أطقم</div>
    <div class="tab" onclick="go('short-page', this)">شورتات</div>
</div>

<div id="tshirt-page" class="page active">
    <div class="card">
        <div class="img-box">
            <img src="smile-white.png" class="product-img active">
            <img src="smile-black.png" class="product-img">
        </div>
        <h3>تيشيرت SMILE</h3>
        <button class="btn-color" onclick="toggleColor(this)">تبديل اللون 🎨</button>
        <div class="model">موديل: 08047</div>
        <div class="qty-box" data-step="16">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">16</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت SMILE', this)">إضافة</button>
    </div>
</div>

<div id="set-page" class="page"></div>
<div id="short-page" class="page"></div>

<div class="cart-bar">
    <button class="cart-btn" style="background:#bfa030;" onclick="sendOrder()">إرسال الطلب 📲</button>
    <button class="cart-btn" style="background:#444; color:#fff;" onclick="clearCart()">تفريغ 🗑️</button>
</div>

<script>
    function go(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    // وظيفة تبديل اللون
    function toggleColor(btn) {
        let box = btn.parentElement.querySelector('.img-box');
        let imgs = box.querySelectorAll('.product-img');
        let active = box.querySelector('.product-img.active');
        let next = active.nextElementSibling || imgs[0];
        active.classList.remove('active');
        next.classList.add('active');
    }

    function changeQty(btn, dir) {
        let parent = btn.parentElement;
        let step = parseInt(parent.getAttribute('data-step'));
        let span = parent.querySelector('.qty-val');
        let newVal = parseInt(span.innerText) + (dir * step);
        if(newVal >= step) span.innerText = newVal;
    }

    function addToCart(item, btn) {
        let qty = btn.parentElement.querySelector('.qty-val').innerText;
        alert("تمت إضافة " + qty + " من: " + item);
    }
    
    // ... بقية الوظائف (clearCart, sendOrder) كما هي ...
</script>
</body>
</html>
