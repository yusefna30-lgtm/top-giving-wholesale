<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #222; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 180px; position: relative; background: #fff; border-radius: 12px; margin-bottom: 12px; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }
        .zoom-icon { position: absolute; bottom: 8px; left: 8px; cursor: pointer; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 5px; }
        .color-dots { display: flex; gap: 8px; margin-bottom: 10px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); }
        .btn-add { background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal img { max-width: 90%; max-height: 80%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filter('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filter('set')">أطقم</div>
            <div class="tab" id="tab-pants" onclick="filter('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid" id="grid">
        <div class="card tshirt show">
            <div class="img-box"><img src="n5-back.png.png" id="it01" class="product-img"><span class="zoom-icon" onclick="zoom('it01')">🔍</span></div>
            <div class="color-dots"><div class="dot active" style="background:beige" onclick="v('it01','n5-back.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('it01','n5-purple.png.png',this)"></div></div>
            <button class="btn-add">إضافة</button>
        </div>
        </div>

    <div id="modal" class="modal" onclick="this.style.display='none'"><img id="imgFull"></div>

    <script>
        function filter(cat) {
            document.querySelectorAll('.card').forEach(c => c.style.display = c.classList.contains(cat) ? 'flex' : 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) {
            document.getElementById(id).src = path;
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }
        function zoom(id) {
            document.getElementById('imgFull').src = document.getElementById(id).src;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
