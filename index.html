<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --gray: #888; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0 10px; font-weight: 900; letter-spacing: 3px; }
        .tagline { color: var(--gray); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding: 10px; position: sticky; top: 0; background: var(--black); z-index: 100; border-bottom: 1px solid var(--accent); }
        .tab-btn { background: var(--accent); color: #fff; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        
        .img-box { width: 100%; height: 200px; border-radius: 15px; overflow: hidden; background: #fff; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .color-preview-text { font-size: 0.8rem; color: var(--gray); margin-bottom: 5px; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #333; cursor: pointer; }
        .dot.active { border: 2px solid var(--gold); transform: scale(1.1); }

        .model-name { font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; background: #151515; padding: 10px; border-radius: 12px; }
        .btn-q { background: #252525; color: #fff; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 40px; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 15px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 0.9rem; }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(12, 12, 14, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
        .cart-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .cart-details { text-align: right; font-size: 0.85rem; color: #ccc; max-height: 100px; overflow-y: auto; background: #151515; padding: 10px; border-radius: 8px; }
        .cart-summary-line { display: flex; justify-content: space-between; align-items: center; }
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } .img-box { height: 250px; } }
    </style>
</head>
