<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING - الجملة</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .img-box { width: 100%; height: 200px; object-fit: contain; background: #fff; border-radius: 10px; margin-bottom: 10px; }
        
        /* زر التفاصيل */
        .details-btn { background: #444; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
        
        /* النافذة المنبثقة (Modal) */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #D4AF37; width: 80%; max-width: 300px; }
        
        .pack-control { margin-top: 15px; padding: 10px; background: #222; border-radius: 8px; }
        .qty-input { width: 60px; padding: 5px; text-align: center; background: #000; color: #D4AF37; border: 1px solid #D4AF37; }
        .order-btn { background: #25D366; color: #000; padding: 10px; width: 100%; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <img src="shirt.png" class="img-box">
            <h3>تيشيرت بوكس</h3>
            <button class="details-btn" onclick="openDetails('الأزرق، الرمادي، الأبيض، الأسود', 'M, L, XL, 2XL')">عرض التفاصيل 📋</button>
            <div class="pack-control">
                عدد الشدات: <input type="number" class="pack-qty" value="0" min="0">
            </div>
            <button class="order-btn" onclick="sendOrder('تيشيرت بوكس', this.parentElement, 16)">طلب الشدة 🛒</button>
        </div>
    </div>

    <div id="detailsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modalName">التفاصيل</h3>
            <p>الألوان: <span id="modalColors"></span></p>
            <p>المقاسات: <span id="modalSizes"></span></p>
            <button onclick="document.getElementById('detailsModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        function openDetails(colors, sizes) {
            document.getElementById('modalColors').innerText = colors;
            document.getElementById('modalSizes').innerText = sizes;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function sendOrder(name, card, totalPerPack) {
            let count = card.querySelector('.pack-qty').value;
            if(count <= 0) { alert("حدد عدد الشدات!"); return; }
            let msg = `طلب جديد: *${name}*\nالكمية: ${count} شدة (${count * totalPerPack} حبة).`;
            window.open("https://wa.me/966502777884?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
