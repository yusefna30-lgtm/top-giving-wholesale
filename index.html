<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; margin: 0; padding-bottom: 150px; text-align: center; }
        .brand { font-size: 2.2rem; color: var(--gold); margin: 20px 0; font-weight: 900; letter-spacing: 3px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        .card { 
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--accent); 
            padding: 20px; transition: 0.3s; position: relative;
        }

        /* إصلاح حجم الصورة والتوهج */
        .img-box { 
            width: 100%; height: 250px; /* حجم ثابت ومتناسق */
            background: #fff; border-radius: 15px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        
        .product-img { 
            max-width: 80%; max-height: 80%; /* تصغير الصورة لتناسب الإطار */
            transition: 0.5s ease; 
        }

        .card:hover .product-img { 
            transform: scale(1.1); 
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.6)); /* توهج ذهبي ناعم */
        }

        /* دوائر الألوان */
        .color-dots { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .dot { 
            width: 25px; height: 25px; border-radius: 50%; border: 2px solid #444; 
            cursor: pointer; transition: 0.3s;
        }
        .dot.active { 
            border-color: var(--gold); transform: scale(1.2); 
            box-shadow: 0 0 15px var(--gold); /* توهج اللون النشط */
        }

        /* التحكم بالكمية - أزرار الجملة */
        .qty-control { 
            display: flex; align-items: center; justify-content: center; 
            background: #1a1a1a; border-radius: 12px; padding: 10px; margin-bottom: 15px;
        }
        .btn-q { 
            background: #333; color: var(--gold); border: none; 
            width: 40px; height: 40px; border-radius: 8px; 
            font-size: 1.5rem; cursor: pointer; font-weight: bold;
        }
        .q-val { font-size: 1.3rem; font-weight: 900; color: #fff; margin: 0 20px; min-width: 40px; }

        .btn-add { 
            background: linear-gradient(135deg, #D4AF37, #8A6D3B); 
            color: #000; border: none; width: 100%; padding: 15px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Cairo';
        }

        /* شريط السلة السفلي */
        .cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(10, 10, 10, 0.95); border-top: 2px solid var(--gold); 
            padding: 20px; display: none; z-index: 1000;
        }
    </style>
</head>

                <div class="dot" style="background: #daa520;" onclick="upd('01','t1-yellow.png','خردلي',this)"></div>
            </div>
            <div class="model-name">موديل 01</div>

            </div>
