<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING - المتجر المطور</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px; }
        
        /* الكارد مع تأثير الزوم والهالة */
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; transition: 0.4s; }
        .card:hover { border-color: #D4AF37; box-shadow: 0 0 20px #D4AF37; transform: translateY(-5px); }
        
        .img-container { width: 100%; height: 220px; overflow: hidden; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .img-box { width: 100%; height: 100%; object-fit: contain; background: #fff; transition: 0.5s; }
        .card:hover .img-box { transform: scale(1.1); }

        /* الأزرار الدائمة */
        .color-dot { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin: 3px; border: 1px solid #fff; }
        .size-btn { border: 1px solid #555; padding: 2px 8px; font-size: 11px; margin: 2px; }
        
        /* زر التفاصيل والطلب */
        .details-btn { background: #444; color: #fff; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .order-btn { background: #25D366; color: #000; padding: 10px; width: 100%; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
        
        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #D4AF37; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <div class="img-container">
                <img src="shirt.png" class="img-box">
            </div>
            <h3>تيشيرت بوكس</h3>
            
            <div>
                <span class="color-dot" style="background:blue"></span>
                <span class="color-dot" style="background:grey"></span>
                <span class="color-dot" style="background:white"></span>
            </div>
            <div style="margin: 10px 0;">
                <span class="size-btn">M</span><span class="size-btn">L</span><span class="size-btn">XL</span><span class="size-btn">2XL</span>
            </div>

            <button class="details-btn" onclick="openDetails('4 ألوان', 'M, L, XL, 2XL')">عرض التفاصيل 📋</button>
            <div style="margin-top:10px;">
                عدد الشدات: <input type="number" class="pack-qty" value="0" min="0" style="width:50px;">
            </div>
            <button class="order-btn" onclick="sendOrder('تيشيرت بوكس', this.parentElement, 16)">طلب الشدة 🛒</button>
        </div>
    </div>

    <div id="detailsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>التفاصيل الفنية</h3>
            <p>الشدة تحتوي على 4 ألوان و 4 مقاسات متنوعة.</p>
            <button onclick="document.getElementById('detailsModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        function openDetails(c, s) { document.getElementById('detailsModal').style.display = 'flex'; }
        function sendOrder(name, card, total) {
            let count = card.querySelector('.pack-qty').value;
            if(count <= 0) { alert("حدد عدد الشدات!"); return; }
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent('طلب: ' + name + ' | ' + count + ' شدة (' + count * total + ' حبة)')}`);
        }
    </script>
</body>
</html>
