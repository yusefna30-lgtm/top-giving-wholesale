<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --gray: #888; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; overflow-x: hidden; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0 10px; font-weight: 900; letter-spacing: 3px; }
        .tagline { color: var(--gray); font-size: 0.9rem; margin-bottom: 30px; }

        /* الأقسام */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 15px; }
        .tab-btn { background: var(--accent); color: #fff; border: 1px solid var(--gold); padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .section-content { display: none; width: 100%; }
        .section-content.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; transition: 0.3s; height: auto; }
        
        /* الإطار الأبيض مع التوهج والزوم */
        .img-box { 
            width: 100%; height: 220px; border-radius: 15px; overflow: hidden; background: #fff; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; transition: 0.4s ease;
        }
        .product-img { max-width: 85%; max-height: 85%; object-fit: contain; transition: 0.5s ease; }

        /* تأثير التوهج على حواف الإطار عند التمرير */
        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 25px 5px rgba(212, 175, 55, 0.5); }
        .card:hover .product-img { transform: scale(1.1); }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; height: 30px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); }

        .model-name { font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; }
        
        /* إصلاح الأزرار والمحاذاة */
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #151515; padding: 10px; border-radius: 12px; border: 1px solid #252525; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 40px; font-size: 1.2rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 15px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 1rem; }

        /* سلة الطلبات السفليّة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 20px; display: none; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .cart-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        #cartSummary { font-weight: 900; color: var(--gold); font-size: 1.2rem; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 280px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>
    <div class="tagline">WHOLESALE - الشد المشكل الأصلي</div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openSection('tshirts', this)">التيشيرتات</button>
        <button class="tab-btn" onclick="openSection('sets', this)">الأطقم</button>
    </div>

    <div id="tshirts" class="section-content active">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="n5-white.png.png" id="img-m1" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #fff;" onclick="view('m1','n5-white.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('m1','n5-black.png.png',this)"></div>
                    <div class="dot" style="background: purple;" onclick="view('m1','n5-purple.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 01</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('qm1',-16)">-</button>
                    <span id="qm1" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('qm1',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('موديل 01', 'qm1')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="t2-purple.png.png" id="img-m2" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: purple;" onclick="view('m2','t2-purple.png.png',this)"></div>
                    <div class="dot" style="background: #fff;" onclick="view('m2','t2-white.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('m2','t2-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 02</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('qm2',-16)">-</button><span id="qm2" class="q-val">16</span><button class="btn-q" onclick="chg('qm2',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('موديل 02', 'qm2')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="te3-beige.png.png" id="img-m3" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #F5F5DC;" onclick="view('m3','te3-beige.png.png',this)"></div>
                    <div class="dot" style="background: skyblue;" onclick="view('m3','te2-blue.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('m3','te1-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 03</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('qm3',-16)">-</button><span id="qm3" class="q-val">16</span><button class="btn-q" onclick="chg('qm3',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('موديل 03', 'qm3')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="tr1-red.png.png" id="img-m4" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: red;" onclick="view('m4','tr1-red.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('m4','tr2-black.png.png',this)"></div>
                    <div class="dot" style="background: gray;" onclick="view('m4','tr3-grey.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 04</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('qm4',-16)">-</button><span id="qm4" class="q-val">16</span><button class="btn-q" onclick="chg('qm4',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('موديل 04', 'qm4')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="n5-white.png.png" id="img-m5" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #fff;" onclick="view('m5','n5-white.png.png',this)"></div>
                    <div class="dot" style="background: gray;" onclick="view('m5','n6-grey.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('m5','n5-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 05</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('qm5',-16)">-</button><span id="qm5" class="q-val">16</span><button class="btn-q" onclick="chg('qm5',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('موديل 05', 'qm5')">إضافة الشد المشكل</button>
            </div>
        </div>
    </div>

    <div id="sets" class="section-content">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="Picsart_26-05-28_16-28-24-642.jpg" id="img-set1" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #000;" onclick="view('set1','Picsart_26-05-28_16-28-24-642.jpg',this)"></div>
                    <div class="dot" style="background: beige;" onclick="view('set1','Picsart_beige.jpg',this)"></div>
                </div>
                <div class="model-name">طقم رجالي فاخر</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('qset1',-16)">-</button><span id="qset1" class="q-val">16</span><button class="btn-q" onclick="chg('qset1',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('طقم فاخر', 'qset1')">إضافة الشد المشكل</button>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cartBar">
        <div class="cart-container">
            <div id="cartSummary">إجمالي: 0 قطعة</div>
            <button class="btn-add" style="width: auto; padding: 10px 30px;" onclick="send()">إتمام الطلب</button>
        </div>
    </div>

    <script>
        let cart = [];

        function openSection(id, btn) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function chg(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) el.innerText = current + val;
        }

        function view(id, img, dot) {
            document.getElementById('img-' + id).src = img;
            dot.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        }

        function add(name, qtyId) {
            let q = parseInt(document.getElementById(qtyId).innerText);
            let item = cart.find(i => i.name === name);
            if (item) item.qty += q; else cart.push({ name: name, qty: q });
            
            let total = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartBar').style.display = 'block';
            document.getElementById('cartSummary').innerText = `إجمالي: ${total} قطعة (${total/16} شد)`;
        }

        function send() {
            let msg = "طلب جملة جديد:\n" + cart.map(i => `• ${i.name}: ${i.qty} قطعة`).join('\n');
            window.open(`https://wa.me/966XXXXXXXXX?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
