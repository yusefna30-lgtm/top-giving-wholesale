<div class="card">
    <div class="img-box">
        <img src="tshert-oversize01-white.png" id="main-img-01" class="product-img">
    </div>

    <div class="color-dots">
        <div class="dot" style="background: #fff;" onclick="changeProductImage('01', 'tshert-oversize01-white.png', 'أبيض', this)"></div>
        <div class="dot" style="background: #87CEEB;" onclick="changeProductImage('01', 'tshert-oversize01-blue.png', 'سماوي', this)"></div>
        <div class="dot" style="background: #000;" onclick="changeProductImage('01', 'tshert-oversize01-black.png', 'أسود', this)"></div>
        <div class="dot" style="background: #DAA520;" onclick="changeProductImage('01', 'tshert-oversize01-yellow.png', 'خردلي', this)"></div>
    </div>

    <div class="model-name">تيشيرت موديل 01</div>
    <div class="packing-info">الشد: 16 حبة</div>
    
    <div class="qty-control">
        <button class="btn-q" onclick="chg('t01',-16,16)">-</button>
        <span id="t01" class="q-val">16</span>
        <button class="btn-q" onclick="chg('t01',16,16)">+</button>
    </div>
    <button class="btn-add" onclick="buy('موديل 01','t01')">إضافة للطلب</button>
</div>

<script>
// هذه الوظيفة هي المسؤولة عن تغيير الصورة وتحديد اللون
function changeProductImage(modelId, newSrc, colorName, element) {
    // 1. تغيير مسار الصورة الأساسية
    document.getElementById('main-img-' + modelId).src = newSrc;
    
    // 2. تمييز الدائرة المختارة (إضافة إطار ذهبي وتوهج)
    let dots = element.parentElement.querySelectorAll('.dot');
    dots.forEach(d => d.style.border = "2px solid #fff"); // إعادة تعيين الكل
    element.style.border = "3px solid #D4AF37"; // تمييز المختارة
    element.style.boxShadow = "0 0 10px #D4AF37";
    
    // 3. تخزين اللون المختار لإرساله في الواتساب
    selColors['t' + modelId] = colorName;
}
</script>
