<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        
        <div class="card tshirt show">
            <div class="img-box"><img src="kenz-black.png" id="p08000" class="product-img"></div>
            <h3>تشيرت بوكس</h3>
            <p>موديل: 08000</p>
            <div class="controls">
                <button onclick="c('p08000', -1)">-</button>
                <span id="p08000-qty">16</span>
                <button onclick="c('p08000', 1)">+</button>
            </div>
            <button class="btn-add" onclick="add('تشيرت بوكس 08000', 'p08000-qty', this)">إضافة</button>
        </div>

        <div class="card tshirt show">
            <div class="img-box"><img src="n5-back.png" id="it01" class="product-img"></div>
            <h3>تيشيرت 01</h3>
            <p>موديل: N5</p>
            <div class="controls">
                <button onclick="c('it01', -1)">-</button>
                <span id="it01-qty">1</span>
                <button onclick="c('it01', 1)">+</button>
            </div>
            <button class="btn-add" onclick="add('تيشيرت 01', 'it01-qty', this)">إضافة</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
