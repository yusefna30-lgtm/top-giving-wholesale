<div id="cart-bar" class="cart-bar">
    <div id="cart-summary" style="margin-bottom: 10px; font-size: 0.9rem; color: #D4AF37;"></div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-add" onclick="sendWA()" style="background:#fff; color:#000; flex: 2;">إرسال عبر واتساب</button>
        <button class="btn-add" onclick="clearCart()" style="background:#ff4444; color:#fff; flex: 1;">مسح</button>
    </div>
</div>

<script>
    let cart = {}; 
    let selColors = {};

    // تهيئة الألوان الافتراضية عند التحميل
    function initDefaults() { 
        selColors['01']='أبيض'; selColors['02']='بنفسجي'; selColors['03']='بيج'; 
        selColors['04']='أحمر'; selColors['05']='أبيض'; selColors['sm']='أسود'; 
    }

    // تحديث اللون والصورة
    function upd(id, src, c, el) {
        let img = document.getElementById('img-' + id);
        if(img) img.src = src;
        el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active'); 
        selColors[id] = c;
    }

    // تغيير الكمية (بمضاعفات 16 لأنها جملة)
    function chg(id, v) {
        let q = document.getElementById(id); 
        let res = parseInt(q.innerText) + v;
        if(res < 16) res = 16; 
        q.innerText = res;
    }

    // إضافة المنتج للسلة
    function buy(id, name, qId) {
        let color = selColors[id] || "أساسي";
        let qty = document.getElementById(qId).innerText;
        
        // استخدام مفتاح فريد يجمع بين المعرف واللون لتجنب التكرار
        let itemKey = id + '_' + color;
        cart[itemKey] = { name: name, color: color, qty: qty };
        
        updateCartUI();
        
        // تنبيه بسيط للمستخدم
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "✓ تمت الإضافة";
        btn.style.background = "#28a745";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "linear-gradient(135deg, #D4AF37, #8A6D3B)";
        }, 1000);
    }

    // تحديث واجهة السلة (Bar)
    function updateCartUI() {
        let cartBar = document.getElementById('cart-bar');
        let summary = document.getElementById('cart-summary');
        let count = Object.keys(cart).length;
        
        if(count > 0) {
            cartBar.style.display = 'block';
            summary.innerText = `لديك ${count} منتجات في السلة`;
        } else {
            cartBar.style.display = 'none';
        }
    }

    // مسح السلة
    function clearCart() {
        if(confirm("هل تريد إفراغ السلة؟")) {
            cart = {};
            updateCartUI();
        }
    }

    // إرسال الطلب عبر واتساب
    function sendWA() {
        if (Object.keys(cart).length === 0) {
            alert("السلة فارغة!");
            return;
        }

        let message = "📦 *طلب جملة جديد - TOP GIVING*\n";
        message += "--------------------------\n";
        
        for (let k in cart) {
            message += `▫️ *${cart[k].name}*\n`;
            message += `   اللون: ${cart[k].color}\n`;
            message += `   الكمية: ${cart[k].qty} قطعة\n`;
            message += "--------------------------\n";
        }
        
        let waUrl = "https://wa.me/966560564719?text=" + encodeURIComponent(message);
        window.open(waUrl, '_blank');
    }
</script>
