<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #D4AF37; }
        .product-img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 15px; }
        .btn-add { background: #D4AF37; color: #000; padding: 12px; border-radius: 10px; border: none; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>متجر TOP GIVING</h1>
    <div class="grid" id="product-list"></div>

    <script>
        // هنا يمكنك إضافة كل منتجاتك بسهولة
        const products = [
            { name: "تيشيرت Boxy", img: "b1.png" },
            { name: "طقم 01", img: "s1-white.png.png" } 
            // أضف أي منتج جديد هنا بنفس الطريقة
        ];

        const list = document.getElementById('product-list');
        products.forEach(p => {
            list.innerHTML += `
                <div class="card">
                    <img src="${p.img}" class="product-img">
                    <h3>${p.name}</h3>
                    <button class="btn-add" onclick="window.open('https://wa.me/966560564719')">طلب عبر الواتساب</button>
                </div>
            `;
        });
    </script>
</body>
</html>
