<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر المطور</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: #fff; text-align: center; font-family: sans-serif; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { display: none; background: #0c0c0e; padding: 10px; border-radius: 15px; border: 1px solid #222; }
        .card.show { display: block; }
        .img-box { position: relative; height: 150px; background: #fff; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .zoom { position: absolute; bottom: 5px; left: 5px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 5px; }
        .dots { display: flex; justify-content: center; gap: 5px; margin: 5px 0; }
        .dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 1px solid #555; }
        .btn-add { background: var(--gold); border: none; width: 100%; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div style="padding:15px;">
        <button onclick="f('tshirt')">تيشيرتات</button>
        <button onclick="f('set')">أطقم</button>
        <button onclick="f('pants')">شورتات</button>
    </div>
    <div class="grid" id="grid">
        <div class="card tshirt show"><div class="img-box"><img src="n5-back.png.png" id="t1"><div class="zoom" onclick="z('t1')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="t1-white.png" id="t2"><div class="zoom" onclick="z('t2')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="t2-black.png.png" id="t3"><div class="zoom" onclick="z('t3')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="tr1-red.png.png" id="t4"><div class="zoom" onclick="z('t4')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="te1-black.png.png" id="t5"><div class="zoom" onclick="z('t5')">🔍</div></div><button class="btn-add">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s1-white.png.png" id="s1"><div class="zoom" onclick="z('s1')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s2-black.jpg" id="s2"><div class="zoom" onclick="z('s2')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s3-black.jpg" id="s3"><div class="zoom" onclick="z('s3')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s4-black.jpg" id="s4"><div class="zoom" onclick="z('s4')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s5-black.jpg" id="s5"><div class="zoom" onclick="z('s5')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea-black.png" id="s6"><div class="zoom" onclick="z('s6')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea1-off-withe.png" id="s7"><div class="zoom" onclick="z('s7')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea2-brown.png" id="s8"><div class="zoom" onclick="z('s8')">🔍</div></div><button class="btn-add">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" id="p1"><div class="zoom" onclick="z('p1')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps185-grey.png" id="p2"><div class="zoom" onclick="z('p2')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps0033-heavenly.png" id="p3"><div class="zoom" onclick="z('p3')">🔍</div></div><button class="btn-add">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps176-white.png" id="p4"><div class="zoom" onclick="z('p4')">🔍</div></div><button class="btn-add">إضافة</button></div>
    </div>
    <div id="m" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center;" onclick="this.style.display='none'"><img id="imgF" style="max-width:90%"></div>
    <script>
        function f(cat) { document.querySelectorAll('.card').forEach(c => c.style.display = c.classList.contains(cat) ? 'block' : 'none'); }
        function z(id) { document.getElementById('imgF').src = document.getElementById(id).src; document.getElementById('m').style.display = 'flex'; }
    </script>
</body>
</html>
