<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #222; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 80px; width: auto; margin-bottom: 15px; filter: drop-shadow(0 0 8px var(--gold)); }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 50px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); flex-direction: column; align-items: center; transition: 0.3s; }
        .card.show { display: flex; }
        .card:hover { border-color: var(--gold); }
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }
        .zoom-icon { position: absolute; bottom: 8px; left: 8px; cursor: pointer; font-size: 1.2rem; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); }
        .btn-add { background: var(--gold); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .back-to-top { position: fixed; bottom: 100px; right: 20px; background: var(--gold); color: #000; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 998; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        </div>

    <div id="back-to-top" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⬆️</div>

    <script>
        window.onscroll = function() {
            let btn = document.getElementById("back-to-top");
            btn.style.display = (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) ? "flex" : "none";
        };
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function initApp() { filterProducts('tshirt'); }
    </script>
</body>
</html>
