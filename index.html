<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 120px; width: auto; display: block; margin: 0 auto 10px; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4)); }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        .tab { background: #111; color: #fff; padding: 8px 20px; border-radius: 20px; border: 1px solid var(--accent); cursor: pointer; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; transition: 0.3s; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; height: 25px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 5px var(--gold); }
        .model-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 8px; border-radius: 10px; width: 90%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 32px; height: 32px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <img src="التقاط.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show"><div class="img-box"><img src="t2-black.png.png" id="it3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('it3','t2-black.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('it3','t2-purple.png.png',this)"></div><div class="dot" style="background:#fff" onclick="v('it3','t2-white.png.png',this)"></div><div class="dot" style="background:gray" onclick="v('it3','t2-grey.png.png',this)"></div></div><div class="model-name">تيشيرت 03</div><div class="qty-control"><button class="btn-q" onclick="c('qt3',16)">+</button><span id="qt3">16</span><button class="btn-q" onclick="c('qt3',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 03','qt3',this)">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s3-black.jpg" id="is3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('is3','s3-black.jpg',this)"></div><div class="dot" style="background:red" onclick="v('is3','s3-red.jpg',this)"></div><div class="dot" style="background:purple" onclick="v('is3','s3-purple.jpg',this)"></div><div class="dot" style="background:gray" onclick="v('is3','s3-grey.jpg',this)"></div></div><div class="model-name">طقم صيفي 03</div><div class="qty-control"><button class="btn-q" onclick="c('qs3',16)">+</button><span id="qs3">16</span><button class="btn-q" onclick="c('qs3',-16)">-</button></div><button class="btn-add" onclick="add('طقم 03','qs3',this)">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s4-black.jpg" id="is4" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('is4','s4-black.jpg',this)"></div><div class="dot" style="background:green" onclick="v('is4','s4-green.jpg',this)"></div><div class="dot" style="background:beige" onclick="v('is4','s4-beige.jpg',this)"></div><div class="dot" style="background:#fff" onclick="v('is4','s4-white.jpg',this)"></div></div><div class="model-name">طقم صيفي 04</div><div class="qty-control"><button class="btn-q" onclick="c('qs4',16)">+</button><span id="qs4">16</span><button class="btn-q" onclick="c('qs4',-16)">-</button></div><button class="btn-add" onclick="add('طقم 04','qs4',this)">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s5-black.jpg" id="is5" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('is5','s5-black.jpg',this)"></div><div class="dot" style="background:gray" onclick="v('is5','s5-grey.jpg',this)"></div><div class="dot" style="background:beige" onclick="v('is5','s5-beige.jpg',this)"></div><div class="dot" style="background:#fff" onclick="v('is5','s5-white.jpg',this)"></div></div><div class="model-name">طقم صيفي 05</div><div class="qty-control"><button class="btn-q" onclick="c('qs5',16)">+</button><span id="qs5">16</span><button class="btn-q" onclick="c('qs5',-16)">-</button></div><button class="btn-add" onclick="add('طقم 05','qs5',this)">إضافة</button></div>

        </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><div id="cart-info" style="color:var(--gold); font-weight:bold;">الإجمالي: 0 حبة</div><button class="btn-add" style="width:auto; padding:8px 20px;" onclick="send()">إرسال الطلب ✅</button></div></div>

    <script>
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; let dots = el.parentElement.querySelectorAll('.dot'); dots.forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function c(id, val) { 
            let el = document.getElementById(id); let curr = parseInt(el.innerText); 
            let min = (id.includes('sh')) ? 20 : (id.includes('sea') ? 12 : 16);
            if (curr + val >= min) el.innerText = curr + val; 
        }
        let order = [];
        function add(name, qtyId, btn) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`;
            btn.innerText = "تمت الإضافة ✅"; setTimeout(() => btn.innerText = "إضافة", 1500);
        }
        function send() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
