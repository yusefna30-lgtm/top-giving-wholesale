<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        /* رأس الصفحة - الإسم والأقسام */
        .header { padding: 30px 10px 15px; background: linear-gradient(to bottom, #111, #000); border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2.5rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin: 0; text-transform: uppercase; }
        .categories { display: flex; justify-content: center; gap: 15px; margin-top: 15px; overflow-x: auto; padding: 5px; }
        .cat-item { background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 25px; font-size: 0.9rem; font-weight: bold; border: 1px solid var(--gold); white-space: nowrap; }

        /* الشبكة المتوازنة */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); transition: 0.3s; }
        
        /* إطار الصورة (الوزنية الوسطية) */
        .img-box { 
            width: 100%; height: 175px; border-radius: 15px; overflow: hidden; background: #fff; 
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
        }
        @media (min-width: 992px) { .img-box { height: 220px; } }

        .product-img { width: 100%; height: 100%; object-fit: contain; transform: scale(1.1); transition: 0.5s; }
        .card:hover .product-img { transform: scale(1.25); }

        /* الألوان والأزرار */
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }
        
        .model-name { font-size: 1rem; font-weight: 900; margin-bottom: 10px; color: #fff; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; background: #151515; padding: 8px; border-radius: 12px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .q-val { color: var(--gold); font-weight: 900; font-size: 1.1rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        /* السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand-name">TOP GIVING</h1>
        <div class="categories">
            <div class="cat-item">التيشيرتات</div>
            <div class="cat-item">الأطقم الصيفية</div>
            <div class="cat-item">البنطلونات</div>
            <div class="cat-item">جديدنا</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="tr1-red.png.png" id="img-04" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: red;" onclick="v('04', 'tr1-red.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('04', 'tr2-black.png.png', this)"></div>
                <div class="dot" style="background: #F5F5DC;" onclick="v('04', 'tr3-beige.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('04', 'tr4-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 04</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-04', 16)">+</button>
                <span id="q-04" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-04', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToOrder('موديل 04', 'q-04')">إضافة للطلب</button>
        </div>
    </div>

    <div class="cart-bar" id="cart-bar">
        <div class="cart-flex">
            <div id="cart-info" style="font-weight: 900; color: var(--gold);">الإجمالي: 0 شدة</div>
            <button class="btn-add" style="width: auto; padding: 10px 25px;" onclick="sendWhatsApp()">إرسال الطلب</button>
        </div>
    </div>

    <script>
        function v(id, path, el) {
            document.getElementById('img-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }
        function c(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }
        let order = [];
        function addToOrder(name, qtyId) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            let item = order.find(i => i.name === name);
            if (item) { item.qty += qty; } else { order.push({ name: name, qty: qty }); }
            updateCart();
        }
        function updateCart() {
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('cart-info').innerText = `الإجمالي: ${total/16} شدة`;
        }
        function sendWhatsApp() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty/16} شدة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
