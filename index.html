<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | متجر الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab { background: #111; color: #fff; padding: 8px 25px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 170px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 95%; max-height: 95%; object-fit: contain; transform: scale(1.1); transition: 0.4s; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; min-height: 25px; flex-wrap: wrap; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.1); }
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 5, 5, 0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; backdrop-filter: blur(10px); }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-clear { background: #441111; color: #ff5555; border: 1px solid #662222; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt"><div class="img-box"><img src="n5-back.png.png" id="p1" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('p1','n5-back.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('p1','n5-purple.png.png',this)"></div><div class="dot" style="background:#fff" onclick="v('p1','n5-white.png.png',this)"></div></div><div class="model-name">تيشيرت 01</div><div class="qty-control"><button class="btn-q" onclick="c('q1',16)">+</button><span id="q1">16</span><button class="btn-q" onclick="c('q1',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 01','q1',this)">إضافة</button></div>
        
        <div class="card tshirt"><div class="img-box"><img src="t1-white.png" id="p2" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#fff" onclick="v('p2','t1-white.png',this)"></div><div class="dot" style="background:#000" onclick="v('p2','t1-black.png',this)"></div><div class="dot" style="background:blue" onclick="v('p2','t1-blue.png',this)"></div><div class="dot" style="background:gold" onclick="v('p2','t1-yellow.png',this)"></div></div><div class="model-name">تيشيرت 02</div><div class="qty-control"><button class="btn-q" onclick="c('q2',16)">+</button><span id="q2">16</span><button class="btn-q" onclick="c('q2',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 02','q2',this)">إضافة</button></div>

        <div class="card tshirt"><div class="img-box"><img src="t2-black.png.png" id="p3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('p3','t2-black.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('p3','t2-purple.png.png',this)"></div><div class="dot" style="background:#fff" onclick="v('p3','t2-white.png.png',this)"></div></div><div class="model-name">تيشيرت 03</div><div class="qty-control"><button class="btn-q" onclick="c('q3',16)">+</button><span id="q3">16</span><button class="btn-q" onclick="c('q3',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 03','q3',this)">إضافة</button></div>

        <div class="card tshirt"><div class="img-box"><img src="tr1-red.png.png" id="p4" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:red" onclick="v('p4','tr1-red.png.png',this)"></div><div class="dot" style="background:#000" onclick="v('p4','tr2-black.png.png',this)"></div></div><div class="model-name">تيشيرت 04</div><div class="qty-control"><button class="btn-q" onclick="c('q4',16)">+</button><span id="q4">16</span><button class="btn-q" onclick="c('q4',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 04','q4',this)">إضافة</button></div>

        <div class="card tshirt"><div class="img-box"><img src="te1-black.png.png" id="p5" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#000" onclick="v('p5','te1-black.png.png',this)"></div><div class="dot" style="background:#fff" onclick="v('p5','te4-white.png.png',this)"></div></div><div class="model-name">تيشيرت 05</div><div class="qty-control"><button class="btn-q" onclick="c('q5',16)">+</button><span id="q5">16</span><button class="btn-q" onclick="c('q5',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 05','q5',this)">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s1-white.png.png" id="s1" class="product-img"></div><div class="model-name">طقم 01</div><div class="qty-control"><button class="btn-q" onclick="c('qs1',16)">+</button><span id="qs1">16</span><button class="btn-q" onclick="c('qs1',-16)">-</button></div><button class="btn-add" onclick="add('طقم 01','qs1',this)">إضافة</button></div>
        
        <div class="card set"><div class="img-box"><img src="sea2-brown.png" id="psea3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#8b4513" onclick="v('psea3','sea2-brown.png',this)"></div><div class="dot" style="background:#ffc0cb" onclick="v('psea3','sea2-pink.png',this)"></div><div class="dot" style="background:#808080" onclick="v('psea3','sea2-grey.png',this)"></div></div><div class="model-name">طقم Sea 03</div><div class="qty-control"><button class="btn-q" onclick="c('qsea3',12)">+</button><span id="qsea3">12</span><button class="btn-q" onclick="c('qsea3',-12)">-</button></div><button class="btn-add" onclick="add('Sea 03','qsea3',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" id="psh1" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#d2b48c" onclick="v('psh1','mps182-beige.png',this)"></div><div class="dot" style="background:#000" onclick="v('psh1','mps182-black.png',this)"></div><div class="dot" style="background:blue" onclick="v('psh1','mps182-blue.png',this)"></div><div class="dot" style="background:#fff" onclick="v('psh1','mps182-white.png',this)"></div></div><div class="model-name">شورت 182</div><div class="qty-control"><button class="btn-q" onclick="c('qsh1',20)">+</button><span id="qsh1">20</span><button class="btn-q" onclick="c('qsh1',-20)">-</button></div><button class="btn-add" onclick="add('شورت 182','qsh1',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps185-grey.png" id="psh2" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#808080" onclick="v('psh2','mps185-grey.png',this)"></div><div class="dot" style="background:#000" onclick="v('psh2','mps185-black.png',this)"></div><div class="dot" style="background:#4b5320" onclick="v('psh2','mps185-green.png',this)"></div><div class="dot" style="background:#fff" onclick="v('psh2','mps185-white.png',this)"></div></div><div class="model-name">شورت 185</div><div class="qty-control"><button class="btn-q" onclick="c('qsh2',20)">+</button><span id="qsh2">20</span><button class="btn-q" onclick="c('qsh2',-20)">-</button></div><button class="btn-add" onclick="add('شورت 185','qsh2',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps0033-heavenly.png" id="psh3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#87CEEB" onclick="v('psh3','mps0033-heavenly.png',this)"></div><div class="dot" style="background:#000" onclick="v('psh3','mps0033-black.png',this)"></div><div class="dot" style="background:#fff" onclick="v('psh3','mps0033-white.png',this)"></div><div class="dot" style="background:#4b5320" onclick="v('psh3','mps0033-green.png',this)"></div></div><div class="model-name">شورت 0033</div><div class="qty-control"><button class="btn-q" onclick="c('qsh3',20)">+</button><span id="qsh3">20</span><button class="btn-q" onclick="c('qsh3',-20)">-</button></div><button class="btn-add" onclick="add('شورت 0033','qsh3',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps176-white.png" id="psh4" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#fff" onclick="v('psh4','mps176-white.png',this)"></div><div class="dot" style="background:#000" onclick="v('psh4','mps176-black.png',this)"></div><div class="dot" style="background:#808080" onclick="v('psh4','mps176-grey.png',this)"></div><div class="dot" style="background:#8b4513" onclick="v('psh4','mps176-brown.png',this)"></div></div><div class="model-name">شورت 176</div><div class="qty-control"><button class="btn-q" onclick="c('qsh4',20)">+</button><span id="qsh4">20</span><button class="btn-q" onclick="c('qsh4',-20)">-</button></div><button class="btn-add" onclick="add('شورت 176','qsh4',this)">إضافة</button></div>
    </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><button class="btn-clear" onclick="clearCart()">تصفير 🗑️</button><div id="cart-info" style="color:var(--gold); font-weight:900;">الإجمالي: 0 حبة</div><button class="btn-add" style="width:auto; padding:10px 20px;" onclick="send()">إرسال ✅</button></div></div>

    <script>
        let order = [];
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; let dots = el.parentElement.querySelectorAll('.dot'); dots.forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function c(id, val) { 
            let el = document.getElementById(id); let curr = parseInt(el.innerText); 
            let step = (id.includes('qs')) ? 16 : (id.includes('qsea') ? 12 : (id.includes('qsh') ? 20 : 16));
            if (curr + val >= step) el.innerText = curr + val; 
        }
        function add(name, qtyId, btn) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`;
            btn.innerText = "تمت الإضافة ✅"; setTimeout(() => btn.innerText = "إضافة", 1500);
        }
        function clearCart() { if(confirm("مسح السلة؟")) { order = []; document.getElementById('cart-bar').style.display = 'none'; } }
        function send() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
