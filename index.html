<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 100px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; transition: all 0.3s ease; position: relative; }
        .card.show { display: flex; }
        .card:hover { box-shadow: 0 0 20px var(--gold); border-color: var(--gold); transform: translateY(-2px); }
        
        .img-box { width: 100%; height: 220px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(1.1); transition: transform 0.3s ease; }
        .img-box:hover .product-img { transform: scale(1.5); }
        
        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.5); color: var(--gold); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.2rem; font-weight: bold; cursor: pointer; user-select: none; z-index: 10; }
        .arrow:hover { background: var(--gold); color: #000; }
        .arrow-right { right: 8px; }
        .arrow-left { left: 8px; }
        
        .model-info { margin-bottom: 12px; width: 100%; text-align: center; }
        .item-cat { color: #aaa; font-size: 0.85rem; }
        .item-mod { color: #fff; font-weight: bold; font-size: 1rem; margin-top: 2px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show" data-images="n5-back.png,n5-purple.png,n5-white.png,n5-black.png" data-index="0">
            <div class="img-box">
                <span class="arrow arrow-right" onclick="navImg(this, 1)">&gt;</span>
                <img src="n5-back.png" id="it01" class="product-img">
                <span class="arrow arrow-left" onclick="navImg(this, -1)">&lt;</span>
            </div>
            <div class="model-info"><div class="item-cat">الصنف: تيشيرت رجالي</div><div class="item-mod">موديل: 01</div></div>
            <div class="qty-control"><button class="btn-q" onclick="c('qt01',16)">+</button><span id="qt01">16</span><button class="btn-q" onclick="c('qt01',-16)">-</button></div>
            <button class="btn-add" onclick="add('تيشيرت 01','qt01',this)">إضافة للطلب</button>
        </div>
        </div>

    <script>
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function navImg(btn, dir) {
            let card = btn.closest('.card');
            let imgs = card.getAttribute('data-images').split(',');
            let currIdx = parseInt(card.getAttribute('data-index') || 0);
            currIdx = (currIdx + dir + imgs.length) % imgs.length;
            card.setAttribute('data-index', currIdx);
            card.querySelector('.product-img').src = imgs[currIdx];
        }
        function c(id, val) { let el = document.getElementById(id); if(el) { let curr = parseInt(el.innerText); if (curr + val >= 0) el.innerText = curr + val; } }
        function add(n, q, b) { b.innerText = "تمت ✅"; setTimeout(() => b.innerText = "إضافة", 1500); }
    </script>
</body>
</html>
