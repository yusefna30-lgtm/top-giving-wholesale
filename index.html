<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 120px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #1a1a1a; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .tab { padding: 8px 15px; background: #111; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #aaa; font-size: 14px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; border-color: #bfa030; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 20px; padding: 15px; text-align: center; }
        
        /* تكبير الصور لتناسب الجوال */
        .slider-container { position: relative; width: 100%; height: 400px; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #bfa030; border: none; width: 50px; height: 50px; cursor: pointer; z-index: 5; font-size: 24px; }
        .btn-add { background: #bfa030; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 10px 0; }
        .btn-q { background: #222; border: 1px solid #444; color: #fff; width: 45px; height: 45px; border-radius: 8px; cursor: pointer; font-size: 20px; }
        .model-text { color: #bfa030; font-size: 15px; margin: 5px 0; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #050505; padding: 15px; text-align: center; border-top: 1px solid #333; z-index: 100; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show(this, 'tshirts')">تيشيرتات</div>
        <div class="tab" onclick="show(this, 'sets')">أطقم</div>
        <div class="tab" onclick="show(this, 'shorts')">شورتات/بناطيل</div>
    </div>
</div>

<script>
    let myCart = {};
    function createCard(name, model, images, qty) {
        let id = "id" + Math.random().toString(36).substr(2, 9);
        let imgsHtml = images.map((img, i) => `<img src="${img}" class="product-img ${i===0?'active':''}">`).join('');
        document.write(`
            <div class="card">
                <div class="slider-container">
                    <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
                    ${imgsHtml}
                    <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
                </div>
                <b>${name}</b>
                <div class="model-text">موديل: ${model}</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="c(this, ${qty})">+</button>
                    <span class="qty" id="${id}" style="font-size:20px">${qty}</span>
                    <button class="btn-q" onclick="c(this, -${qty})">-</button>
                </div>
                <button class="btn-add" onclick="add('${name}', '${id}')">إضافة للطلب</button>
            </div>
        `);
    }
</script>

<div id="tshirts" class="tab-content active"><div class="grid">
    <script>
        createCard('تيشيرت SMILE', '08047', ['smile-white.png','smile-black.png','smile-olive.png','smile-beige.png'], 16);
        createCard('كينز بولو', '08076', ['kenz-blue.png','kenz-black.png','kenz-grey.png','kenz-sage.png'], 16);
    </script>
</div></div>

<div id="sets" class="tab-content"><div class="grid">
    <script>createCard('طقم بحر', 'SEA', ['sea-black.png','sea-navy.png','sea-red.png'], 12);</script>
</div></div>

<div id="shorts" class="tab-content"><div class="grid">
    <script>
        createCard('شورت MPS0033', '0033', ['mps0033-black.png','mps0033-green.png','mps0033-heavenly.png','mps0033-white.png'], 20);
    </script>
</div></div>

<div class="cart-bar"><button class="btn-add" style="max-width:300px; background:#bfa030" onclick="send()">إرسال الطلب للواتساب 📲</button></div>

<script>
    function show(el, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function slide(btn, dir) {
        const cont = btn.parentElement; const imgs = cont.querySelectorAll('.product-img');
        let active = cont.querySelector('.product-img.active');
        let idx = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        idx = (idx + dir + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
    }
    function c(btn, val) {
        let span = btn.parentElement.querySelector('.qty');
        let n = parseInt(span.innerText) + val;
        if(n >= Math.abs(val)) span.innerText = n;
    }
    function add(name, id) {
        myCart[name] = document.getElementById(id).innerText;
        alert("تمت إضافة " + name + " للطلب");
    }
    function send() {
        let msg = "مرحباً، أريد طلب:\n";
        for(let item in myCart) { msg += "- " + item + ": " + myCart[item] + " حبة\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
