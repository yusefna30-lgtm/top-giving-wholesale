<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold-main: #D4AF37; --gold-light: #f1d38e; --black: #000; --card-bg: #0c0c0e; --sub-group-bg: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; direction: rtl; }
        .brand { font-size: 2.8rem; color: var(--gold-main); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }

        .main-section-header {
            background: linear-gradient(to right, transparent, #4a3a1d, var(--gold-main), #4a3a1d, transparent);
            padding: 15px; font-size: 1.6rem; font-weight: 900; color: #000; margin: 30px 0;
            border-top: 1px solid var(--gold-light); border-bottom: 1px solid var(--gold-light);
        }

        .sub-group-title {
            color: var(--gold-light); font-size: 1.2rem; font-weight: bold;
            margin: 20px 0; display: block; border-bottom: 1px solid #222;
            padding-bottom: 10px; width: 90%; margin: 0 auto;
        }

        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            max-width: 1200px; margin: 0 auto; padding: 0 15px;
        }
        
        .card { 
            background: var(--card-bg); padding: 12px; border-radius: 12px; 
            border: 1px solid #1a1a1a; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }

        .img-box { width: 100%; height: 200px; border-radius: 8px; overflow: hidden; background: #111; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .model-name { font-size: 0.85rem; font-weight: bold; margin: 10px 0; color: #fff; min-height: 35px; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 12px 0; background: #000; padding: 5px; border-radius: 6px; border: 1px solid #333; }
        .btn-q { background: #222; color: #fff; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .q-val { font-weight: bold; color: var(--gold-main); min-width: 25px; font-size: 1.1rem; }

        .btn-add { 
            background: linear-gradient(to bottom, #e2c06d, #8a6d3b); 
            color: #000; padding: 10px; border-radius: 8px; 
            font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 0.9rem;
        }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold-main); padding: 15px; z-index: 1000; display: none; backdrop-filter: blur(5px); }
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .img-box { height: 320px; }
        }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="main-section-header">القسم الرجالي</div>

    <div class="sub-group-title">التيشيرتات والقمصان</div>
    <div class="grid">
        <div class="card">
            <div class="model-name">تيشيرت رجالي</div>
            <div class="img-box"><img src="pant-mens02.jpg" class="product-img"></div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('m1',-12,12)">-</button><span id="m1" class="q-val">12</span><button class="btn-q" onclick="chg('m1',12,12)">+</button>
            </div>
            <button class="btn-add" onclick="buy('تيشيرت رجالي','m1')">إضافة</button>
        </div>
    </div>

    <div class="sub-group-title">البناطيل والشورتات</div>
    <div class="grid">
        <div class="card">
            <div class="model-name">بنطلون رجالي PM0269</div>
            <div class="img-box"><img src="pant-mens01.jpg" class="product-img"></div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('m2',-6,6)">-</button><span id="m2" class="q-val">6</span><button class="btn-q" onclick="chg('m2',6,6)">+</button>
            </div>
            <button class="btn-add" onclick="buy('بنطلون 0269','m2')">إضافة</button>
        </div>
    </div>

    <div class="sub-group-title">الأطقم الكاملة</div>

            <div class="model-name">طقم رجالي موديل 02</div>
            <div class="img-box"><img src="mens-set02.jpg" class="product-img"></div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('m3',-6,6)">-</button><span id="m3" class="q-val">6</span><button class="btn-q" onclick="chg('m3',6,6)">+</button>
            </div>
