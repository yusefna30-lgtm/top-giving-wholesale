<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; padding-bottom: 160px; }
        .header { text-align: center; padding: 25px 15px; background-color: #000; border-bottom: 1px solid #1a1a1a; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background-color: #0a0a0a; border: 1px solid #151515; border-radius: 16px; padding: 18px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }

        /* تنسيق المنزلق (Slider) ليعمل بشكل صحيح */
        .slider-container { position: relative; width: 100%; height: 350px; border-radius: 12px; overflow: hidden; background-color: #050505; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; /* نخفي كل الصور */ }
        .product-img.active { display: block; /* نظهر الصورة النشطة فقط */ }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.6); color: #bfa030; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 24px; font-weight: bold; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .arrow-btn.prev { left: 8px; } .arrow-btn.next { right: 8px; }

        .model-name { font-size: 16px; margin: 12px 0 8px 0; font-weight: 600; color: #ffffff; }
        .product-model-number { color: #bfa030; font-weight: bold; margin-bottom: 12px; font-size: 14px; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 12px; background-color: #020202; padding: 10px; border-radius: 10px; border: 1px solid #111111; }
        .btn-q { background: none; border: 1px solid #333333; color: #ffffff; width: 35px; height: 35px; border-radius: 6px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .qty-num { font-size: 16px; font-weight: bold; min-width: 30px; color: #bfa030; }
        .btn-add { background-color: transparent; color: #bfa030; border: 1px solid #bfa030; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-add:hover { background-color: #bfa030; color: #000000; }
        .cart-navbar { position: fixed; bottom: 0; left: 0; right: 0; background-color: #050505; border-top: 1px solid #222222; padding: 15px 25px; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" alt="TOP GIVING" style="max-width: 160px; height: auto;">
</div>

<div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn prev" onclick="changeSlide(this, -1)">‹</button>
            <img src="smile-white.png" class="product-img active" alt="Smile 1">
            <img src="smile-black.png" class="product-img" alt="Smile 2">
            <img src="smile-olive.png" class="product-img" alt="Smile 3">
            <img src="smile-beige.png" class="product-img" alt="Smile 4">
            <button class="arrow-btn next" onclick="changeSlide(this, 1)">›</button>
        </div>
        <div class="model-name">تيشيرت SMILE</div>
        <div class="product-model-number">موديل: 08047</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c('qt_smile', 16)">+</button>
            <span id="qt_smile" class="qty-num">16</span>
            <button class="btn-q" onclick="c('qt_smile', -16)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت SMILE - 08047', 'qt_smile', this)">إضافة للطلب</button>
    </div>

    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn prev" onclick="changeSlide(this, -1)">‹</button>
            <img src="kenz-blue.png" class="product-img active" alt="Kenz 1">
            <img src="kenz-black.png" class="product-img" alt="Kenz 2">
            <img src="kenz-grey.png" class="product-img" alt="Kenz 3">
            <img src="kenz-sage.png" class="product-img" alt="Kenz 4">
            <button class="arrow-btn next" onclick="changeSlide(this, 1)">›</button>
        </div>
        <div class="model-name">كينز بولو | KENZ POLO</div>
        <div class="product-model-number">موديل: 08076</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c('qt_kenz', 16)">+</button>
            <span id="qt_kenz" class="qty-num">16</span>
            <button class="btn-q" onclick="c('qt_kenz', -16)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('كينز بولو - 08076', 'qt_kenz', this)">إضافة للطلب</button>
    </div>

    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn prev" onclick="changeSlide(this, -1)">‹</button>
            <img src="mps0033-black.png" class="product-img active" alt="Short 1">
            <img src="mps0033-green.png" class="product-img" alt="Short 2">
            <img src="mps0033-heavenly.png" class="product-img" alt="Short 3">
            <img src="mps0033-white.png" class="product-img" alt="Short 4">
            <button class="arrow-btn next" onclick="changeSlide(this, 1)">›</button>
        </div>
        <div class="model-name">شورت MPS0033</div>
        <div class="product-model-number">موديل: 0033</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c('qt_short', 20)">+</button>
            <span id="qt_short" class="qty-num">20</span>
            <button class="btn-q" onclick="c('qt_short', -20)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('شورت MPS0033 - 0033', 'qt_short', this)">إضافة للطلب</button>
    </div>

    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn prev" onclick="changeSlide(this, -1)">‹</button>
            <img src="mps176-black.png" class="product-img active" alt="Pants 1">
            <img src="mps176-brown.png" class="product-img" alt="Pants 2">
            <img src="mps176-grey.png" class="product-img" alt="Pants 3">
            <img src="mps176-white.png" class="product-img" alt="Pants 4">
            <button class="arrow-btn next" onclick="changeSlide(this, 1)">›</button>
        </div>
        <div class="model-name">بنطلون MPS176</div>
        <div class="product-model-number">موديل: 0176</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c('qt_pants176', 16)">+</button>
            <span id="qt_pants176" class="qty-num">16</span>
            <button class="btn-q" onclick="c('qt_pants176', -16)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('بنطلون MPS176 - 0176', 'qt_pants176', this)">إضافة للطلب</button>
    </div>

    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn prev" onclick="changeSlide(this, -1)">‹</button>
            <img src="sea-black.png" class="product-img active" alt="Sea 1">
            <img src="sea-navy.png" class="product-img" alt="Sea 2">
            <img src="sea-red.png" class="product-img" alt="Sea 3">
            <button class="arrow-btn next" onclick="changeSlide(this, 1)">›</button>
        </div>
        <div class="model-name">طقم بحر</div>
        <div class="product-model-number">موديل: SEA</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c('qt_sea', 12)">+</button>
            <span id="qt_sea" class="qty-num">12</span>
            <button class="btn-q" onclick="c('qt_sea', -12)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('طقم بحر - SEA', 'qt_sea', this)">إضافة للطلب</button>
    </div>
</div>

<div class="cart-navbar">
    <button class="btn-add" style="background-color: #bfa030; color: #000; border: none; padding: 12px 24px; max-width: 300px;" onclick="sendOrderWhatsApp()">إرسال الطلب بالكامل 📲</button>
</div>

<script>
    let cart = {};

    function changeSlide(button, direction) {
        const container = button.closest('.slider-container');
        const images = container.getElementsByClassName('product-img');
        let currentIndex = -1;

        // البحث عن الصورة النشطة حالياً
        for (let i = 0; i < images.length; i++) {
            if (images[i].classList.contains('active')) {
                currentIndex = i;
                break;
            }
        }

        if (currentIndex === -1) return; // لضمان وجود صورة نشطة

        // إزالة الفئة 'active' من الصورة الحالية
        images[currentIndex].classList.remove('active');

        // حساب الفهرس الجديد
        let nextIndex = currentIndex + direction;
        if (nextIndex >= images.length) nextIndex = 0;
        if (nextIndex < 0) nextIndex = images.length - 1;

        // إضافة الفئة 'active' للصورة الجديدة
        images[nextIndex].classList.add('active');
    }

    function c(id, amount) {
        const span = document.getElementById(id);
        let currentQty = parseInt(span.innerText);
        currentQty += amount;
        // الحد الأدنى هو الكمية الأساسية (مثلاً 16 أو 20 أو 12)
        if (currentQty < Math.abs(amount)) currentQty = Math.abs(amount);
        span.innerText = currentQty;
    }

    function addToCart(name, qtyId, button) {
        const qty = parseInt(document.getElementById(qtyId).innerText);
        const container = button.closest('.card').querySelector('.slider-container');
        const activeImg = container.querySelector('.product-img.active');
        const activeImgName = activeImg.getAttribute('src');

        const detailedName = `${name} (${activeImgName})`;
        cart[detailedName] = qty;
        alert(`تم إضافة ${qty} حبة من ${name} (اللون الحالي)`);
    }

    function sendOrderWhatsApp() {
        if (Object.keys(cart).length === 0) return;
        const phoneNumber = "966560564719"; 
        let message = `مرحباً براند TOP GIVING، أرغب في تأكيد طلبية جملة:\n\n`;
        for (const [name, qty] of Object.entries(cart)) {
            message += `📦 *المنتج:* ${name} -> *الكمية:* ${qty} حبة\n`;
        }
        window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>
</body>
</html>
