<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | الكتالوج المطور</title>
    <style>
        :root { --gold: #D4AF37; --bg: #000; --card: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .product-img { width: 100%; height: 180px; object-fit: contain; cursor: zoom-in; transition: 0.3s; }
        .color-selector { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #333; }
        .btn-add { background: var(--gold); border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* نافذة التكبير */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        #modal img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

<div class="grid" id="catalog"></div>

<div id="modal" onclick="this.style.display='none'">
    <img id="full-img" src="">
</div>

<script>
    const products = [
        { 
            name: 'تيشيرت 01', 
            cat: 'تيشيرتات', 
            colors: [
                { name: 'بيج', img: 'n5-back.png.png' },
                { name: 'بنفسجي', img: 'n5-purple.png.png' },
                { name: 'أسود', img: 'n5-black.png.png' }
            ]
        }
    ];

    function renderCatalog() {
        const container = document.getElementById('catalog');
        products.forEach((p, idx) => {
            container.innerHTML += `
                <div class="card">
                    <img id="img-${idx}" src="${p.colors[0].img}" class="product-img" onclick="openZoom('img-${idx}')">
                    <p>${p.name}</p>
                    <div class="color-selector">
                        ${p.colors.map(c => `<div class="color-dot" style="background:${c.name === 'أسود' ? '#000' : '#d4af37'}" onclick="changeColor('img-${idx}', '${c.img}')"></div>`).join('')}
                    </div>
                    <button class="btn-add">إضافة للطلب</button>
                </div>
            `;
        });
    }

    function changeColor(imgId, newSrc) {
        document.getElementById(imgId).src = newSrc;
    }

    function openZoom(imgId) {
        document.getElementById('full-img').src = document.getElementById(imgId).src;
        document.getElementById('modal').style.display = 'flex';
    }

    renderCatalog();
</script>
</body>
</html>
