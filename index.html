<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING - متجر الجملة</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .img-box { width: 100%; height: 250px; object-fit: contain; background: #fff; border-radius: 10px; margin-bottom: 10px; }
        
        /* أزرار الألوان والمقاسات (للعرض فقط) */
        .specs-container { margin-bottom: 15px; }
        .btn-mini { border: 1px solid #555; padding: 3px 8px; font-size: 10px; color: #aaa; margin: 2px; border-radius: 3px; cursor: default; }
        
        /* حقل الشدات */
        .pack-control { background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .qty-input { width: 50px; padding: 5px; text-align: center; background: #000; color: #D4AF37; border: 1px solid #D4AF37; }
        .order-btn { background: #25D366; color: #000; padding: 12px; width: 100%; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <img src="shirt.png" class="img-box">
            <h3>تيشيرت بوكس</h3>
            
            <div class="specs-container">
                <div>الألوان: <span class="btn-mini">أزرق</span> <span class="btn-mini">رمادي</span> <span class="btn-mini">أبيض</span> <span class="btn-mini">أسود</span></div>
                <div>المقاسات: <span class="btn-mini">M</span> <span class="btn-mini">L</span> <span class="btn-mini">XL</span> <span class="btn-mini">2XL</span></div>
            </div>

            <div class="pack-control">
                عدد الشدات (16 حبة/شدة): <br>
                <input type="number" class="pack-qty" value="0" min="0">
            </div>
            <button class="order-btn" onclick="sendOrder(this.parentElement, 16)">اطلب عبر واتساب 🛒</button>
        </div>
    </div>

    <script>
        function sendOrder(card, totalPerPack) {
            let name = card.querySelector('h3').innerText;
            let count = card.querySelector('.pack-qty').value;
            if(count <= 0) { alert("حدد عدد الشدات!"); return; }
            
            let msg = `طلب جديد: *${name}*\nالكمية: ${count} شدة (${count * totalPerPack} حبة).\nتذكير: الشدة تحتوي على 4 ألوان و 4 مقاسات.`;
            window.open("https://wa.me/966502777884?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
