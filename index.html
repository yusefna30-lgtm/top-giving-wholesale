<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .btn-add { background: #bfa030; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid" id="product-list">
        <div class="card">
            <img src="kenz-black.png" alt="منتج">
            <h3>تيشيرت Kenz</h3>
            <button class="btn-add" onclick="order('تيشيرت Kenz')">طلب عبر واتساب</button>
        </div>
        
        <div class="card">
            <img src="boxy-fashion1.png.png" alt="منتج">
            <h3>Boxy Fashion</h3>
            <button class="btn-add" onclick="order('Boxy Fashion')">طلب عبر واتساب</button>
        </div>
    </div>

    <script>
        function order(itemName) {
            let msg = "أرغب في طلب: " + itemName;
            window.location.href = "https://wa.me/966560564719?text=" + encodeURIComponent(msg);
        }
    </script>
</body>
</html>
