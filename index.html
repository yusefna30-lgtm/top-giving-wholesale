<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --gray: #888; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 140px; }
        
        /* الهوية البصرية */
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0 10px; font-weight: 900; letter-spacing: 3px; }
        .tagline { color: var(--gray); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; }

        /* نظام الأقسام (Tabs) */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding: 10px; sticky: top; top: 0; background: var(--black); z-index: 100; }
        .tab-btn { background: var(--accent); color: #fff; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        /* تنسيق الشبكة والكروت */
        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        
        .img-box { width: 100%; height: 200px; border-radius: 15px; overflow: hidden; background: #fff; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .color-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.2); box-shadow: 0 0 8px var(--gold); }

        .model-name { font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; background: #151515; padding: 10px; border-radius: 12px; }
        .btn-q { background: #252525; color: #fff; border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 40px; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 15px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; text-transform: uppercase; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } .img-box { height: 280px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>
    <div class="tagline">WHOLESALE - جودة الفخامة</div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openSection('tshirts', this)">التيشيرتات</button>
        <button class="tab-btn" onclick="openSection('sets', this)">الأطقم</button>
        <button class="tab-btn" onclick="openSection('pants', this)">البنطلون والشورت</button>
        <button class="tab-btn" onclick="openSection('shirts', this)">القمصان</button>
    </div>

    <div id="tshirts" class="section-content active">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="t1-white.png" id="img-01" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #fff;" onclick="upd('01','t1-white.png','أبيض',this)"></div>
                    <div class="dot" style="background: #000;" onclick="upd('01','t1-black.png','أسود',this)"></div>
                    <div class="dot" style="background: #0000FF;" onclick="upd('01','t1-blue.png','أزرق',this)"></div>
                    <div class="dot" style="background: #DAA520;" onclick="upd('01','t1-yellow.png','خردلي',this)"></div>
                </div>
                <div class="model-name">تيشيرت أوفرسايز - موديل 01</div>
                <div class="qty-control"><button class="btn-q" onclick="chg('q01',-16)">-</button><span id="q01" class="q-val">16</span><button class="btn-q" onclick="chg('q01',16)">+</button></div>
                <button class="btn-add">إضافة للطلب</button>
            </div>
            
            </div>
    </div>

    <div id="sets" class="section-content">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="Picsart_26-05-28_16-28-24-642.jpg" id="img-set" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #000;" onclick="upd('set','Picsart_black.jpg','أسود',this)"></div>
                    <div class="dot" style="background: #FFFDD0;" onclick="upd('set','Picsart_beige.jpg','سكري',this)"></div>
                    <div class="dot" style="background: #gray;" onclick="upd('set','Picsart_gray.jpg','رمادي',this)"></div>
                    <div class="dot" style="background: #navy;" onclick="upd('set','Picsart_navy.jpg','كحلي',this)"></div>
                </div>
                <div class="model-name">طقم رجالي فاخر - موديل 01</div>
                <div class="qty-control"><button class="btn-q" onclick="chg('qset',-16)">-</button><span id="qset" class="q-val">16</span><button class="btn-q" onclick="chg('qset',16)">+</button></div>
                <button class="btn-add">إضافة للطلب</button>
            </div>
        </div>
    </div>

    <div id="pants" class="section-content"><p>قريباً.. قسم البنطلون والشورت</p></div>
    <div id="shirts" class="section-content"><p>قريباً.. قسم القمصان</p></div>

    <script>
        function openSection(sectionId, btn) {
            let contents = document.querySelectorAll('.section-content');
            let tabs = document.querySelectorAll('.tab-btn');
            contents.forEach(c => c.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        function chg(id, val) {
            let el = document.getElementById(id);
            let curr = parseInt(el.innerText);
            if (curr + val >= 16) el.innerText = curr + val;
        }

        function upd(id, img, color, dot) {
            document.getElementById('img-' + id).src = img;
            let dots = dot.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        }
    </script>

</body>
</html>
