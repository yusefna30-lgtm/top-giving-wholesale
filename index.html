<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 140px; }
        .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid #1a1a1a; }
        .nav-tabs { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .tab { padding: 10px 25px; background-color: #0a0a0a; border: 1px solid #222; border-radius: 25px; color: #aaa; cursor: pointer; }
        .tab.active { background-color: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: auto; }
        .card { background-color: #0a0a0a; border: 1px solid #151515; border-radius: 16px; padding: 18px; text-align: center; }
        .slider-container { position: relative; width: 100%; height: 340px; border-radius: 12px; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #bfa030; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .btn-add { background: transparent; color: #bfa030; border: 1px solid #bfa030; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; }
        .qty-control { display: flex; justify-content: center; gap: 20px; margin: 15px 0; background: #020202; padding: 10px; border-radius: 10px; }
        .cart-navbar { position: fixed; bottom: 0; left: 0; right: 0; background: #050505; padding: 15px; display: flex; justify-content: space-between; transform: translateY(120px); transition: 0.4s; z-index: 1000; }
        .cart-navbar.active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 160px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show('tshirts', this)">تيشيرتات</div>
        <div class="tab" onclick="show('sets', this)">أطقم صيفية</div>
        <div class="tab" onclick="show('shorts', this)">شورتات وبناطيل</div>
    </div>
</div>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:10px" onclick="changeSlide('s1',-1)">‹</button><img id="s1" src="smile-white.png" class="product-img" data-images='["smile-white.png", "smile-black.png", "smile-olive.png", "smile-beige.png"]' data-index="0"><button class="arrow-btn" style="right:10px" onclick="changeSlide('s1',1)">›</button></div><p>تيشيرت SMILE</p><button class="btn-add" onclick="addCart('SMILE', 's1')">إضافة</button></div>
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:10px" onclick="changeSlide('s2',-1)">‹</button><img id="s2" src="kenz-blue.png" class="product-img" data-images='["kenz-blue.png", "kenz-black.png", "kenz-grey.png", "kenz-sage.png"]' data-index="0"><button class="arrow-btn" style="right:10px" onclick="changeSlide('s2',1)">›</button></div><p>كينز بولو</p><button class="btn-add" onclick="addCart('KENZ', 's2')">إضافة</button></div>
</div></div>

<div id="sets" class="tab-content"><div class="grid">
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:10px" onclick="changeSlide('s3',-1)">‹</button><img id="s3" src="sea-black.png" class="product-img" data-images='["sea-black.png", "sea-navy.png", "sea-red.png"]' data-index="0"><button class="arrow-btn" style="right:10px" onclick="changeSlide('s3',1)">›</button></div><p>طقم بحر</p><button class="btn-add" onclick="addCart('SEA', 's3')">إضافة</button></div>
</div></div>

<div id="shorts" class="tab-content"><div class="grid">
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:10px" onclick="changeSlide('s4',-1)">‹</button><img id="s4" src="mps0033-black.png" class="product-img" data-images='["mps0033-black.png", "mps0033-green.png", "mps0033-heavenly.png", "mps0033-white.png"]' data-index="0"><button class="arrow-btn" style="right:10px" onclick="changeSlide('s4',1)">›</button></div><p>شورت MPS0033</p><button class="btn-add" onclick="addCart('SHORT', 's4')">إضافة</button></div>
</div></div>

<div id="cart-navbar" class="cart-navbar">
    <button onclick="sendOrder()" style="background:#bfa030; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">إرسال الطلب للواتساب 📲</button>
</div>

<script>
    let cart = {};
    function show(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function changeSlide(id, dir) {
        const img = document.getElementById(id);
        const imgs = JSON.parse(img.dataset.images);
        let idx = (parseInt(img.dataset.index) + dir + imgs.length) % imgs.length;
        img.dataset.index = idx;
        img.src = imgs[idx];
    }
    function addCart(name, id) {
        cart[name] = 1;
        document.getElementById('cart-navbar').classList.add('active');
        alert("تمت الإضافة");
    }
    function sendOrder() { window.open('https://wa.me/966560564719?text=' + encodeURIComponent(JSON.stringify(cart))); }
</script>
</body>
</html>
