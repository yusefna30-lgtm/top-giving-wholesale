<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px; max-width: 450px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        
        /* حجم الصور ثابت ومناسب للجوال */
        .slider-container { position: relative; width: 100%; height: 320px; overflow: hidden; border-radius: 10px; margin-bottom: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #bfa030; border: none; width: 40px; height: 40px; cursor: pointer; z-index: 10; font-size: 20px; }
        .btn-add { background: #bfa030; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .btn-q { background: #222; border: 1px solid #444; color: #fff; width: 35px; height: 35px; border-radius: 5px; cursor: pointer; }
        .model-num { color: #bfa030; font-weight: bold; margin: 5px 0; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 2px solid #bfa030; text-align: center; z-index: 100; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
</div>

<div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="smile-white.png" class="product-img active"><img src="smile-black.png" class="product-img"><img src="smile-olive.png" class="product-img"><img src="smile-beige.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <b>تيشيرت SMILE</b>
        <div class="model-num">موديل: 08047</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c(this, 16)">+</button>
            <span class="qty" id="qt1">16</span>
            <button class="btn-q" onclick="c(this, -16)">-</button>
        </div>
        <button class="btn-add" onclick="add('SMILE 08047', 'qt1')">إضافة للطلب</button>
    </div>

    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="kenz-blue.png" class="product-img active"><img src="kenz-black.png" class="product-img"><img src="kenz-grey.png" class="product-img"><img src="kenz-sage.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <b>كينز بولو</b>
        <div class="model-num">موديل: 08076</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c(this, 16)">+</button>
            <span class="qty" id="qt2">16</span>
            <button class="btn-q" onclick="c(this, -16)">-</button>
        </div>
        <button class="btn-add" onclick="add('KENZ 08076', 'qt2')">إضافة للطلب</button>
    </div>
</div>

<div class="cart-bar"><button class="btn-add" onclick="send()">إرسال الطلب للواتساب 📲</button></div>

<script>
    let myCart = {};
    function slide(btn, dir) {
        const cont = btn.parentElement; const imgs = cont.querySelectorAll('.product-img');
        let active = cont.querySelector('.product-img.active');
        let idx = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        idx = (idx + dir + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
    }
    function c(btn, val) {
        let span = btn.parentElement.querySelector('.qty');
        let n = parseInt(span.innerText) + val;
        if(n >= Math.abs(val)) span.innerText = n;
    }
    function add(name, id) {
        myCart[name] = document.getElementById(id).innerText;
        alert("تمت إضافة " + name);
    }
    function send() {
        let msg = "طلب جديد:\n";
        for(let item in myCart) { msg += item + ": " + myCart[item] + " قطعة\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
