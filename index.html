<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .nav-tabs { display: flex; gap: 5px; padding: 10px; background: #111; overflow-x: auto; white-space: nowrap; position: sticky; top: 0; z-index: 50; }
        .tab { padding: 8px 12px; background: #222; cursor: pointer; border-radius: 5px; font-size: 12px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
     .page { display: none; padding: 10px; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .page.active { display: grid; }
    .card { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 12px; width: 100%; box-sizing: border-box; } 
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); 
        gap: 10px; 
    }
    .page.active { display: grid; }
    .card { 
        background: #0a0a0a; 
        border: 1px solid #222; 
        padding: 10px; 
        border-radius: 12px; 
        width: 100%; 
        transition: 0.4s; 
    }
        .img-box { height: 160px; overflow: hidden; border-radius: 8px; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; padding: 5px 8px; cursor: pointer; border-radius: 4px; }
        h3 { font-size: 12px; margin: 8px 0 2px; }
        .model { color: #bfa030; font-size: 10px; margin-bottom: 8px; }
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 10px; }
        .btn-qty { background: #333; border: none; color: #fff; width: 25px; height: 25px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .qty-val { font-size: 13px; font-weight: bold; width: 30px; color: #bfa030; }
        .btn-add { background: #bfa030; border: none; padding: 6px; width: 100%; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 10px; display: flex; justify-content: space-around; z-index: 100; }
        .cart-btn { padding: 8px 15px; border-radius: 5px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="go('tshirt-page', this)">تيشيرتات</div>
    <div class="tab" onclick="go('set-page', this)">أطقم</div>
    <div class="tab" onclick="go('short-page', this)">شورتات</div>
    <div class="tab" onclick="go('pants-page', this)">بناطيل</div>
    <div class="tab" onclick="go('shirt-page', this)">قمصان</div>
</div>

<div id="tshirt-page" class="page active">
    <div class="card">
        <div class="img-box">
            <button class="nav-arrow" style="left:5px" onclick="move(this, -1)">‹</button>
            <img src="img1.png" class="product-img active">
            <img src="img2.png" class="product-img">
            <button class="nav-arrow" style="right:5px" onclick="move(this, 1)">›</button>
        </div>
      <div id="tshirt-page" class="page active">
    
    <div class="card">
        <div class="img-box">
            <button class="nav-arrow" style="left:5px" onclick="move(this, -1)">‹</button>
            <img src="boxy-fashion1.png.png" class="product-img active">
            <img src="boxy-fashion2.png.png" class="product-img">
            <img src="boxy-fashion3.png.png" class="product-img">
            <img src="boxy-fashion4.png.png" class="product-img">
            <button class="nav-arrow" style="right:5px" onclick="move(this, 1)">›</button>
        </div>
        <h3>تيشيرت Boxy Fashion</h3>
        <div class="model">شد: 16 حبة</div>
        <div class="qty-box" data-step="16">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">16</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت Boxy Fashion', this)">إضافة</button>
    </div>

    <div class="card">
        <div class="img-box">
            <button class="nav-arrow" style="left:5px" onclick="move(this, -1)">‹</button>
            <img src="kenz-black.png" class="product-img active">
            <img src="kenz-blue.png" class="product-img">
            <img src="kenz-grey.png" class="product-img">
            <img src="kenz-sage.png" class="product-img">
            <button class="nav-arrow" style="right:5px" onclick="move(this, 1)">›</button>
        </div>
        <h3>تيشيرت Kenz</h3>
        <div class="model">شد: 16 حبة</div>
        <div class="qty-box" data-step="16">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">16</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت Kenz', this)">إضافة</button>
    </div>

</div>
    </div>

<div id="set-page" class="page"></div>
<div id="short-page" class="page"></div>
<div id="pants-page" class="page"></div>
<div id="shirt-page" class="page"></div>

<div class="cart-bar">
    <button class="cart-btn" style="background:#bfa030;" onclick="sendOrder()">إرسال الطلب 📲</button>
    <button class="cart-btn" style="background:#444; color:#fff;" onclick="clearCart()">تفريغ 🗑️</button>
</div>

<script>
    function go(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    function move(btn, dir) {
        const box = btn.parentElement;
        const imgs = box.querySelectorAll('.product-img');
        let active = box.querySelector('.product-img.active');
        let i = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        i = (i + dir + imgs.length) % imgs.length;
        imgs[i].classList.add('active');
    }
    function changeQty(btn, dir) {
        let parent = btn.parentElement;
        let step = parseInt(parent.getAttribute('data-step'));
        let span = parent.querySelector('.qty-val');
        let newVal = parseInt(span.innerText) + (dir * step);
        if(newVal >= step) span.innerText = newVal;
    }
    let cart = {};
    function addToCart(item, btn) {
        let qty = btn.parentElement.querySelector('.qty-val').innerText;
        cart[item] = qty;
        alert("تمت الإضافة: " + item + " - " + qty);
    }
    function clearCart() { cart = {}; alert("تم التفريغ"); }
    function sendOrder() {
        if(Object.keys(cart).length === 0) { alert("السلة فارغة!"); return; }
        let msg = "طلب جملة:\n";
        for(let item in cart) { msg += "- " + item + ": " + cart[item] + "\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
