<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .tabs { margin-bottom: 20px; }
        .tab-btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .tab-btn.active { background: #D4AF37; color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .img-box { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .color-dot { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin: 5px; border: 1px solid #fff; }
        .order-btn { background: #25D366; color: #fff; border: none; padding: 12px; width: 100%; margin-top: 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .order-btn:hover { background: #128C7E; }
    </style>
</head>
<body>

    <h1>TOP GIVING 👑</h1>
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="catalog"></div>

    <script>
        const myWhatsAppNumber = "966502777884"; 
        let allProducts = [];

        // تحميل البيانات من ملف JSON
        fetch('products.json')
            .then(res => res.json())
            .then(data => {
                allProducts = data;
                renderTabs();
                renderCatalog('الكل');
            });

        // إنشاء أزرار الأقسام
        function renderTabs() {
            const categories = ['الكل', ...new Set(allProducts.map(p => p.cat))];
            document.getElementById('tabs').innerHTML = categories.map(cat => 
                `<button class="tab-btn" onclick="filter(this, '${cat}')">${cat}</button>`).join('');
        }

        // تصفية المنتجات حسب القسم
        function filter(btn, cat) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCatalog(cat);
        }

        // عرض الكتالوج
        function renderCatalog(cat) {
            const container = document.getElementById('catalog');
            const filtered = (cat === 'الكل') ? allProducts : allProducts.filter(p => p.cat === cat);
            
            container.innerHTML = filtered.map(p => `
                <div class="card">
                    <img src="${p.img}" class="img-box" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div>${p.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('')}</div>
                    <button class="order-btn" onclick="openWhatsApp('${p.name}')">
                        اطلب عبر واتساب 🛒
                    </button>
                </div>
            `).join('');
        }

        // دالة فتح الواتساب الآمنة
        function openWhatsApp(productName) {
            const message = "أريد طلب منتج: " + productName;
            const url = "https://wa.me/" + myWhatsAppNumber + "?text=" + encodeURIComponent(message);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
