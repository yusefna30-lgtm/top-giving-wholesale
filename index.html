<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #222; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .tab { padding: 8px 15px; background: #111; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #aaa; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 15px; padding: 15px; text-align: center; }
        .slider-container { position: relative; height: 280px; overflow: hidden; border-radius: 10px; margin-bottom: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #bfa030; border: none; width: 30px; height: 30px; cursor: pointer; }
        .btn-add { background: #bfa030; color: #000; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cart-navbar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show(this, 'tshirts')">تيشيرتات</div>
        <div class="tab" onclick="show(this, 'sets')">أطقم صيفية</div>
        <div class="tab" onclick="show(this, 'shorts')">شورتات وبناطيل</div>
    </div>
</div>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s1',-1)">‹</button><img id="s1" src="smile-white.png" class="product-img" data-images='["smile-white.png", "smile-black.png", "smile-olive.png", "smile-beige.png"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s1',1)">›</button></div><p>تيشيرت SMILE</p><button class="btn-add" onclick="add('SMILE')">إضافة للطلب</button></div>
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s2',-1)">‹</button><img id="s2" src="kenz-blue.png" class="product-img" data-images='["kenz-blue.png", "kenz-black.png", "kenz-grey.png", "kenz-sage.png"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s2',1)">›</button></div><p>كينز بولو</p><button class="btn-add" onclick="add('KENZ')">إضافة للطلب</button></div>
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s3',-1)">‹</button><img id="s3" src="trendy1.jpg" class="product-img" data-images='["trendy1.jpg", "trendy2.jpg", "trendy3.jpg", "trendy4.jpg"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s3',1)">›</button></div><p>تيشيرت TRENDY</p><button class="btn-add" onclick="add('TRENDY')">إضافة للطلب</button></div>
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s4',-1)">‹</button><img id="s4" src="tshirt-gravity1.jpg" class="product-img" data-images='["tshirt-gravity1.jpg", "tshirt-gravity2.jpg", "tshirt-gravity3.jpg", "tshirt-gravity4.jpg"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s4',1)">›</button></div><p>تيشيرت GRAVITY</p><button class="btn-add" onclick="add('GRAVITY')">إضافة للطلب</button></div>
</div></div>

<div id="sets" class="tab-content"><div class="grid">
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s5',-1)">‹</button><img id="s5" src="sea-black.png" class="product-img" data-images='["sea-black.png", "sea-navy.png", "sea-red.png"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s5',1)">›</button></div><p>طقم بحر</p><button class="btn-add" onclick="add('SEA SET')">إضافة للطلب</button></div>
</div></div>

<div id="shorts" class="tab-content"><div class="grid">
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s6',-1)">‹</button><img id="s6" src="mps0033-black.png" class="product-img" data-images='["mps0033-black.png", "mps0033-green.png", "mps0033-heavenly.png", "mps0033-white.png"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s6',1)">›</button></div><p>شورت MPS0033</p><button class="btn-add" onclick="add('SHORT 0033')">إضافة للطلب</button></div>
    <div class="card"><div class="slider-container"><button class="arrow-btn" style="left:0" onclick="slide('s7',-1)">‹</button><img id="s7" src="mps176-black.png" class="product-img" data-images='["mps176-black.png", "mps176-brown.png", "mps176-grey.png", "mps176-white.png"]' data-index="0"><button class="arrow-btn" style="right:0" onclick="slide('s7',1)">›</button></div><p>بنطلون MPS176</p><button class="btn-add" onclick="add('PANTS 176')">إضافة للطلب</button></div>
</div></div>

<div id="cart" class="cart-navbar" style="display:none;"><button class="btn-add" style="max-width:300px" onclick="send()">إرسال الطلب للواتساب 📲</button></div>

<script>
    let cart = {};
    function show(el, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function slide(id, dir) {
        const img = document.getElementById(id);
        const imgs = JSON.parse(img.dataset.images);
        let idx = (parseInt(img.dataset.index) + dir + imgs.length) % imgs.length;
        img.dataset.index = idx;
        img.src = imgs[idx];
    }
    function add(name) {
        cart[name] = 1;
        document.getElementById('cart').style.display = 'block';
        alert("تمت إضافة " + name);
    }
    function send() { window.open('https://wa.me/966560564719?text=' + encodeURIComponent(JSON.stringify(cart))); }
</script>
</body>
</html>
