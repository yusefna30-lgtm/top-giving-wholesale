<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر الجملة</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid var(--accent); }
        .img-box { width: 100%; height: 200px; background: #fff; border-radius: 10px; margin-bottom: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        /* نظام المقاسات الجديد */
        .size-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }
        .size-item { display: flex; flex-direction: column; font-size: 0.7rem; color: #aaa; }
        .qty-input { width: 100%; border: 1px solid #333; background: #000; color: var(--gold); text-align: center; border-radius: 4px; padding: 5px 0; }
        
        .btn-add { background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-top: 2px solid var(--gold); }
    </style>
</head>
<body>

<div class="grid">
    <!-- مثال لمنتج واحد (كرر هذا القسم لكل المنتجات) -->
    <div class="card">
        <div class="img-box"><img src="n5-back.png.png" class="product-img"></div>
        <div class="model-name">تيشيرت 01</div>
        <div class="size-grid">
            <div class="size-item">S<input type="number" class="qty-input" data-size="S" value="0"></div>
            <div class="size-item">M<input type="number" class="qty-input" data-size="M" value="0"></div>
            <div class="size-item">L<input type="number" class="qty-input" data-size="L" value="0"></div>
            <div class="size-item">XL<input type="number" class="qty-input" data-size="XL" value="0"></div>
            <div class="size-item">XXL<input type="number" class="qty-input" data-size="XXL" value="0"></div>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت 01', this.parentElement)">إضافة للطلب</button>
    </div>
</div>

<div class="cart-bar" id="cart-bar" style="display:none;">
    <button onclick="sendOrder()">إرسال الطلب عبر واتساب ✅</button>
</div>

<script>
    let order = [];

    function addToCart(name, cardEl) {
        let sizes = {};
        let hasQty = false;
        cardEl.querySelectorAll('.qty-input').forEach(input => {
            let val = parseInt(input.value);
            if(val > 0) {
                sizes[input.dataset.size] = val;
                hasQty = true;
            }
        });

        if(!hasQty) { alert("يرجى تحديد كمية على الأقل"); return; }
        
        order.push({ name: name, sizes: sizes });
        document.getElementById('cart-bar').style.display = 'block';
        alert("تمت الإضافة للسلة!");
    }

    function sendOrder() {
        let msg = `📦 طلب جملة جديد من TOP GIVING:\n`;
        order.forEach(item => {
            msg += `\n*${item.name}*:\n`;
            for(let size in item.sizes) {
                msg += `- ${size}: ${item.sizes[size]} حبة\n`;
            }
        });
        window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
