<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 25px; border-bottom: 1px solid #1a1a1a; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .tab { padding: 8px 20px; background: #0a0a0a; border: 1px solid #222; border-radius: 20px; cursor: pointer; color: #aaa; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; border-color: #bfa030; box-shadow: 0 0 10px rgba(191,160,48,0.5); }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 16px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #bfa030; box-shadow: 0 0 15px rgba(191,160,48,0.3); }
        .slider-container { position: relative; height: 300px; overflow: hidden; border-radius: 12px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: #bfa030; border: none; width: 40px; height: 40px; cursor: pointer; z-index: 5; }
        .btn-add { background: transparent; color: #bfa030; border: 1px solid #bfa030; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
        .btn-add:hover { background: #bfa030; color: #000; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .btn-q { background: #222; border: 1px solid #444; color: #fff; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #050505; padding: 15px; border-top: 1px solid #333; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show(this, 'tshirts')">تيشيرتات</div>
        <div class="tab" onclick="show(this, 'sets')">أطقم</div>
        <div class="tab" onclick="show(this, 'shorts')">شورتات/بناطيل</div>
    </div>
</div>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="smile-white.png" class="product-img active"><img src="smile-black.png" class="product-img"><img src="smile-olive.png" class="product-img"><img src="smile-beige.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <p>تيشيرت SMILE</p><div style="color:#bfa030">موديل: 08047</div>
        <div class="qty-control"><button class="btn-q" onclick="c(this, 16)">+</button><span class="qty">16</span><button class="btn-q" onclick="c(this, -16)">-</button></div>
        <button class="btn-add" onclick="alert('تمت الإضافة')">إضافة للطلب</button>
    </div>
</div></div>

<div class="cart-bar" id="cart"><button class="btn-add" style="max-width:300px" onclick="window.open('https://wa.me/966560564719')">إرسال الطلب للواتساب 📲</button></div>

<script>
    function show(el, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function slide(btn, dir) {
        const cont = btn.parentElement; const imgs = cont.querySelectorAll('.product-img');
        let active = cont.querySelector('.product-img.active');
        let idx = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        idx = (idx + dir + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
    }
    function c(btn, val) {
        let span = btn.parentElement.querySelector('.qty');
        let n = parseInt(span.innerText) + val;
        if(n >= Math.abs(val)) span.innerText = n;
        document.getElementById('cart').style.display = 'block';
    }
</script>
</body>
</html>
