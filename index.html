<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: flex-start; 
        }
        .card { 
            background: #111; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 10px; 
            width: 150px; 
            text-align: center; 
        }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .btn-add { background: #bfa030; border: none; width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <img src="kenz-black.png">
        <h3>تيشيرت Kenz</h3>
        <button class="btn-add">إضافة</button>
    </div>
    
    <div class="card">
        <img src="boxy-fashion1.png.png">
        <h3>Boxy Fashion</h3>
        <button class="btn-add">إضافة</button>
    </div>

    <div class="card">
        <img src="mps0033-black.png">
        <h3>MPS 0033</h3>
        <button class="btn-add">إضافة</button>
    </div>
    </div>

</body>
</html>
