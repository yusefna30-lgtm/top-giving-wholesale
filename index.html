<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING - الجملة</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px; }
        
        /* الكارد مع تأثير الزوم والهالة */
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; transition: 0.4s; }
        .card:hover { border-color: #D4AF37; box-shadow: 0 0 20px #D4AF37; transform: translateY(-5px); }
        
        .img-container { width: 100%; height: 220px; overflow: hidden; border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .img-box { width: 100%; height: 100%; object-fit: contain; background: #fff; transition: 0.5s; }
        .card:hover .img-box { transform: scale(1.1); }

        /* زر التفاصيل والطلب */
        .details-btn { background: #444; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .order-btn { background: #25D366; color: #000; padding: 12px; width: 100%; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        /* النافذة المنبثقة (Modal) */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #D4AF37; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <div class="img-container">
                <img src="shirt.png" class="img-box">
            </div>
            <h3>تيشيرت بوكس</h3>
            
            <button class="details-btn" onclick="openDetails('أزرق، رمادي، أبيض، أسود', 'M, L, XL, 2XL')">عرض التفاصيل 📋</button>
            
            <div style="margin-bottom: 10px;">
                عدد الشدات (16 حبة/شدة): <br>
                <input type="number" class="pack-qty" value="0" min="0" style="width:60px; padding:5px; text-align:center;">
            </div>
            <button class="order-btn" onclick="sendOrder('تيشيرت بوكس', this.parentElement, 16)">طلب الشدة 🛒</button>
        </div>
    </div>

    <div id="detailsModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>تفاصيل المنتج</h2>
            <p><strong>الألوان المتاحة:</strong> <span id="modalColors"></span></p>
            <p><strong>المقاسات المتاحة:</strong> <span id="modalSizes"></span></p>
            <button class="details-btn" onclick="document.getElementById('detailsModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        function openDetails(colors, sizes) {
            document.getElementById('modalColors').innerText = colors;
            document.getElementById('modalSizes').innerText = sizes;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function sendOrder(name, card, totalPerPack) {
            let count = card.querySelector('.pack-qty').value;
            if(count <= 0) { alert("حدد عدد الشدات أولاً!"); return; }
            let msg = `طلب جديد: *${name}*\nالكمية: ${count} شدة (${count * totalPerPack} حبة).`;
            window.open("https://wa.me/966502777884?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
