<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab { background: #111; color: #fff; padding: 8px 25px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 170px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .product-img { max-width: 95%; max-height: 95%; object-fit: contain; transform: scale(1.1); transition: 0.4s; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; min-height: 25px; flex-wrap: wrap; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.1); }
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-add.added { background: #28a745; color: #fff; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5, 5, 5, 0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; backdrop-filter: blur(10px); }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-clear { background: #441111; color: #ff5555; border: 1px solid #662222; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">بنطلون وشورت</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt"><div class="img-box"><img src="n5-back.png.png" id="pt1" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#eee" onclick="v('pt1','n5-back.png.png',this)"></div><div class="dot" style="background:purple" onclick="v('pt1','n5-purple.png.png',this)"></div><div class="dot" style="background:#000" onclick="v('pt1','n5-black.png.png',this)"></div><div class="dot" style="background:#fff" onclick="v('pt1','n5-white.png.png',this)"></div></div><div class="model-name">تيشيرت 01</div><div class="qty-control"><button class="btn-q" onclick="c('qt1',16)">+</button><span id="qt1">16</span><button class="btn-q" onclick="c('qt1',-16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 01','qt1',this)">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea2-brown.png" id="psea3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#8b4513" onclick="v('psea3','sea2-brown.png',this)"></div><div class="dot" style="background:#ffc0cb" onclick="v('psea3','sea2-pink.png',this)"></div><div class="dot" style="background:#808080" onclick="v('psea3','sea2-grey.png',this)"></div></div><div class="model-name">طقم Sea 03</div><div class="qty-control"><button class="btn-q" onclick="c('qsea3',12)">+</button><span id="qsea3">12</span><button class="btn-q" onclick="c('qsea3',-12)">-</button></div><button class="btn-add" onclick="add('Sea 03','qsea3',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" id="p182" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#d2b48c" onclick="v('p182','mps182-beige.png',this)"></div><div class="dot" style="background:#000" onclick="v('p182','mps182-black.png',this)"></div><div class="dot" style="background:blue" onclick="v('p182','mps182-blue.png',this)"></div><div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('p182','mps182-white.png',this)"></div></div><div class="model-name">بنطلون 182</div><div class="qty-control"><button class="btn-q" onclick="c('q182',20)">+</button><span id="q182">20</span><button class="btn-q" onclick="c('q182',-20)">-</button></div><button class="btn-add" onclick="add('بنطلون 182','q182',this)">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps185-grey.png" id="p185" class="product-img"></div><div class="color-dots"><div class="dot active" style="background:#808080" onclick="v('p185','mps185-grey.png',this)"></div><div class="dot" style="background:#000" onclick="v('p185','mps185-black.png',this)"></div><div class="dot" style="background:#4b5320" onclick="v('p185','mps185-green.png',this)"></div><div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('p185','mps185-white.png',this)"></div></div><div class="model-name">بنطلون 185</div><div class="qty-control"><button class="btn-q" onclick="c('q185',20)">+</button><span id="q185">20</span><button class="btn-q" onclick="c('q185',-20)">-</button></div><button class="btn-add" onclick="add('بنطلون 185','q185',this)">إضافة</button></div>
    </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><button class="btn-clear" onclick="clearCart()">تصفير 🗑️</button><div id="cart-info" style="color:var(--gold); font-weight:900;">الإجمالي: 0 حبة</div><button class="btn-add" style="width:auto; padding:10px 20px;" onclick="send()">إرسال ✅</button></div></div>

    <script>
        let order = [];
        function filterProducts(cat) {
            let cards = document.querySelectorAll('.card');
            cards.forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; let dots = el.parentElement.querySelectorAll('.dot'); dots.forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function c(id, val) { 
            let el = document.getElementById(id); let curr = parseInt(el.innerText); 
            let min = (id.includes('sea')) ? 12 : (id.includes('182') || id.includes('185') ? 20 : 16);
            if (curr + val >= min) el.innerText = curr + val; 
        }
        function add(name, qtyId, btn) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`;
            let txt = btn.innerText; btn.innerText = "تمت الإضافة ✅"; btn.classList.add('added');
            setTimeout(() => { btn.innerText = txt; btn.classList.remove('added'); }, 1500);
        }
        function clearCart() { if(confirm("مسح السلة؟")) { order = []; document.getElementById('cart-bar').style.display = 'none'; document.getElementById('cart-info').innerText = `الإجمالي: 0 حبة`; } }
        function send() {
            if (order.length === 0) return;
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
