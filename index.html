<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Official Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        /* رأس الصفحة والبراند */
        .header { padding: 30px 10px 10px; background: linear-gradient(to bottom, #111, #000); }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin: 0; text-transform: uppercase; }
        
        /* شريط الأقسام */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; overflow-x: auto; padding: 5px; }
        .tab { background: var(--accent); color: #888; padding: 8px 18px; border-radius: 20px; border: 1px solid #333; font-size: 0.9rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: 700; border-color: var(--gold); }

        /* الشبكة المتوازنة */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); transition: 0.3s; }
        
        /* إطار الصورة بالوزنية "الوسطية" */
        .img-box { 
            width: 100%; 
            height: 180px; /* الارتفاع الوسطي المثالي */
            border-radius: 12px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 1px solid transparent;
            transition: 0.4s;
        }
        @media (min-width: 992px) { .img-box { height: 230px; } }

        .product-img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            transform: scale(1.1);
            transition: 0.5s ease; 
        }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .card:hover .product-img { transform: scale(1.2); }

        /* التفاصيل */
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); }
        .model-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; color: #ddd; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; border: 1px solid #222; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-weight: 900; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 30px; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        /* السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand-name">TOP GIVING</h1>
        <div class="nav-tabs">
            <div class="tab active">التيشيرتات</div>
            <div class="tab">الأطقم</div>
            <div class="tab">البنطلونات</div>
            <div class="tab">القمصان</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="n5-back.png.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #e0e0e0;" onclick="v('01', 'n5-back.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('01', 'n5-purple.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('01', 'n5-black.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('01', 'n5-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-01', 16)">+</button><span id="q-01" class="q-val">16</span><button class="btn-q" onclick="c('q-01', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 01', 'q-01')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="img-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="v('02', 't1-white.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('02', 't1-black.png', this)"></div>
                <div class="dot" style="background: blue;" onclick="v('02', 't1-blue.png', this)"></div>
                <div class="dot" style="background: gold;" onclick="v('02', 't1-yellow.png', this)"></div>
            </div>
            <div class="model-name">موديل 02</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-02', 16)">+</button><span id="q-02" class="q-val">16</span><button class="btn-q" onclick="c('q-02', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 02', 'q-02')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t2-black.png.png" id="img-03" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #000;" onclick="v('03', 't2-black.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('03', 't2-purple.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('03', 't2-white.png.png', this)"></div>
                <div class="dot" style="background: gray;" onclick="v('03', 't2-grey.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 03</div>
            <div class="qty-control"><button class="btn-q" onclick="c('q-03', 16)">+</button><span id="q-03" class="q-val">16</span><button class="btn-q" onclick="c('q-03', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 03', 'q-03')">إضافة للطلب</button>
        </div>
    </div>

    <div class="cart-bar" id="cart-bar">
        <div class="cart-flex">
            <div id="cart-info" style="font-weight: 900; color: var(--gold);">الإجمالي: 0 شدة</div>
            <button class="btn-add" style="width: auto; padding: 10px 20px;" onclick="sendWhatsApp()">إرسال عبر واتساب</button>
        </div>
    </div>

    <script>
        let order = [];
        function v(id, path, el) {
            document.getElementById('img-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }
        function c(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }
        function addToOrder(name, qtyId) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            let item = order.find(i => i.name === name);
            if (item) { item.qty += qty; } else { order.push({ name: name, qty: qty }); }
            updateCartBar();
        }
        function updateCartBar() {
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('cart-info').innerText = `الإجمالي: ${total/16} شدة`;
        }
        function sendWhatsApp() {
            let msg = "📦 *طلب جملة من TOP GIVING* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} قطعة ( ${i.qty/16} شدة )\n`; });
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            msg += `\n💰 *الإجمالي النهائي:* ${total/16} شدة`;
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
