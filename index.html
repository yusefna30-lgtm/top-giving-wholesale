<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 10px; padding-bottom: 100px; }
        
        /* شبكة المنتجات - منتجين في السطر للجوال */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 10px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            display: flex; 
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* تصغير حجم إطار الصورة */
        .img-box { 
            width: 100%; 
            height: 160px; /* حجم مثالي للجوال */
            border-radius: 10px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* تصغير الدوائر والأزرار */
        .color-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); }

        .model-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; background: #151515; padding: 5px; border-radius: 8px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 1.2rem; line-height: 1; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 30px; font-size: 1rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 0.85rem; }

        /* للشاشات الكبيرة (كمبيوتر) */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .img-box { height: 250px; }
            .model-name { font-size: 1.1rem; }
            .btn-add { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="n5-back.png.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #e0e0e0;" onclick="v('01', 'n5-back.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('01', 'n5-purple.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('01', 'n5-black.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('01', 'n5-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-01', 16)">+</button>
                <span id="q-01" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-01', -16)">-</button>
            </div>
            <button class="btn-add">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="img-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="v('02', 't1-white.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('02', 't1-black.png', this)"></div>
                <div class="dot" style="background: blue;" onclick="v('02', 't1-blue.png', this)"></div>
                <div class="dot" style="background: gold;" onclick="v('02', 't1-yellow.png', this)"></div>
            </div>
            <div class="model-name">موديل 02</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-02', 16)">+</button>
                <span id="q-02" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-02', -16)">-</button>
            </div>
            <button class="btn-add">إضافة</button>
        </div>
    </div>

    <script>
        function v(id, path, el) {
            document.getElementById('img-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }
        function c(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }
    </script>
</body>
</html>
