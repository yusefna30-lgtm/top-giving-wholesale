    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; margin: 0; padding-bottom: 160px; text-align: center; }
        
        .brand { font-size: 2.2rem; color: var(--gold); margin: 25px 0; font-weight: 900; letter-spacing: 3px; }
        .section-header { margin: 40px 0 25px; display: flex; align-items: center; justify-content: center; }
        .section-title { color: var(--gold); font-size: 1.3rem; font-weight: 700; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 15px; }

        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--accent); padding: 15px; transition: 0.3s; }

        /* --- تحسين إطار الصورة والتوهج الخارجي --- */
        .img-box { 
            width: 90%; 
            height: 160px; /* تصغير ارتفاع الإطار */
            background: #fff; 
            border-radius: 15px; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            transition: 0.4s ease;
            border: 2px solid transparent;
        }
        
        .product-img { 
            max-width: 85%; 
            max-height: 85%; 
            object-fit: contain; 
            transition: transform 0.4s ease;
        }

        /* التوهج حول حدود الإطار الأبيض بالكامل */
        .card:hover .img-box {
            transform: translateY(-5px); /* حركة بسيطة للأعلى */
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7); /* توهج حول الإطار */
        }
        .card:hover .product-img { transform: scale(1.1); }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin: 12px 0; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; transition: 0.2s; }
        .dot.active { border-color: var(--gold); transform: scale(1.2); box-shadow: 0 0 10px var(--gold); }

        .model-name { font-weight: 700; font-size: 1rem; margin-bottom: 10px; }

        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; background: #151515; padding: 8px; border-radius: 12px; margin-bottom: 15px; }
        .btn-q { background: #252525; color: var(--gold); border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 1.3rem; cursor: pointer; }
        .q-val { font-weight: 900; min-width: 35px; font-size: 1.1rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Cairo'; }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 2000; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 200px; } }
    </style>
</head>
