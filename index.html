<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Luxury View</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding: 10px; padding-bottom: 100px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; }

        .card { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 18px; 
            border: 1px solid var(--accent); 
            transition: 0.3s;
        }
        
        /* إطار الصورة المطور */
        .img-box { 
            width: 100%; 
            height: 180px; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            border: 1.5px solid transparent;
            transition: 0.4s ease-in-out;
        }

        /* تكبير صورة الموديل لملء الفراغ */
        .product-img { 
            width: 100%; /* تأخذ العرض بالكامل */
            height: 100%; /* تأخذ الطول بالكامل */
            object-fit: contain; /* تحافظ على الأبعاد دون قص */
            transform: scale(1.15); /* تكبير بنسبة 15% إضافية داخل الإطار */
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* تأثير التوهج والزوم عند التمرير */
        .card:hover .img-box { 
            border-color: var(--gold); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); /* توهج ذهبي ناعم */
        }
        .card:hover .product-img { 
            transform: scale(1.3); /* زوم إضافي عند التمرير لمشاهدة التفاصيل */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.1)); /* ظل خفيف للصورة لإبرازها */
        }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; color: #eee; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.3rem; }
        .q-val { color: var(--gold); font-weight: 900; font-size: 1.1rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 0.9rem; }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .img-box { height: 280px; }
        }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="n5-back.png.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #e0e0e0;" onclick="v('01', 'n5-back.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="v('01', 'n5-purple.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('01', 'n5-black.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="v('01', 'n5-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-01', 16)">+</button>
                <span id="q-01" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-01', -16)">-</button>
            </div>
            <button class="btn-add">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="img-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="v('02', 't1-white.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="v('02', 't1-black.png', this)"></div>
                <div class="dot" style="background: blue;" onclick="v('02', 't1-blue.png', this)"></div>
                <div class="dot" style="background: gold;" onclick="v('02', 't1-yellow.png', this)"></div>
            </div>
            <div class="model-name">موديل 02</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('q-02', 16)">+</button>
                <span id="q-02" class="q-val">16</span>
                <button class="btn-q" onclick="c('q-02', -16)">-</button>
            </div>
            <button class="btn-add">إضافة للطلب</button>
        </div>
    </div>

    <script>
        function v(id, path, el) {
            document.getElementById('img-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }
        function c(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }
    </script>
</body>
</html>
