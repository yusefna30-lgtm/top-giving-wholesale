<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; }
        
        /* هذا هو السر: الحاوية يجب أن تكون relative لكي نضع الأيقونة داخلها */
        .card-img-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 15px;
        }
        
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        /* الأيقونة داخل الحاوية */
        .zoom-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid #fff;
            z-index: 10;
        }

        .card-img-wrapper:hover .product-img { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="grid" id="product-grid"></div>

<script>
const products = [{ id: "1", name: "تيشيرت Boxy", img: "b1.png" }];

const grid = document.getElementById('product-grid');
products.forEach(p => {
    grid.innerHTML += `
        <div style="background:#111; padding:20px; border-radius:20px;">
            <div class="card-img-wrapper">
                <img src="${p.img}" class="product-img">
                <div class="zoom-icon" onclick="alert('فتحت العدسة!')">🔍</div>
            </div>
            <h3>${p.name}</h3>
        </div>
    `;
});
</script>
</body>
</html>
