<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | متجر الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tab { background: #111; color: #fff; padding: 8px 25px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 20px auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 12px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 170px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 95%; max-height: 95%; object-fit: contain; transform: scale(1.1); transition: 0.4s; }
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; min-height: 25px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.1); }
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; background: #151515; padding: 6px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt"><div class="img-box"><img src="n5-back.png.png" id="p-t1" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #eee;" onclick="v('p-t1', 'n5-back.png.png', this)"></div><div class="dot" style="background: purple;" onclick="v('p-t1', 'n5-purple.png.png', this)"></div><div class="dot" style="background: #000;" onclick="v('p-t1', 'n5-black.png.png', this)"></div><div class="dot" style="background: #fff;" onclick="v('p-t1', 'n5-white.png.png', this)"></div></div><div class="model-name">تيشيرت 01</div><div class="qty-control"><button class="btn-q" onclick="c('q-t1', 16)">+</button><span id="q-t1">16</span><button class="btn-q" onclick="c('q-t1', -16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 01', 'q-t1')">إضافة</button></div>
        <div class="card tshirt"><div class="img-box"><img src="t1-white.png" id="p-t2" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #fff;" onclick="v('p-t2', 't1-white.png', this)"></div><div class="dot" style="background: #000;" onclick="v('p-t2', 't1-black.png', this)"></div><div class="dot" style="background: blue;" onclick="v('p-t2', 't1-blue.png', this)"></div><div class="dot" style="background: gold;" onclick="v('p-t2', 't1-yellow.png', this)"></div></div><div class="model-name">تيشيرت 02</div><div class="qty-control"><button class="btn-q" onclick="c('q-t2', 16)">+</button><span id="q-t2">16</span><button class="btn-q" onclick="c('q-t2', -16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 02', 'q-t2')">إضافة</button></div>
        <div class="card tshirt"><div class="img-box"><img src="t2-black.png.png" id="p-t3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-t3', 't2-black.png.png', this)"></div><div class="dot" style="background: purple;" onclick="v('p-t3', 't2-purple.png.png', this)"></div><div class="dot" style="background: #fff;" onclick="v('p-t3', 't2-white.png.png', this)"></div><div class="dot" style="background: gray;" onclick="v('p-t3', 't2-grey.png.png', this)"></div></div><div class="model-name">تيشيرت 03</div><div class="qty-control"><button class="btn-q" onclick="c('q-t3', 16)">+</button><span id="q-t3">16</span><button class="btn-q" onclick="c('q-t3', -16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 03', 'q-t3')">إضافة</button></div>
        <div class="card tshirt"><div class="img-box"><img src="tr1-red.png.png" id="p-t4" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: red;" onclick="v('p-t4', 'tr1-red.png.png', this)"></div><div class="dot" style="background: #000;" onclick="v('p-t4', 'tr2-black.png.png', this)"></div><div class="dot" style="background: #d2b48c;" onclick="v('p-t4', 'tr3-beige.png.png', this)"></div><div class="dot" style="background: #fff;" onclick="v('p-t4', 'tr4-white.png.png', this)"></div></div><div class="model-name">تيشيرت 04</div><div class="qty-control"><button class="btn-q" onclick="c('q-t4', 16)">+</button><span id="q-t4">16</span><button class="btn-q" onclick="c('q-t4', -16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 04', 'q-t4')">إضافة</button></div>
        <div class="card tshirt"><div class="img-box"><img src="te1-black.png.png" id="p-t5" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-t5', 'te1-black.png.png', this)"></div><div class="dot" style="background: blue;" onclick="v('p-t5', 'te2-blue.png.png', this)"></div><div class="dot" style="background: #d2b48c;" onclick="v('p-t5', 'te3-beige.png.png', this)"></div><div class="dot" style="background: #fff;" onclick="v('p-t5', 'te4-white.png.png', this)"></div></div><div class="model-name">تيشيرت 05</div><div class="qty-control"><button class="btn-q" onclick="c('q-t5', 16)">+</button><span id="q-t5">16</span><button class="btn-q" onclick="c('q-t5', -16)">-</button></div><button class="btn-add" onclick="add('تيشيرت 05', 'q-t5')">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s1-black.png.png" id="p-s1" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-s1', 's1-black.png.png', this)"></div><div class="dot" style="background: blue;" onclick="v('p-s1', 's1-blue.png.png', this)"></div><div class="dot" style="background: #d2b48c;" onclick="v('p-s1', 's1-grey.png.png', this)"></div><div class="dot" style="background: #fff; border: 1px solid #ccc;" onclick="v('p-s1', 's1-white.png.png', this)"></div></div><div class="model-name">طقم 01</div><div class="qty-control"><button class="btn-q" onclick="c('q-s1', 16)">+</button><span id="q-s1">16</span><button class="btn-q" onclick="c('q-s1', -16)">-</button></div><button class="btn-add" onclick="add('طقم 01', 'q-s1')">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s2-black.jpg" id="p-s2" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-s2', 's2-black.jpg', this)"></div><div class="dot" style="background: blue;" onclick="v('p-s2', 's2-blue.jpg', this)"></div><div class="dot" style="background: #8e8e8e;" onclick="v('p-s2', 's2-grey.jpg', this)"></div><div class="dot" style="background: #fff;" onclick="v('p-s2', 's2-white.jpg', this)"></div></div><div class="model-name">طقم 02</div><div class="qty-control"><button class="btn-q" onclick="c('q-s2', 16)">+</button><span id="q-s2">16</span><button class="btn-q" onclick="c('q-s2', -16)">-</button></div><button class="btn-add" onclick="add('طقم 02', 'q-s2')">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s3-black.jpg" id="p-s3" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-s3', 's3-black.jpg', this)"></div><div class="dot" style="background: #800000;" onclick="v('p-s3', 's3-red.jpg', this)"></div><div class="dot" style="background: #b19cd9;" onclick="v('p-s3', 's3-purple.jpg', this)"></div><div class="dot" style="background: #c0c0c0;" onclick="v('p-s3', 's3-grey.jpg', this)"></div></div><div class="model-name">طقم 03</div><div class="qty-control"><button class="btn-q" onclick="c('q-s3', 16)">+</button><span id="q-s3">16</span><button class="btn-q" onclick="c('q-s3', -16)">-</button></div><button class="btn-add" onclick="add('طقم 03', 'q-s3')">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s4-black.jpg" id="p-s4" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-s4', 's4-black.jpg', this)"></div><div class="dot" style="background: #4b5320;" onclick="v('p-s4', 's4-green.jpg', this)"></div><div class="dot" style="background: #f5f5dc;" onclick="v('p-s4', 's4-beige.jpg', this)"></div><div class="dot" style="background: #fff;" onclick="v('p-s4', 's4-white.jpg', this)"></div></div><div class="model-name">طقم 04</div><div class="qty-control"><button class="btn-q" onclick="c('q-s4', 16)">+</button><span id="q-s4">16</span><button class="btn-q" onclick="c('q-s4', -16)">-</button></div><button class="btn-add" onclick="add('طقم 04', 'q-s4')">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s5-black.jpg" id="p-s5" class="product-img"></div><div class="color-dots"><div class="dot active" style="background: #000;" onclick="v('p-s5', 's5-black.jpg', this)"></div><div class="dot" style="background: #808080;" onclick="v('p-s5', 's5-grey.jpg', this)"></div><div class="dot" style="background: #d2b48c;" onclick="v('p-s5', 's5-beige.jpg', this)"></div><div class="dot" style="background: #fff; border: 1px solid #ccc;" onclick="v('p-s5', 's5-white.jpg', this)"></div></div><div class="model-name">طقم 05</div><div class="qty-control"><button class="btn-q" onclick="c('q-s5', 16)">+</button><span id="q-s5">16</span><button class="btn-q" onclick="c('q-s5', -16)">-</button></div><button class="btn-add" onclick="add('طقم 05', 'q-s5')">إضافة</button></div>
    </div>

    <div class="cart-bar" id="cart-bar"><div class="cart-flex"><div id="cart-info" style="font-weight: 900; color: var(--gold);">الإجمالي: 0 شدة</div><button class="btn-add" style="width: auto; padding: 10px 20px;" onclick="send()">إرسال الطلب</button></div></div>

    <script>
        let order = [];
        function filterProducts(cat) {
            let cards = document.getElementsByClassName('card');
            for (let card of cards) { card.classList.remove('show'); if (card.classList.contains(cat)) card.classList.add('show'); }
            let tabs = document.getElementsByClassName('tab');
            for (let tab of tabs) tab.classList.remove('active');
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { document.getElementById(id).src = path; let dots = el.parentElement.getElementsByClassName('dot'); for (let d of dots) d.classList.remove('active'); el.classList.add('active'); }
        function c(id, val) { let el = document.getElementById(id); let curr = parseInt(el.innerText); if (curr + val >= 16) el.innerText = curr + val; }
        function add(name, qtyId) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            let item = order.find(i => i.name === name);
            if (item) item.qty += qty; else order.push({ name: name, qty: qty });
            document.getElementById('cart-bar').style.display = 'block';
            let total = order.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total/16} شدة`;
        }
        function send() {
            let msg = "📦 *طلب جديد* 📦\n\n";
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty/16} شدة\n`; });
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
