<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 140px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background-color: #000000;
            border-bottom: 1px solid #1a1a1a;
        }

        .brand-logo {
            max-width: 160px;
            height: auto;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .tab {
            padding: 10px 25px;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 25px;
            color: #aaaaaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tab.active, .tab:hover {
            background-color: #bfa030;
            color: #000000;
            font-weight: bold;
            border-color: #bfa030;
            box-shadow: 0 0 15px rgba(191, 160, 48, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: #0a0a0a;
            border: 1px solid #151515;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #bfa030;
            box-shadow: 0 15px 35px rgba(191, 160, 48, 0.15);
        }

        .slider-container {
            position: relative;
            width: 100%;
            height: 340px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #050505;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #bfa030;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-btn:hover {
            background: #bfa030;
            color: #000000;
        }

        .arrow-btn.prev { left: 10px; }
        .arrow-btn.next { right: 10px; }

        .model-name {
            font-size: 16px;
            margin: 15px 0 10px 0;
            font-weight: 600;
            color: #ffffff;
        }

        .product-model-number {
            color: #bfa030;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            background-color: #020202;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #111111;
        }

        .btn-q {
            background: none;
            border: 1px solid #333333;
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-q:hover {
            border-color: #bfa030;
            color: #bfa030;
        }

        .qty-num {
            font-size: 16px;
            font-weight: bold;
            min-width: 30px;
            color: #bfa030;
        }

        .btn-add {
            background-color: transparent;
            color: #bfa030;
            border: 1px solid #bfa030;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background-color: #bfa030;
            color: #000000;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
                padding: 15px 10px;
            }
            .card { padding: 10px; border-radius: 12px; }
            .slider-container { height: 195px; }
            .model-name { font-size: 13px; margin: 10px 0 6px 0; }
            .product-model-number { font-size: 13px; margin-bottom: 10px; }
            .qty-control { gap: 10px; padding: 6px; }
            .btn-q { width: 26px; height: 26px; font-size: 14px; }
            .qty-num { font-size: 13px; }
            .btn-add { padding: 8px; font-size: 12px; }
            .arrow-btn { width: 26px; height: 26px; font-size: 14px; }
        }

        .cart-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #050505;
            border-top: 1px solid #222222;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transform: translateY(120px);
            transition: transform 0.4s ease;
        }

        .cart-navbar.active { transform: translateY(0); }
        .badge { background-color: #bfa030; color: #000000; padding: 3px 10px; border-radius: 12px; font-weight: bold; }
        .btn-send-cart { background-color: #bfa030; color: #000000; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active">تيشيرتات</div>
            <div class="tab">أطقم صيفية</div>
            <div class="tab">شورتات</div>
        </div>
    </div>

    <div class="grid">
<div class="card">
    <div class="slider-container">
        <button class="arrow-btn prev" onclick="changeSlide('smileSlider', -1)">‹</button>
        <img id="smileSlider" src="smile-white.png?v=1" class="product-img" 
             data-images='["smile-white.png?v=1", "smile-black.png?v=1", "smile-olive.png?v=1", "smile-beige.png?v=1"]' 
             data-index="0">
        <button class="arrow-btn next" onclick="changeSlide('smileSlider', 1)">›</button>
    </div>
    <div class="model-name">تيشيرت SMILE</div>
    <div class="product-model-number">موديل: 08047</div>
    <div class="qty-control">
        <button class="btn-q" onclick="c('qt_smile', 16)">+</button>
        <span id="qt_smile" class="qty-num">16</span>
        <button class="btn-q" onclick="c('qt_smile', -16)">-</button>
    </div>
    <button class="btn-add" onclick="addToCart('تيشيرت SMILE موديل 08047', 'qt_smile', 'smileSlider')">إضافة للطلب</button>
</div>

        <div class="card">
            <div class="slider-container">
                <button class="arrow-btn prev" onclick="changeSlide('kenzSlider', -1)">‹</button>
                <img id="kenzSlider" src="kenz-blue.png" class="product-img" data-images='["kenz-blue.png", "kenz-black.png", "kenz-grey.png", "kenz-sage.png"]' data-index="0">
                <button class="arrow-btn next" onclick="changeSlide('kenzSlider', 1)">›</button>
            </div>
            <div class="model-name">كينز بولو | KENZ POLO</div>
            <div class="product-model-number">موديل: 08076</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt_kenz', 16)">+</button>
                <span id="qt_kenz" class="qty-num">16</span>
                <button class="btn-q" onclick="c('qt_kenz', -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('كينز بولو KENZ POLO موديل 08076', 'qt_kenz', 'kenzSlider')">إضافة للطلب</button>
        </div>

        <div class="card">
         <div class="card">
    <div class="slider-container">
        <button class="arrow-btn prev" onclick="changeSlide('trendySlider', -1)">‹</button>
        <img id="trendySlider" src="trendy1.jpg?v=1" class="product-img" data-images='["trendy1.jpg?v=1", "trendy2.jpg?v=1", "trendy3.jpg?v=1", "trendy4.jpg?v=1"]' data-index="0">
        <button class="arrow-btn next" onclick="changeSlide('trendySlider', 1)">›</button>
    </div> <div class="model-name">تيشيرت TRENDY</div>
    <div class="product-model-number">موديل: 08093</div>
    <div class="qty-control">
        <button class="btn-q" onclick="c('qt_trendy', 16)">+</button>
        <span id="qt_trendy" class="qty-num">16</span>
        <button class="btn-q" onclick="c('qt_trendy', -16)">-</button>
    </div>
    <button class="btn-add" onclick="addToCart('تيشيرت TRENDY موديل 08093', 'qt_trendy', 'trendySlider')">إضافة للطلب</button>
</div>
        </div>

        <div class="card">
    <div class="slider-container">
        <button class="arrow-btn prev" onclick="changeSlide('gravitySlider', -1)">‹</button>
        <img id="gravitySlider" src="tshirt-gravity1.jpg" class="product-img" 
data-images='["tshirt-gravity1.jpg", "tshirt-gravity2.jpg", "tshirt-gravity3.jpg", "tshirt-gravity4.jpg"]'             data-index="0">
        <button class="arrow-btn next" onclick="changeSlide('gravitySlider', 1)">›</button>
    </div>
    <div class="model-name">تيشيرت GRAVITY</div>
    <div class="product-model-number">موديل: 08094</div>
    <div class="qty-control">
        <button class="btn-q" onclick="c('qt_gravity', 16)">+</button>
        <span id="qt_gravity" class="qty-num">16</span>
        <button class="btn-q" onclick="c('qt_gravity', -16)">-</button>
    </div>
    <button class="btn-add" onclick="addToCart('تيشيرت GRAVITY موديل 08094', 'qt_gravity', 'gravitySlider')">إضافة للطلب</button>
</div>
    </div>

    <div id="cart-navbar" class="cart-navbar">
        <div style="font-size: 15px; color: #cccccc;">
            <span>الموديلات المضافة:</span>
            <span id="cart-count" class="badge">0</span>
        </div>
        <button class="btn-send-cart" onclick="sendOrderWhatsApp()">إرسال الطلب بالكامل 📲</button>
    </div>

    <script>
        let cart = {};

     function changeSlide(sliderId, direction) {
        const imgElement = document.getElementById(sliderId);
        const images = JSON.parse(imgElement.getAttribute('data-images'));
        let currentIndex = parseInt(imgElement.getAttribute('data-index'));

        currentIndex += direction;

        if (currentIndex >= images.length) {
            currentIndex = 0;
        } else if (currentIndex < 0) {
            currentIndex = images.length - 1;
        }

        imgElement.setAttribute('data-index', currentIndex);
        imgElement.src = images[currentIndex];
    }

        function c(id, amount) {
            const span = document.getElementById(id);
            let current = parseInt(span.innerText);
            current += amount;
            if (current < 16) current = 16; 
            span.innerText = current;
        }

        function addToCart(name, id, sliderId) {
            const qty = parseInt(document.getElementById(id).innerText);
            const imgElement = document.getElementById(sliderId);
            const images = JSON.parse(imgElement.getAttribute('data-images'));
            const currentIndex = parseInt(imgElement.getAttribute('data-index'));
            const currentImgName = images[currentIndex];

            let detailedName = name + ` (${currentImgName})`;
            cart[detailedName] = qty;
            
            const modelsCount = Object.keys(cart).length;
            document.getElementById('cart-count').innerText = modelsCount;
            
            if(modelsCount > 0) {
                document.getElementById('cart-navbar').classList.add('active');
            }
            alert(`تم إضافة ${qty} حبة بنجاح.`);
        }

        function sendOrderWhatsApp() {
            if (Object.keys(cart).length === 0) return;
            const phoneNumber = "966560564719"; 
            let message = `مرحباً براند TOP GIVING، أرغب في تأكيد طلبية جملة:\n\n`;
            let totalItems = 0;

            for (const [name, qty] of Object.entries(cart)) {
                message += `📦 *المنتج:* ${name} -> *الكمية:* ${qty} حبة\n`;
                totalItems += qty;
            }
            message += `\n📊 *إجمالي القطع:* ${totalItems} حبة`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
