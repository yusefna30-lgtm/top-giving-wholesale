<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر المطور</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .product-img { width: 100%; height: 160px; object-fit: contain; cursor: pointer; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; display: inline-block; margin: 2px; border: 1px solid #555; }
        .size-box { display: inline-block; padding: 3px 8px; margin: 2px; background: #222; border: 1px solid #444; border-radius: 4px; font-size: 0.8rem; }
        .btn-add { background: #D4AF37; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid" id="catalog"></div>

    <script>
        fetch('products.json').then(r => r.json()).then(data => {
            const grid = document.getElementById('catalog');
            grid.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.img}" class="product-img" onclick="alert('تكبير الصورة: ${p.img}')">
                    <p><b>${p.name}</b></p>
                    <div>${p.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('')}</div>
                    <div style="margin: 10px 0;">${p.sizes.map(s => `<span class="size-box">${s}</span>`).join('')}</div>
                    <button class="btn-add" onclick="alert('تم الطلب: ${p.name}')">إضافة للسلة</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
