<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        /* التنسيق الأساسي للموقع */
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #0c0c0e; padding: 20px; border-radius: 20px; border: 2px solid #333; position: relative; } /* حاوية الأب */

        /* حاوية الصورة الأساسية */
        .img-container {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* أيقونة العدسة المكبرة الثابتة في الزاوية */
        .zoom-icon {
            position: absolute;
            top: 15px;    /* موضعها من الأعلى */
            right: 15px;  /* موضعها من اليمين (على الطرف) */
            width: 35px;  /* حجم الأيقونة */
            height: 35px;
            background-color: rgba(255, 255, 255, 0.8); /* خلفية بيضاء شبه شفافة */
            border-radius: 50%; /* شكل دائري */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #333;
            cursor: pointer;
            z-index: 5; /* فوق الصورة */
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }
        
        .zoom-icon:hover {
            background-color: #D4AF37; /* تتلون بالذهبي عند التحويم */
            transform: scale(1.1);
        }

        /* رمز العدسة (يمكن استبداله بأيقونة SVG للحصول على مظهر أفضل) */
        .zoom-icon::after {
            content: "\26B2"; /* رمز Unicode لعدسة مكبرة */
            font-size: 20px;
            color: #333;
        }

        /* تنسيق باقي العناصر */
        .dot { width: 25px; height: 25px; border-radius: 50%; display: inline-block; margin: 5px; cursor: pointer; border: 2px solid #555; transition: 0.2s; }
        .dot.active { border-color: #D4AF37; box-shadow: 0 0 5px #D4AF37; } /* تلوين اللون النشط */
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-wa:hover { background: #1ebe58; }
        .btn-cart { background: #D4AF37; color: #000; }
        .btn-cart:hover { background: #eac560; }
    </style>
</head>
<body>

<h1>المجموعة الجديدة - TOP GIVING</h1>
<div class="grid" id="product-grid"></div>

<script>
// قائمة المنتجات
const products = [
    { id: "p1", name: "تيشيرت Boxy", colors: ["#fff", "#000"], images: ["b1.png", "b2.png"] },
    { id: "p2", name: "طقم 01", colors: ["#eee", "#555"], images: ["s1-white.png.png", "s1-grey.png.png"] }
];

const grid = document.getElementById('product-grid');

products.forEach(p => {
    let card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="img-container">
            <img src="${p.images[0]}" id="img-${p.id}" class="product-img">
            <div id="zoom-icon-${p.id}" class="zoom-icon"></div>
        </div>
        
        <div id="dots-${p.id}">${p.colors.map((c, i) => `<span class="dot ${i === 0 ? 'active' : ''}" style="background:${c}" onclick="changeColor('${p.id}', ${i})"></span>`).join('')}</div>
        
        <h3>${p.name}</h3>
        
        <div class="btn-group">
            <button class="btn btn-cart" onclick="alert('تمت الإضافة للسلة')">إضافة للسلة</button>
            <button class="btn btn-wa" onclick="window.open('https://wa.me/966560564719?text=أريد طلب ${p.name}')">طلب عبر الواتساب</button>
        </div>
    `;
    grid.appendChild(card);
});

// دالة لتغيير اللون وتحديث الأيقونة
function changeColor(productId, colorIndex) {
    const product = products.find(p => p.id === productId);
    const img = document.getElementById(`img-${productId}`);
    const dots = document.getElementById(`dots-${productId}`).querySelectorAll('.dot');
    const zoomIcon = document.getElementById(`zoom-icon-${productId}`);

    // تحديث الصورة
    img.src = product.images[colorIndex];

    // تحديث اللون النشط (Active Dot)
    dots.forEach((dot, index) => {
        if (index === colorIndex) {
            dot.classList.add('active');
        } else {
            dot.classList.remove('active');
        }
    });

    // يمكنك هنا إضافة كود لتغيير وظيفة الأيقونة إذا أردت،
    // مثلاً جعلها تفتح معرض صور مكبر للون الجديد.
}
</script>
</body>
</html>
