<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --gray: #888; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 200px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0 10px; font-weight: 900; letter-spacing: 3px; }
        .tagline { color: var(--gray); font-size: 0.9rem; margin-bottom: 30px; }

        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; position: sticky; top: 0; background: var(--black); z-index: 100; padding: 10px; }
        .tab-btn { background: var(--accent); color: #fff; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* الكرت وإطار الصورة */
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; min-height: 520px; }
        
        .img-box { 
            width: 100%; height: 220px; border-radius: 12px; overflow: hidden; background: #fff; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; transition: 0.4s;
        }
        .product-img { max-width: 85%; max-height: 85%; object-fit: contain; transition: 0.5s; }

        .card:hover .img-box { border-color: var(--gold); box-shadow: 0 0 20px 5px rgba(212, 175, 55, 0.4); }
        .card:hover .product-img { transform: scale(1.1); }

        .color-dots { display: flex; justify-content: center; gap: 10px; margin: 10px 0; height: 30px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); }

        .model-name { font-weight: 700; margin-bottom: 15px; font-size: 1.1rem; }
        
        /* إصلاح جذري لأزرار الكمية */
        .qty-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 15px; background: #151515; padding: 10px; border-radius: 12px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; font-weight: 900; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 40px; font-size: 1.2rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 15px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; margin-top: auto; }

        /* سلة الطلبات */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 20px; display: none; z-index: 1000; }
        .cart-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 260px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>
    <div class="tagline">WHOLESALE - الشد المشكل الأصلي</div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openSection('tshirts', this)">التيشيرتات</button>
        <button class="tab-btn" onclick="openSection('sets', this)">الأطقم</button>
    </div>

    <div id="tshirts" class="section-content active">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="n5-white.png.png" id="img-01" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #fff;" onclick="view('01','n5-white.png.png',this)"></div>
                    <div class="dot" style="background: purple;" onclick="view('01','n5-purple.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('01','n5-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 01</div>
                <div class="qty-wrapper">
                    <button class="btn-q" onclick="chg('q01',16)">+</button>
                    <span id="q01" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('q01',-16)">-</button>
                </div>
                <button class="btn-add" onclick="add('موديل 01', 'q01')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="t2-purple.png.png" id="img-02" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: purple;" onclick="view('02','t2-purple.png.png',this)"></div>
                    <div class="dot" style="background: #fff;" onclick="view('02','t2-white.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('02','t2-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 02</div>
                <div class="qty-wrapper">
                    <button class="btn-q" onclick="chg('q02',16)">+</button>
                    <span id="q02" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('q02',-16)">-</button>
                </div>
                <button class="btn-add" onclick="add('موديل 02', 'q02')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="te3-beige.png.png" id="img-03" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #F5F5DC;" onclick="view('03','te3-beige.png.png',this)"></div>
                    <div class="dot" style="background: skyblue;" onclick="view('03','te2-blue.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('03','te1-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 03</div>
                <div class="qty-wrapper">
                    <button class="btn-q" onclick="chg('q03',16)">+</button>
                    <span id="q03" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('q03',-16)">-</button>
                </div>
                <button class="btn-add" onclick="add('موديل 03', 'q03')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="tr1-red.png.png" id="img-04" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: red;" onclick="view('04','tr1-red.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('04','tr2-black.png.png',this)"></div>
                    <div class="dot" style="background: gray;" onclick="view('04','tr3-grey.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 04</div>
                <div class="qty-wrapper">
                    <button class="btn-q" onclick="chg('q04',16)">+</button>
                    <span id="q04" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('q04',-16)">-</button>
                </div>
                <button class="btn-add" onclick="add('موديل 04', 'q04')">إضافة الشد المشكل</button>
            </div>

            <div class="card">
                <div class="img-box"><img src="n5-white.png.png" id="img-05" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #fff;" onclick="view('05','n5-white.png.png',this)"></div>
                    <div class="dot" style="background: gray;" onclick="view('05','n6-grey.png.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('05','n5-black.png.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 05</div>
                <div class="qty-wrapper">
                    <button class="btn-q" onclick="chg('q05',16)">+</button>
                    <span id="q05" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('q05',-16)">-</button>
                </div>
                <button class="btn-add" onclick="add('موديل 05', 'q05')">إضافة الشد المشكل</button>
            </div>
        </div>
    </div>

    <div id="sets" class="section-content">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="Picsart_26-05-28_16-28-24-642.jpg" id="img-set" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #000;" onclick="view('set','Picsart_26-05-28_16-28-24-642.jpg',this)"></div>
                    <div class="dot" style="background: beige;" onclick="view('set','Picsart_beige.jpg',this)"></div>
                </div>
                <div class="model-name">طقم رجالي فاخر</div>
                <div class="qty-wrapper">
                    <button class="btn-q" onclick="chg('qset',16)">+</button>
                    <span id="qset" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('qset',-16)">-</button>
                </div>
                <button class="btn-add" onclick="add('طقم فاخر', 'qset')">إضافة الشد المشكل</button>
            </div>
        </div>
    </div>

    <div class="cart-bar" id="cartBar">
        <div class="cart-container">
            <div id="cartSummary" style="font-weight: 900; color: var(--gold); font-size: 1.2rem;">إجمالي: 0 قطعة</div>
            <button class="btn-add" style="width: auto; padding: 10px 30px;" onclick="send()">إتمام الطلب (واتساب)</button>
        </div>
    </div>

    <script>
        let cart = [];
        function openSection(id, btn) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        function chg(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) el.innerText = current + val;
        }
        function view(id, img, dot) {
            document.getElementById('img-' + id).src = img;
            dot.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        }
        function add(name, qtyId) {
            let q = parseInt(document.getElementById(qtyId).innerText);
            let item = cart.find(i => i.name === name);
            if (item) item.qty += q; else cart.push({ name: name, qty: q });
            
            let total = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartBar').style.display = 'block';
            document.getElementById('cartSummary').innerText = `إجمالي: ${total} قطعة (${total/16} شد)`;
        }
        function send() {
            let msg = "طلب جملة:\n" + cart.map(i => `• ${i.name}: ${i.qty} قطعة`).join('\n');
            window.open(`https://wa.me/966XXXXXXXXX?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
