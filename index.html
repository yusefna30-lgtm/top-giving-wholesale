<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        /* التنسيقات العامة الفخمة للموقع */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 120px; /* مساحة بالأسفل لضمان عدم تغطية السلة للمنتجات */
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background-color: #000000;
            border-bottom: 1px solid #1a1a1a;
        }

        .brand-logo {
            max-width: 160px;
            height: auto;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .tab {
            padding: 10px 25px;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 25px;
            color: #aaaaaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tab.active, .tab:hover {
            background-color: #bfa030;
            color: #000000;
            font-weight: bold;
            border-color: #bfa030;
            box-shadow: 0 0 15px rgba(191, 160, 48, 0.4);
        }

        /* شبكة المنتجات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* كارت المنتج المطور */
        .card {
            background-color: #0a0a0a;
            border: 1px solid #151515;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            display: none;
        }

        .card.show {
            display: block;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(191, 160, 48, 0.15);
            border-color: #bfa030;
        }

        /* حاوي السلايدر والصورة */
        .slider-container {
            position: relative;
            width: 100%;
            height: 290px;
            overflow: hidden;
            border-radius: 12px;
            background-color: #050505;
            cursor: zoom-in;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .card:hover .product-img {
            transform: scale(1.04);
        }

        /* أزرار الأسهم الفخمة داخل السلايدر */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #bfa030;
            border: 1px solid #222222;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .arrow-btn:hover {
            background: #bfa030;
            color: #000000;
            border-color: #bfa030;
        }

        .arrow-btn.prev { left: 12px; }
        .arrow-btn.next { right: 12px; }

        .model-name {
            font-size: 18px;
            margin: 18px 0 12px 0;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* التحكم بالكميات (الباك) */
        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            background-color: #020202;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #111111;
        }

        .btn-q {
            background: none;
            border: 1px solid #333333;
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-q:hover {
            border-color: #bfa030;
            color: #bfa030;
            background-color: rgba(191, 160, 48, 0.05);
        }

        .qty-num {
            font-size: 16px;
            font-weight: bold;
            min-width: 30px;
            color: #bfa030;
        }

        /* زر إضافة للطلب الأساسي */
        .btn-add {
            background-color: transparent;
            color: #bfa030;
            border: 1px solid #bfa030;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background-color: #bfa030;
            color: #000000;
            box-shadow: 0 5px 15px rgba(191, 160, 48, 0.2);
        }

        /* 📱 تحسينات متكاملة لشاشات الجوال 📱 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
                gap: 15px;
                padding: 20px 12px;
            }
            .slider-container {
                height: 205px;
            }
            .model-name {
                font-size: 15px;
                margin: 12px 0 8px 0;
            }
            .qty-control {
                gap: 12px;
                padding: 6px;
            }
            .btn-q {
                width: 28px;
                height: 28px;
                font-size: 16px;
            }
            .qty-num {
                font-size: 14px;
            }
            .btn-add {
                padding: 10px;
                font-size: 13px;
            }
        }

        /* 🛒 تصميم السلة السفلي الفخم والمطور 🛒 */
        .cart-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #050505;
            border-top: 1px solid #222222;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -10px 35px rgba(0,0,0,0.9);
            transform: translateY(100px); /* مخفية في البداية وتظهر عند الإضافة */
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .cart-navbar.active {
            transform: translateY(0); /* تظهر بسلاسة عند إضافة منتج */
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: #cccccc;
        }

        .badge {
            background-color: #bfa030;
            color: #000000;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 0 10px rgba(191, 160, 48, 0.3);
        }

        .btn-send-cart {
            background-color: #bfa030;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(191, 160, 48, 0.2);
        }

        .btn-send-cart:hover {
            background-color: #dfba3c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(191, 160, 48, 0.4);
        }

        /* 🔍 نافذة زوم وتكبير الصور (LightBox السينمائي) 🔍 */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 1
