<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 70px; }
        .nav-tabs { display: flex; justify-content: center; gap: 5px; padding: 10px; background: #111; position: sticky; top: 0; z-index: 50; }
        .tab { padding: 6px 10px; background: #222; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .page { display: none; padding: 10px; }
        .page.active { display: block; }
        
        /* كروت صغيرة ومدمجة */
        .card { background: #0a0a0a; border: 1px solid #222; padding: 8px; border-radius: 10px; width: 150px; display: inline-block; margin: 5px; vertical-align: top; }
        .img-box { height: 180px; overflow: hidden; border-radius: 8px; background: #000; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        
        h3 { font-size: 13px; margin: 5px 0; }
        .model { color: #bfa030; font-size: 11px; margin-bottom: 5px; }
        
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 8px; }
        .btn-qty { background: #333; border: none; color: #fff; width: 25px; height: 25px; border-radius: 3px; font-size: 14px; }
        .qty-val { font-size: 14px; font-weight: bold; width: 30px; color: #bfa030; }
        
        .btn-add { background: #bfa030; border: none; padding: 6px; width: 100%; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 8px; display: flex; justify-content: space-around; z-index: 100; }
        .cart-btn { padding: 8px 15px; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="go('tshirt-page', this)">تيشيرتات</div>
    <div class="tab" onclick="go('set-page', this)">أطقم</div>
    <div class="tab" onclick="go('short-page', this)">شورتات</div>
</div>

<div id="tshirt-page" class="page active">
    <div class="card">
        <div class="img-box"><img src="smile-white.png" class="product-img"></div>
        <h3>تيشيرت SMILE</h3>
        <div class="model">موديل: 08047</div>
        <div class="qty-box" data-step="16">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">16</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت SMILE', this)">إضافة</button>
    </div>
</div>

<div id="set-page" class="page"></div>
<div id="short-page" class="page"></div>

<div class="cart-bar">
    <button class="cart-btn" style="background:#bfa030;" onclick="sendOrder()">إرسال الطلب 📲</button>
    <button class="cart-btn" style="background:#444; color:#fff;" onclick="clearCart()">تفريغ 🗑️</button>
</div>

<script>
    function go(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    function changeQty(btn, dir) {
        let parent = btn.parentElement;
        let step = parseInt(parent.getAttribute('data-step'));
        let span = parent.querySelector('.qty-val');
        let newVal = parseInt(span.innerText) + (dir * step);
        if(newVal >= step) span.innerText = newVal;
    }
    // ... باقي السكريبت كما هو ...
</script>
</body>
</html>
