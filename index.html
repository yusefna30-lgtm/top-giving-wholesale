<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; }
        .tab { padding: 10px 20px; background: #222; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #bfa030; color: #000; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        
        /* تصميم الكرت */
        .card { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 15px; max-width: 300px; margin: 10px auto; }
        .img-box { position: relative; height: 250px; overflow: hidden; border-radius: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        .btn-arrow { position: absolute; top: 50%; background: rgba(0,0,0,0.5); color: #bfa030; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="tab active" onclick="show('tshirts', this)">التيشيرتات</div>
        <div class="tab" onclick="show('sets', this)">الأطقم</div>
    </div>

    <div id="tshirts" class="tab-content active">
        <div class="card">
            <div class="img-box">
                <button class="btn-arrow" style="left:0" onclick="move(this, -1)">‹</button>
                <img src="smile-white.png" class="product-img active">
                <img src="smile-black.png" class="product-img">
                <button class="btn-arrow" style="right:0" onclick="move(this, 1)">›</button>
            </div>
            <h3>تيشيرت SMILE</h3>
            <p style="color:#bfa030">موديل: 08047</p>
        </div>
    </div>

    <div id="sets" class="tab-content">
        <p>قسم الأطقم</p>
    </div>

    <script>
        function show(id, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
        function move(btn, dir) {
            const box = btn.parentElement;
            const imgs = box.querySelectorAll('.product-img');
            let active = box.querySelector('.product-img.active');
            let i = Array.from(imgs).indexOf(active);
            active.classList.remove('active');
            i = (i + dir + imgs.length) % imgs.length;
            imgs[i].classList.add('active');
        }
    </script>
</body>
</html>
