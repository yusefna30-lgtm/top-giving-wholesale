<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات الأساسية لإصلاح الحجم والألوان */
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 140px; }
        .brand { font-size: 2.2rem; color: var(--gold); margin: 25px 0; font-weight: 900; letter-spacing: 3px; }
        
        .section-header { margin: 40px 0 25px; display: flex; align-items: center; justify-content: center; }
        .section-header::before, .section-header::after { content: ""; height: 2px; width: 40px; background: var(--gold); margin: 0 15px; border-radius: 2px; }
        .section-title { color: var(--gold); font-size: 1.2rem; font-weight: 700; }

        /* إصلاح حجم الشبكة */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1400px; margin: 0 auto; padding: 0 10px; }
        
        /* إصلاح حجم البطاقة والصورة */
        .card { background: var(--card-bg); padding: 12px; border-radius: 15px; border: 1px solid var(--accent); display: flex; flex-direction: column; justify-content: space-between; min-height: 420px; }
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        
        /* هذا السطر هو الذي يمنع الصورة من أن تصبح عملاقة */
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; height: 30px; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 6px var(--gold); }

        .model-name { font-size: 0.85rem; margin: 5px 0; font-weight: 700; color: #eee; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; background: #151515; padding: 8px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 32px; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        @media (min-width: 992px) { 
            .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } 
            .img-box { height: 220px; } 
        }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
    </style>
</head>
<body onload="initDefaults()">

    <div class="brand">TOP GIVING</div>

    <div class="section-header"><div class="section-title">تيشيرتات OVERSYZE</div></div>
    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="upd('01','t1-white.png','أبيض',this)"></div>
                <div class="dot" style="background: #000;" onclick="upd('01','t1-black.png','أسود',this)"></div>
                <div class="dot" style="background: #0000FF;" onclick="upd('01','t1-blue.png','أزرق',this)"></div>
                <div class="dot" style="background: #808080;" onclick="upd('01','t1-grey.png','رصاصي',this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control"><button class="btn-q" onclick="chg('q01',-16)">-</button><span id="q01" class="q-val">16</span><button class="btn-q" onclick="chg('q01',16)">+</button></div>
            <button class="btn-add" onclick="buy('01','موديل 01','q01')">إضافة للطلب</button>
        </div>
        </div>

    <div class="section-header"><div class="section-title">الأطقم الرجالية</div></div>
    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="Picsart_26-05-28_16-28-24-642.jpg" id="img-sm0242" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #000;" onclick="upd('sm0242', 'Picsart_26-05-28_16-28-24-642.jpg', 'أسود', this)"></div>
                <div class="dot" style="background: #FFFDD0;" onclick="upd('sm0242', 'Picsart_26-05-28_16-26-55-580.jpg', 'سكري', this)"></div>
                <div class="dot" style="background: #0000FF;" onclick="upd('sm0242', 'Picsart_26-05-28_16-26-21-567.jpg', 'أزرق', this)"></div>
                <div class="dot" style="background: #808080;" onclick="upd('sm0242', 'Picsart_26-05-28_16-27-32-471.jpg', 'رصاصي', this)"></div>
            </div>
            <div class="model-name">طقم رجالي طويل (SM0242)</div>
            <div class="qty-control"><button class="btn-q" onclick="chg('qsm0242',-16)">-</button><span id="qsm0242" class="q-val">16</span><button class="btn-q" onclick="chg('qsm0242',16)">+</button></div>
            <button class="btn-add" onclick="buy('sm0242', 'طقم رجالي طويل SM0242', 'qsm0242')">إضافة للطلب</button>
        </div>
    </div>

    <div id="cart-bar" class="cart-bar"><button class="btn-add" onclick="sendWA()">إرسال عبر واتساب</button></div>

    <script>
        let cart = {}; let selColors = {};
        function initDefaults() { 
            selColors['01']='أبيض'; selColors['sm0242']='أسود'; 
            // أضف البقية هنا..
        }
        function upd(id, src, c, el) {
            document.getElementById('img-' + id).src = src;
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active'); selColors[id] = c;
        }
        function chg(id, v) {
            let q = document.getElementById(id); let res = parseInt(q.innerText) + v;
            if(res < 16) res = 16; q.innerText = res;
        }
        function buy(id, name, qId) {
            let color = selColors[id] || "أساسي";
            let qty = document.getElementById(qId).innerText;
            cart[id + '_' + color] = { name: name, color: color, qty: qty };
            document.getElementById('cart-bar').style.display = 'block';
            alert("تمت الإضافة!");
        }
        function sendWA() {
            let lines = []; for (let k in cart) { lines.push(`• ${cart[k].name} (${cart[k].color}) x${cart[k].qty}`); }
            window.location.href = "https://wa.me/966560564719?text=" + encodeURIComponent("طلب جديد:\n" + lines.join("\n"));
        }
    </script>
</body>
</html>
