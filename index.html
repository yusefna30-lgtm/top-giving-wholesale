<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold-light: #f1d38e; --gold-dark: #8a6d3b; --gold-main: #D4AF37; --black: #000; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        /* تصميم العنوان الرئيسي */
        .brand { font-size: 2.8rem; color: var(--gold-main); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }

        /* ثيم القسم الذهبي المتدرج (مثل الصورة) */
        .main-section-header {
            background: linear-gradient(to right, transparent, #4a3a1d, var(--gold-main), #4a3a1d, transparent);
            padding: 15px; font-size: 1.6rem; font-weight: 900; color: #000; margin: 30px 0;
            border-top: 1px solid var(--gold-light); border-bottom: 1px solid var(--gold-light);
        }

        /* عنوان المجموعة الفرعية */
        .sub-group-title {
            color: var(--gold-light); font-size: 1.1rem; font-weight: bold;
            margin: 25px 0 15px 0; position: relative; display: block;
        }
        .sub-group-title::after {
            content: ''; display: block; width: 100px; height: 1px; background: var(--gold-dark); margin: 8px auto;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: auto; padding: 0 15px; }
        
        /* تصميم البطاقة */
        .card { 
            background: #0a0a0a; padding: 10px; border-radius: 12px; 
            border: 1px solid #1a1a1a; display: flex; flex-direction: column; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .model-name { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #fff; }
        .img-box { width: 100%; height: 200px; border-radius: 8px; overflow: hidden; background: #111; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* عداد الكمية */
        .qty-control { 
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin: 12px 0; background: #111; padding: 5px; border-radius: 6px;
        }
        .btn-q { background: #222; color: #fff; border: 1px solid #333; width: 30px; height: 30px; border-radius: 4px; cursor: pointer; }
        .q-val { font-weight: bold; color: var(--gold-main); min-width: 25px; }

        /* زر الإضافة الذهبي */
        .btn-add { 
            background: linear-gradient(to bottom, #e2c06d, #8a6d3b); 
            color: #000; padding: 10px; border-radius: 6px; 
            font-weight: 900; border: none; cursor: pointer; font-size: 0.85rem;
        }

        /* شريط الطلب السفلي */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold-main); padding: 15px; z-index: 1000; display: none; }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 350px; } }
    </style>
</head>
