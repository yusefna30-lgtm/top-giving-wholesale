<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0c0c0e; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 3px; }
        .section-title { color: var(--gold); background: #111; padding: 10px; margin: 20px 0; font-size: 1.1rem; border-right: 4px solid var(--gold); text-align: right; padding-right: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1000px; margin: auto; padding: 0 10px; }
        .card { background: var(--card); padding: 10px; border-radius: 15px; border: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s; }
        .img-wrapper { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; background: #111; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .model-title { font-size: 0.9rem; font-weight: bold; margin: 10px 0; color: #eee; }
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .qty-btn { background: #222; color: #fff; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; }
        .qty-val { font-weight: bold; color: var(--gold); min-width: 20px; }
        .add-btn { background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .order-summary { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } .img-wrapper { height: 280px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="section-title">قسم الرجالي</div>
    <div class="grid">
        <div class="card">
            <div class="model-title">تيشيرت رجالي</div>
            <div class="img-wrapper"><img src="tshirt.jpeg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('q1', -12, 12)">-</button>
                <span id="q1" class="qty-val">12</span>
                <button class="qty-btn" onclick="changeQty('q1', 12, 12)">+</button>
            </div>
            <button class="add-btn" onclick="add('تيشيرت رجالي', 'q1')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">بنطلون رجالي</div>
            <div class="img-wrapper"><img src="pants.jpeg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('q2', -6, 6)">-</button>
                <span id="q2" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('q2', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('بنطلون رجالي', 'q2')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">شورت رجالي</div>
            <div class="img-wrapper"><img src="shorts.jpeg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('q3', -6, 6)">-</button>
                <span id="q3" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('q3', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('شورت رجالي', 'q3')">إضافة للطلب</button>
        </div>

        <div class="card">
            <div class="model-title">قميص رجالي</div>
            <div class="img-wrapper"><img src="shirt.jpeg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('q4', -6, 6)">-</button>
                <span id="q4" class="qty-val">6</span>
                <button class="qty-btn" onclick="changeQty('q4', 6, 6)">+</button>
            </div>
            <button class="add-btn" onclick="add('قميص رجالي', 'q4')">إضافة للطلب</button>
        </div>
    </div>

    <div class="section-title">قسم الشبابي</div>
    <div class="grid">
        <div class="card">
            <div class="model-title">طقم شبابي</div>
            <div class="img-wrapper"><img src="set.jpeg" class="product-img"></div>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty('q5', -4, 4)">-</button>
                <span id="q5" class="qty-val">4</span>
                <button class="qty-btn" onclick="changeQty('q5', 4, 4)">+</button>
            </div>
            <button class="add-btn" onclick="add('طقم شبابي', 'q5')">إضافة للطلب</button>
        </div>
    </div>

    <div id="cart-summary" class="order-summary">
        <button class="add-btn" onclick="sendWA()">إرسال الطلب عبر واتساب (<span id="count">0</span>)</button>
    </div>

    <script>
        let cart = [];
        function changeQty(id, step, min) {
            let el = document.getElementById(id);
            let val = parseInt(el.innerText) + step;
            if (val < min) val = min;
            el.innerText = val;
        }
        function add(name, qId) {
            let qty = document.getElementById(qId).innerText;
            cart.push(`*${name}* (الكمية: ${qty} حبة)`);
            document.getElementById('cart-summary').style.display = 'block';
            document.getElementById('count').innerText = cart.length;
            alert('تمت الإضافة للطلب');
        }
        function sendWA() {
            let msg = "أهلاً TOP GIVING، طلب جملة جديد:\n\n" + cart.join("\n");
            window.location.href = `https://wa.me/966560564719?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
