<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 100px; }
        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 220px; border-radius: 12px; overflow: hidden; background: #fff; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: var(--gold); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 20px; }
        .arrow-right { right: 10px; } .arrow-left { left: 10px; }
        .btn-add { background: var(--gold); border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .tab { background: #111; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: inline-block; margin: 5px; border: 1px solid var(--gold); }
        .tab.active { background: var(--gold); color: #000; }
    </style>
</head>
<body onload="filterProducts('tshirt')">

    <div class="header">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show" data-images="n5-back.png,n5-purple.png,n5-white.png,n5-black.png" data-index="0">
            <div class="img-box">
                <span class="arrow arrow-right" onclick="navImg(this, 1)">&gt;</span>
                <img src="n5-back.png" class="product-img">
                <span class="arrow arrow-left" onclick="navImg(this, -1)">&lt;</span>
            </div>
            <div>تيشيرت موديل 01</div><button class="btn-add">إضافة</button>
        </div>

        <div class="card set" data-images="s1-white.png,s1-grey.png,s1-blue.png,s1-black.png" data-index="0">
            <div class="img-box">
                <span class="arrow arrow-right" onclick="navImg(this, 1)">&gt;</span>
                <img src="s1-white.png" class="product-img">
                <span class="arrow arrow-left" onclick="navImg(this, -1)">&lt;</span>
            </div>
            <div>طقم صيفي موديل 01</div><button class="btn-add">إضافة</button>
        </div>

        <div class="card pants" data-images="mps182-beige.png,mps182-black.png,mps182-blue.png,mps182-white.png" data-index="0">
            <div class="img-box">
                <span class="arrow arrow-right" onclick="navImg(this, 1)">&gt;</span>
                <img src="mps182-beige.png" class="product-img">
                <span class="arrow arrow-left" onclick="navImg(this, -1)">&lt;</span>
            </div>
            <div>شورت موديل 182</div><button class="btn-add">إضافة</button>
        </div>
        
        </div>

    <script>
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function navImg(btn, dir) {
            let card = btn.closest('.card');
            let imgs = card.getAttribute('data-images').split(',');
            let idx = (parseInt(card.getAttribute('data-index')) + dir + imgs.length) % imgs.length;
            card.setAttribute('data-index', idx);
            card.querySelector('.product-img').src = imgs[idx];
        }
    </script>
</body>
</html>
