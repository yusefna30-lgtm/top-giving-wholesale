<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 150px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #1a1a1a; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .tab { padding: 8px 12px; background: #111; border: 1px solid #333; border-radius: 20px; cursor: pointer; color: #aaa; font-size: 14px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; border-color: #bfa030; }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; border-radius: 20px; padding: 15px; text-align: center; }
        
        /* حجم صور مناسب ومعقول للجوال */
        .slider-container { position: relative; width: 100%; height: 350px; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .product-img.active { display: block; }
        
        .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #bfa030; border: none; width: 45px; height: 45px; cursor: pointer; z-index: 5; font-size: 22px; }
        .btn-add { background: #bfa030; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0; }
        .btn-q { background: #222; border: 1px solid #444; color: #fff; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        .model-text { color: #bfa030; font-size: 14px; margin: 5px 0; font-weight: bold;}
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #050505; padding: 15px; text-align: center; border-top: 1px solid #333; z-index: 100; display: none;}
    </style>
</head>
<body>

<div class="header">
    <img src="TOP GIVING logo.jpg" style="max-width: 150px;">
    <div class="nav-tabs">
        <div class="tab active" onclick="show(this, 'tshirts')">تيشيرتات</div>
        <div class="tab" onclick="show(this, 'sets')">أطقم</div>
        <div class="tab" onclick="show(this, 'shorts')">شورتات/بناطيل</div>
    </div>
</div>

<script>
    let myCart = {};
    function simpleAdd(name, qtyId) {
        myCart[name] = document.getElementById(qtyId).innerText;
        document.getElementById('cart-navbar').style.display = 'block';
        alert("تمت إضافة " + name + " للطلب");
    }
</script>

<div id="tshirts" class="tab-content active"><div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="smile-white.png" class="product-img active"><img src="smile-black.png" class="product-img"><img src="smile-olive.png" class="product-img"><img src="smile-beige.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <b>تيشيرت SMILE</b>
        <div class="model-text">موديل: 08047</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c(this, 16)">+</button>
            <span class="qty" id="qt1" style="font-size:20px">16</span>
            <button class="btn-q" onclick="c(this, -16)">-</button>
        </div>
        <button class="btn-add" onclick="simpleAdd('SMILE 08047', 'qt1')">إضافة للطلب</button>
    </div>
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="kenz-blue.png" class="product-img active"><img src="kenz-black.png" class="product-img"><img src="kenz-grey.png" class="product-img"><img src="kenz-sage.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <b>كينز بولو</b>
        <div class="model-text">موديل: 08076</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c(this, 16)">+</button>
            <span class="qty" id="qt2" style="font-size:20px">16</span>
            <button class="btn-q" onclick="c(this, -16)">-</button>
        </div>
        <button class="btn-add" onclick="simpleAdd('KENZ 08076', 'qt2')">إضافة للطلب</button>
    </div>
</div></div>

<div id="sets" class="tab-content"><div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="sea-black.png" class="product-img active"><img src="sea-navy.png" class="product-img"><img src="sea-red.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <b>طقم بحر</b>
        <div class="model-text">موديل: SEA</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c(this, 12)">+</button>
            <span class="qty" id="qt3" style="font-size:20px">12</span>
            <button class="btn-q" onclick="c(this, -12)">-</button>
        </div>
        <button class="btn-add" onclick="simpleAdd('SEA SET', 'qt3')">إضافة للطلب</button>
    </div>
</div></div>

<div id="shorts" class="tab-content"><div class="grid">
    <div class="card">
        <div class="slider-container">
            <button class="arrow-btn" style="left:0" onclick="slide(this,-1)">‹</button>
            <img src="mps0033-black.png" class="product-img active"><img src="mps0033-green.png" class="product-img"><img src="mps0033-heavenly.png" class="product-img"><img src="mps0033-white.png" class="product-img">
            <button class="arrow-btn" style="right:0" onclick="slide(this,1)">›</button>
        </div>
        <b>شورت MPS0033</b>
        <div class="model-text">موديل: 0033</div>
        <div class="qty-control">
            <button class="btn-q" onclick="c(this, 20)">+</button>
            <span class="qty" id="qt4" style="font-size:20px">20</span>
            <button class="btn-q" onclick="c(this, -20)">-</button>
        </div>
        <button class="btn-add" onclick="simpleAdd('SHORT 0033', 'qt4')">إضافة للطلب</button>
    </div>
</div></div>

<div class="cart-bar" id="cart-navbar"><button class="btn-add" style="max-width:300px; background:#bfa030" onclick="send()">إرسال الطلب للواتساب 📲</button></div>

<script>
    function show(el, id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
    function slide(btn, dir) {
        const cont = btn.parentElement; const imgs = cont.querySelectorAll('.product-img');
        let active = cont.querySelector('.product-img.active');
        let idx = Array.from(imgs).indexOf(active);
        active.classList.remove('active');
        idx = (idx + dir + imgs.length) % imgs.length;
        imgs[idx].classList.add('active');
    }
    function c(btn, val) {
        let span = btn.parentElement.querySelector('.qty');
        let n = parseInt(span.innerText) + val;
        if(n >= Math.abs(val)) span.innerText = n;
    }
    function send() {
        let msg = "مرحباً TOP GIVING، أريد طلب:\n";
        for(let item in myCart) { msg += "- " + item + ": " + myCart[item] + " حبة\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
