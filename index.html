<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; }
        .tab { padding: 10px 15px; background: #222; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        
        /* إخفاء وإظهار الأقسام بشكل مؤكد */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        .card { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 280px; margin: 10px auto; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="go('tshirt-page')">التيشيرتات</div>
    <div class="tab" onclick="go('set-page')">الأطقم</div>
    <div class="tab" onclick="go('short-page')">الشورتات</div>
</div>

<div id="tshirt-page" class="page active">
    <div class="card">تيشيرت SMILE - قسم التيشيرتات</div>
</div>

<div id="set-page" class="page">
    <div class="card">طقم بحر - قسم الأطقم</div>
</div>

<div id="short-page" class="page">
    <div class="card">شورت MPS0033 - قسم الشورتات</div>
</div>

<script>
    function go(pageId) {
        // إخفاء كل الصفحات
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // إظهار الصفحة المطلوبة فقط
        document.getElementById(pageId).classList.add('active');
        // تبديل ألوان الأزرار
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>
</body>
</html>
