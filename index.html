<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; }
        
        /* الهيدر */
        .header { padding: 25px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-name { font-size: 2rem; font-weight: 900; color: var(--gold); margin-bottom: 15px; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tab { background: #111; color: #fff; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 0.8rem; }

        /* الشبكة */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 1200px; margin: 15px auto; padding: 0 10px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card-bg); padding: 12px; border-radius: 15px; border: 1px solid var(--accent); display: flex; flex-direction: column; }
        
        /* إطار الصورة الموزون */
        .img-box { 
            width: 100%; height: 160px; border-radius: 10px; overflow: hidden; background: #fff; 
            margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
        }
        @media (min-width: 992px) { .img-box { height: 210px; } }
        .product-img { max-width: 95%; max-height: 95%; object-fit: contain; transform: scale(1.1); transition: 0.3s; }

        /* الأزرار المطورة - حل مشكلة النقص */
        .color-dots { 
            display: flex; justify-content: center; gap: 8px; 
            margin-bottom: 12px; flex-wrap: wrap; /* تسمح للأزرار بالنزول لسطر جديد */
            min-height: 25px; 
        }
        .dot { 
            width: 22px; height: 22px; border-radius: 50%; 
            border: 2px solid #333; cursor: pointer; transition: 0.2s;
        }
        .dot.active { border-color: var(--gold); transform: scale(1.2); box-shadow: 0 0 8px var(--gold); }
        
        .model-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; background: #151515; padding: 5px; border-radius: 8px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 25px; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        /* السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.98); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-name">TOP GIVING</div>
        <div class="nav-tabs">
            <div class="tab">تيشيرتات</div>
            <div class="tab">أطقم صيفية</div>
            <div class="tab">بنطلونات</div>
            <div class="tab">جديدنا</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="img-box"><img src="n5-back.png.png" id="p-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #e0e0e0;" onclick="changeImg('01', 'n5-back.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="changeImg('01', 'n5-purple.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="changeImg('01', 'n5-black.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="changeImg('01', 'n5-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 01</div>
            <div class="qty-control"><button class="btn-q" onclick="changeQty('q-01', 16)">+</button><span id="q-01" class="q-val">16</span><button class="btn-q" onclick="changeQty('q-01', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 01', 'q-01')">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t1-white.png" id="p-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #fff;" onclick="changeImg('02', 't1-white.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="changeImg('02', 't1-black.png', this)"></div>
                <div class="dot" style="background: blue;" onclick="changeImg('02', 't1-blue.png', this)"></div>
                <div class="dot" style="background: gold;" onclick="changeImg('02', 't1-yellow.png', this)"></div>
            </div>
            <div class="model-name">موديل 02</div>
            <div class="qty-control"><button class="btn-q" onclick="changeQty('q-02', 16)">+</button><span id="q-02" class="q-val">16</span><button class="btn-q" onclick="changeQty('q-02', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 02', 'q-02')">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="t2-black.png.png" id="p-03" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #000;" onclick="changeImg('03', 't2-black.png.png', this)"></div>
                <div class="dot" style="background: purple;" onclick="changeImg('03', 't2-purple.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="changeImg('03', 't2-white.png.png', this)"></div>
                <div class="dot" style="background: gray;" onclick="changeImg('03', 't2-grey.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 03</div>
            <div class="qty-control"><button class="btn-q" onclick="changeQty('q-03', 16)">+</button><span id="q-03" class="q-val">16</span><button class="btn-q" onclick="changeQty('q-03', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 03', 'q-03')">إضافة</button>
        </div>

        <div class="card">
            <div class="img-box"><img src="tr1-red.png.png" id="p-04" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: red;" onclick="changeImg('04', 'tr1-red.png.png', this)"></div>
                <div class="dot" style="background: #000;" onclick="changeImg('04', 'tr2-black.png.png', this)"></div>
                <div class="dot" style="background: #f5f5dc;" onclick="changeImg('04', 'tr3-beige.png.png', this)"></div>
                <div class="dot" style="background: #fff;" onclick="changeImg('04', 'tr4-white.png.png', this)"></div>
            </div>
            <div class="model-name">موديل 04</div>
            <div class="qty-control"><button class="btn-q" onclick="changeQty('q-04', 16)">+</button><span id="q-04" class="q-val">16</span><button class="btn-q" onclick="changeQty('q-04', -16)">-</button></div>
            <button class="btn-add" onclick="addToOrder('موديل 04', 'q-04')">إضافة</button>
        </div>
    </div>

    <div class="cart-bar" id="cart-bar">
        <div class="cart-flex">
            <div id="cart-info" style="font-weight: 900; color: var(--gold);">الإجمالي: 0 شدة</div>
            <button class="btn-add" style="width: auto; padding: 10px 20px;" onclick="sendOrder()">إرسال الطلب</button>
        </div>
    </div>

    <script>
        let myOrder = [];

        function changeImg(id, path, el) {
            document.getElementById('p-' + id).src = path;
            let dots = el.parentElement.getElementsByClassName('dot');
            for (let d of dots) { d.classList.remove('active'); }
            el.classList.add('active');
        }

        function changeQty(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) { el.innerText = current + val; }
        }

        function addToOrder(name, qtyId) {
            let qty = parseInt(document.getElementById(qtyId).innerText);
            let existing = myOrder.find(i => i.name === name);
            if (existing) { existing.qty += qty; } else { myOrder.push({ name: name, qty: qty }); }
            
            document.getElementById('cart-bar').style.display = 'block';
            let total = myOrder.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-info').innerText = `الإجمالي: ${total/16} شدة`;
        }

        function sendOrder() {
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            myOrder.forEach(i => { msg += `• *${i.name}*: ${i.qty/16} شدة\n`; });
            let total = myOrder.reduce((sum, i) => sum + i.qty, 0);
            msg += `\n💰 *الإجمالي:* ${total/16} شدة`;
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
