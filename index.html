<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* المتغيرات البرمجية للألوان */
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--black); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 120px; 
        }
        
        .brand { 
            font-size: 2.8rem; 
            color: var(--gold); 
            margin: 30px 0; 
            font-weight: 900; 
            letter-spacing: 5px; 
        }
        
        /* شبكة العرض المرنة للبطاقات */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #1a1a1a; 
            transition: 0.3s ease-in-out; 
        }
        .card:hover { 
            border-color: var(--gold); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); 
        }
        
        .img-box { 
            width: 100%; 
            height: 400px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 20px; 
        }
        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .color-dots { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .dot { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 2px solid #fff; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .dot.active { 
            border-color: var(--gold); 
            box-shadow: 0 0 10px var(--gold); 
            transform: scale(1.15); 
        }
        
        .qty-control { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 20px; 
            background: #1a1a1a; 
            padding: 10px; 
            border-radius: 10px; 
        }
        .btn-q { 
            background: #333; 
            color: #fff; 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.5rem; 
            font-weight: bold; 
        }
        .q-val { 
            font-weight: bold; 
            color: var(--gold); 
            min-width: 40px; 
            font-size: 1.4rem; 
        }
        
        .btn-add { 
            background: linear-gradient(to bottom, #e2c06d, #8a6d3b); 
            color: #000; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.1rem; 
        }
        .cart-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(0, 0, 0, 0.95); 
            border-top: 2px solid var(--gold); 
            padding: 20px; 
            display: none; 
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="grid">
        
        <!-- بطاقة الموديل 01 -->
        <div class="card">
            <div class="img-box"><img src="./t1-white.png" id="img-01" class="product-img"></div>
            <div class="color-dots">
                <div class="dot" style="background: #DAA520;" onclick="updateProduct('01', './t1-yellow.png', 'خردلي', this)"></div>
                <div class="dot" style="background: #87CEEB;" onclick="updateProduct('01', './t1-blue.png', 'سماوي', this)"></div>
                <div class="dot" style="background: #000000;" onclick="updateProduct('01', './t1-black.png', 'أسود', this)"></div>
                <div class="dot active" style="background: #ffffff;" onclick="updateProduct('01', './t1-white.png', 'أبيض', this)"></div>
            </div>
            <div class="model-name" style="margin-bottom:10px; font-weight:bold;">تيشيرت موديل 01</div>
            <div class="qty-control">
                <button class="btn-q" onclick="changeQty('q01', -16)">-</button>
                <span id="q01" class="q-val">16</span>
                <button class="btn-q" onclick="changeQty('q01', 16)">+</button>
            </div>
            <button class="btn-add" onclick="addToOrder('01', 'موديل 01')">إضافة للطلب</button>
        </div>

        <!-- بطاقة الموديل 02 المحدثة بمسارات برمجية مؤمنة لقراءة الصور بجانب index.html -->
        <div class="card">
            <div class="img-box"><img src="./t2-purple.png" id="img-02" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #A020F0;" onclick="updateProduct('02', './t2-purple.png', 'بنفسجي', this)"></div>
                <div class="dot" style="background: #ffffff;" onclick="updateProduct('02', './t2-white.png', 'أبيض مطبوع', this)"></div>
                <div class="dot" style="background: #000000;" onclick="updateProduct('02', './t2-black.png', 'أسود', this)"></div>
                <div class="dot" style="background: #808080;" onclick="updateProduct('02', './t2-grey.png', 'رصاصي', this)"></div>
            </div>
            <div class="model-name" style="margin-bottom:10px; font-weight:bold;">تيشيرت موديل 02</div>
            <div class="qty-control">
                <button class="btn-q" onclick="changeQty('q02', -16)">-</button>
                <span id="q02" class="q-val">16</span>
                <button class="btn-q" onclick="changeQty('q02', 16)">+</button>
            </div>
            <button class="btn-add" onclick="addToOrder('02', 'موديل 02')">إضافة للطلب</button>
        </div>

    </div>

    <!-- شريط السلة المنبثق -->
    <div id="cart-bar" class="cart-bar">
        <button class="btn-add" style="width:auto; padding:10px 50px; background:#fff;" onclick="sendOrder()">إرسال الطلب واتساب</button>
    </div>

    <script>
        let orderList = [];
        let selectedProductColors = { '01': 'أبيض', '02': 'بنفسجي' };

        // وظيفة تحديث الصورة البرمجية بشكل مستقل
        function updateProduct(modelId, imageSrc, colorName, dotElement) {
            document.getElementById('img-' + modelId).src = imageSrc;
            let dots = dotElement.parentElement.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            dotElement.classList.add('active');
            selectedProductColors[modelId] = colorName;
        }

        function changeQty(qtyId, amount) {
            let qtyDisplay = document.getElementById(qtyId);
            let val = parseInt(qtyDisplay.innerText) + amount;
            if(val < 16) val = 16;
            qtyDisplay.innerText = val;
        }

        function addToOrder(modelId, modelName) {
            let currentQty = document.getElementById('q' + modelId).innerText;
            let currentColor = selectedProductColors[modelId];
            orderList.push(`${modelName} (${currentColor}) - كمية: ${currentQty} حبة`);
            document.getElementById('cart-bar').style.display = 'block';
            alert('تم إضافة ' + modelName + ' باللون ' + currentColor + ' بنجاح!');
        }

        function sendOrder() {
            let textMessage = encodeURIComponent("طلب جملة جديد من متجر TOP GIVING:\n" + orderList.join("\n"));
            window.location.href = "https://wa.me/966560564719?text=" + textMessage;
        }
    </script>
</body>
</html>
