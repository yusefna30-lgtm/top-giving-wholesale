<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* الهالة (Shadow/Glow) - ستكون حول البطاقات */
        .card { 
            background: #0c0c0e; 
            border: 1px solid #1a1a1a; 
            transition: 0.4s; 
            box-shadow: 0 0 10px rgba(212,175,55,0.1); 
        }
        /* الزووم (Zoom effect) */
        .card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 20px rgba(212,175,55,0.4); 
        }
        /* الأقسام (Tabs) - تصميمها الأساسي */
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid #D4AF37; }
        .tab-btn.active { background: #D4AF37; }
    </style>
</head>
