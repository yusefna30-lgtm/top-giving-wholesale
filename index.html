<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    <style>
        /* إضافة الهالة والزوم للكارد */
        .card { width: 280px; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; transition: 0.4s; }
        .card:hover { border-color: #D4AF37; box-shadow: 0 0 20px #D4AF37; transform: translateY(-10px); }
        .img-box { width: 100%; height: 220px; object-fit: contain; background: #fff; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <a href="shirt-blue.png" data-lightbox="product-1" data-title="اللون الأزرق">
            <img src="shirt-blue.png" class="img-box">
        </a>
        
        <a href="shirt-grey.png" data-lightbox="product-1" data-title="اللون الرمادي" style="display:none;"></a>
        <a href="shirt-white.png" data-lightbox="product-1" data-title="اللون الأبيض" style="display:none;"></a>
        
        <h3>تيشيرت بوكس</h3>
        <button onclick="openDetails()">عرض التفاصيل 📋</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox-plus-jquery.min.js"></script>
    <script>
        // إعدادات المكتبة
        lightbox.option({ 'resizeDuration': 200, 'wrapAround': true });
        
        function openDetails() { alert("هنا تظهر بيانات المقاسات والألوان"); }
    </script>
</body>
</html>
