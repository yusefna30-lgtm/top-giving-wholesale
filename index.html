<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* [التوثيق]: إعداد المتغيرات اللونية الأساسية للموقع لضمان مظهر احترافي */
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e; 
            --accent: #1a1a1a; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--black); 
            color: #fff; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 120px; 
        }
        
        .brand { 
            font-size: 2.5rem; 
            color: var(--gold); 
            margin: 30px 0; 
            font-weight: 900; 
            letter-spacing: 4px; 
        }

        .section-header { 
            margin: 50px 0 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .section-header::before, .section-header::after { 
            content: ""; 
            height: 2px; 
            width: 60px; 
            background: var(--gold); 
            margin: 0 15px; 
            border-radius: 2px; 
        }
        .section-title { 
            color: var(--gold); 
            font-size: 1.4rem; 
            font-weight: 700; 
        }

        /* [التوثيق]: شبكة العرض المرنة (تمنع تداخل الكروت وتوفر عمودين في الجوال) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 15px; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid var(--accent); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            transition: 0.3s; 
        }
        
        .img-box { 
            width: 100%; 
            height: 220px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 15px; 
        }
        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        .color-dots { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .dot { 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            border: 2px solid #333; 
            cursor: pointer; 
        }
        .dot.active { 
            border-color: var(--gold); 
            transform: scale(1.1); 
            box-shadow: 0 0 8px var(--gold); 
        }
        
        .model-name { 
            font-size: 0.9rem; 
            margin-bottom: 12px; 
            font-weight: 700; 
            color: #eee; 
        }
        
        .qty-control { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 15px; 
            background: #151515; 
            padding: 8px; 
            border-radius: 12px; 
        }
        .btn-q { 
            background: #252525; 
            color: #fff; 
            border: none; 
            width: 35px; 
            height: 35px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.2rem; 
        }
        .q-val { 
            color: var(--gold); 
            font-weight: 900; 
            min-width: 35px; 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #D4AF37, #8A6D3B); 
            color: #000; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 900; 
            border: none; 
            width: 100%; 
            font-size: 0.9rem; 
            cursor: pointer; 
        }
        
        .cart-bar { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: rgba(10, 10, 10, 0.95); 
            border-top: 1px solid var(--gold); 
            padding: 20px; 
            display: none; 
            z-index: 1000; 
        }

        @media (min-width: 768px) { 
            .grid { grid-template-columns: repeat(3, 1fr); gap: 25px; } 
            .img-box { height: 380px; } 
        }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>

    <div class="section-header"><div class="section-title">تيشيرتات OVERSYZE</div></div>
    <div class="grid">
        
        <!-- [التوثيق]: كارت موديل 04 المعتمد والمضبوط حالياً -->
        <div class="card">
            <div class="img-box"><img src="tr1-red.png.png" id="img-04" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #BA1313;" onclick="update('04', 'tr1-red.png.png', 'أحمر', this)"></div>
                <div class="dot" style="background: #000000;" onclick="update('04', 'tr2-black.png.png', 'أسود', this)"></div>
                <div class="dot" style="background: #ffffff;" onclick="update('04', 'tr4-white.png.png', 'أبيض', this)"></div>
            </div>
            <div class="model-name">موديل 04 (TREND)</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q04', -16)">-</button>
                <span id="q04" class="q-val">16</span>
                <button class="btn-q" onclick="chg('q04', 16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('04', 'موديل 04')">إضافة للطلب</button>
        </div>

        <!-- [التوثيق]: كارت موديل 05 المعتمد والمضبوط حالياً -->
        <div class="card">
            <div class="img-box"><img src="n5-white.png.png" id="img-05" class="product-img"></div>
            <div class="color-dots">
                <div class="dot active" style="background: #A020F0;" onclick="update('05', 'n5-purple.png.png', 'بنفسجي', this)"></div>
                <div class="dot" style="background: #000000;" onclick="update('05', 'n5-black.png.png', 'أسود', this)"></div>
                <div class="dot" style="background: #ffffff;" onclick="update('05', 'n5-white.png.png', 'أبيض', this)"></div>
            </div>
            <div class="model-name">موديل 05 (N.C)</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q05', -16)">-</button>
                <span id="q05" class="q-val">16</span>
                <button class="btn-q" onclick="chg('q05', 16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('05', 'موديل 05')">إضافة للطلب</button>
        </div>

        <!-- [التوثيق]: كارت موديل 06 المطور برابط احتياطي ذكي لمنع الاختفاء -->
        <div class="card">
            <!-- الخاصية onerror تقوم تلقائياً بتحميل الصورة البديلة tshert-oversize08.jpg في حال لم يجد المتصفح الاسم الأول -->
            <div class="img-box">
                <img src="n6-grey.png" id="img-06" class="product-img" onerror="this.onerror=null; this.src='tshert-oversize08.jpg';">
            </div>
            <div class="color-dots">
                <div class="dot active" style="background: #808080;" onclick="update('06', 'tshert-oversize08.jpg', 'رصاصي', this)"></div>
                <div class="dot" style="background: #ffffff;" onclick="update('06', 'n6-white.png.png', 'أبيض', this)"></div>
                <div class="dot" style="background: #000000;" onclick="update('06', 'n6-black.png.png', 'أسود', this)"></div>
            </div>
            <div class="model-name">موديل 06 (N.C)</div>
            <div class="qty-control">
                <button class="btn-q" onclick="chg('q06', -16)">-</button>
                <span id="q06" class="q-val">16</span>
                <button class="btn-q" onclick="chg('q06', 16)">+</button>
            </div>
            <button class="btn-add" onclick="buy('06', 'موديل 06')">إضافة للطلب</button>
        </div>

    </div>

    <!-- شريط تجميع وإرسال الطلبات السفلي للواتساب -->
    <div id="cart-bar" class="cart-bar">
        <button class="btn-add" style="width:auto; padding:12px 60px; background:#fff;" onclick="sendWA()">إرسال الطلب عبر واتساب</button>
    </div>

    <script>
        let items = [];
        let selColors = { '04':'أحمر', '05':'بنفسجي', '06':'رصاصي' };

        // [التوثيق]: دالة تبديل مسار الصورة وإدارة الدوائر النشطة عند النقر
        function update(id, src, c, el) {
            document.getElementById('img-' + id).src = src;
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selColors[id] = c;
        }

        // [التوثيق]: دالة زيادة ونقصان كميات العداد بمضاعفات الرقم 16 للتيشيرتات
        function chg(id, v) {
            let q = document.getElementById(id);
            let res = parseInt(q.innerText) + v;
            if(res < 16) res = 16;
            q.innerText = res;
        }

        // [التوثيق]: دالة إضافة البيانات الفنية للمنتج داخل سلة الطلبات وإظهار شريط الواتساب
        function buy(id, name) {
            let qVal = document.getElementById('q' + id).innerText;
            items.push(`${name} (${selColors[id]}) - كمية: ${qVal}`);
            document.getElementById('cart-bar').style.display = 'block';
            alert('تمت إضافة ' + name + ' باللون ' + selColors[id]);
        }

        // [التوثيق]: تشفير نص الطلب النهائي وإرساله لحساب الواتساب المعتمد
        function sendWA() {
            let msg = encodeURIComponent("طلب جملة جديد من TOP GIVING:\n" + items.join("\n"));
            window.location.href = "https://wa.me/966560564719?text=" + msg;
        }
    </script>
</body>
</html>
