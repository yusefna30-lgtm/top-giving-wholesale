<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر الجملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Cairo', sans-serif; padding: 20px; margin: 0; }
        
        /* شريط التنقل الثابت */
        .nav { position: sticky; top: 0; z-index: 1000; background: #000; padding: 15px; text-align: center; border-bottom: 2px solid #D4AF37; margin-bottom: 30px; }
        .nav a { color: #D4AF37; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 18px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; margin-bottom: 50px; }
        
        /* الكارد مع الهالة */
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; transition: 0.4s; }
        .card:hover { border-color: #D4AF37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); transform: translateY(-10px); }
        
        .main-img { width: 100%; height: 220px; object-fit: contain; background: #fff; border-radius: 10px; cursor: pointer; }
        
        /* تنسيق الأزرار الاحترافي */
        .details-btn { background: transparent; border: 1px solid #D4AF37; color: #D4AF37; padding: 12px; width: 100%; margin: 10px 0; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .details-btn:hover { background: #D4AF37; color: #000; }
        
        .order-btn { background: #25D366; color: #000; padding: 12px; width: 100%; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .order-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        h2 { border-bottom: 2px solid #D4AF37; display: inline-block; padding-bottom: 10px; margin-bottom: 30px; }
        section { padding-top: 80px; }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="#tshirts">تيشرتات</a>
        <a href="#pants">بناطيل</a>
        <a href="#sets">أطقم</a>
    </nav>

    <section id="tshirts">
        <h2>قسم التيشرتات</h2>
        <div class="grid">
            <div class="card">
                <a href="mps0033-black.png" data-lightbox="tshirt1"><img src="mps0033-black.png" class="main-img"></a>
                <h3>تيشيرت بوكس</h3>
                <button class="details-btn" onclick="openDetails('4 ألوان', 'M, L, XL, 2XL')">📋 عرض التفاصيل</button>
                <input type="number" class="pack-qty" value="0" placeholder="عدد الشدات" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; border-radius:5px;">
                <button class="order-btn" onclick="sendOrder('تيشيرت بوكس', this.parentElement, 16)">اطلب الشدة 🛒</button>
            </div>
        </div>
    </section>

    <section id="pants">
        <h2>قسم البناطيل</h2>
        <div class="grid">
            <div class="card">
                <a href="mps176-black.png" data-lightbox="pants1"><img src="mps176-black.png" class="main-img"></a>
                <h3>بنطال كلاسيك</h3>
                <button class="details-btn" onclick="openDetails('3 ألوان', 'M, L, XL, 2XL')">📋 عرض التفاصيل</button>
                <input type="number" class="pack-qty" value="0" placeholder="عدد الشدات" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; border-radius:5px;">
                <button class="order-btn" onclick="sendOrder('بنطال كلاسيك', this.parentElement, 12)">اطلب الشدة 🛒</button>
            </div>
        </div>
    </section>

    <section id="sets">
        <h2>قسم الأطقم</h2>
        <div class="grid">
            <div class="card">
                <a href="mps182-blue.png" data-lightbox="set1"><img src="mps182-blue.png" class="main-img"></a>
                <h3>طقم صيفي</h3>
                <button class="details-btn" onclick="openDetails('4 ألوان', 'M, L, XL, 2XL')">📋 عرض التفاصيل</button>
                <input type="number" class="pack-qty" value="0" placeholder="عدد الشدات" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; border-radius:5px;">
                <button class="order-btn" onclick="sendOrder('طقم صيفي', this.parentElement, 16)">اطلب الشدة 🛒</button>
            </div>
        </div>
    </section>

    <div id="detailsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center;" onclick="this.style.display='none'">
        <div style="background:#111; padding:30px; border-radius:15px; border:1px solid #D4AF37; text-align:center; width:80%; max-width:300px;" onclick="event.stopPropagation()">
            <h2 style="color:#D4AF37;">تفاصيل الشدة</h2>
            <p id="modalText" style="margin: 20px 0;"></p>
            <button onclick="document.getElementById('detailsModal').style.display='none'" style="padding:10px 20px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
    <script>
        function openDetails(colors, sizes) {
            document.getElementById('modalText').innerText = "الألوان المتاحة: " + colors + "\nالمقاسات: " + sizes;
            document.getElementById('detailsModal').style.display = 'flex';
        }
        function sendOrder(name, card, total) {
            let count = card.querySelector('.pack-qty').value;
            if(count <= 0) { alert("حدد عدد الشدات!"); return; }
            window.open(`https://wa.me/966502777884?text=${encodeURIComponent('طلب: ' + name + ' | ' + count + ' شدة (' + count * total + ' حبة)')}`);
        }
    </script>
</body>
</html>
