<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.5); --black: #000; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 120px; direction: rtl; }
        
        .brand { font-size: 2.8rem; color: var(--gold); margin: 30px 0; font-weight: 900; letter-spacing: 5px; }

        .main-section-header {
            background: linear-gradient(to right, transparent, #4a3a1d, var(--gold), #4a3a1d, transparent);
            padding: 15px; font-size: 1.6rem; font-weight: 900; color: #000; margin: 30px 0;
            border-top: 1px solid #f1d38e; border-bottom: 1px solid #f1d38e;
        }

        .sub-group-title { color: #f1d38e; font-size: 1.2rem; font-weight: bold; margin: 25px 0 15px; border-bottom: 1px solid #222; padding-bottom: 10px; width: 90%; margin: 0 auto; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* تأثير التوهج والزوم على البطاقة */
        .card { 
            background: #0c0c0e; padding: 12px; border-radius: 12px; border: 1px solid #1a1a1a; 
            display: flex; flex-direction: column; transition: all 0.4s ease; 
        }
        .card:hover { 
            transform: scale(1.03); /* تأثير الزوم */
            border-color: var(--gold); 
            box-shadow: 0 0 20px var(--gold-glow); /* تأثير التوهج */
        }

        .img-box { width: 100%; height: 200px; border-radius: 8px; overflow: hidden; background: #111; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .product-img { transform: scale(1.1); } /* زوم إضافي للصورة داخل الصندوق */
        
        .color-dots { display: flex; justify-content: center; gap: 8px; margin: 12px 0; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #fff; cursor: pointer; transition: 0.2s; }
        .dot:hover { transform: scale(1.3); border-color: var(--gold); }

        .model-name { font-size: 0.9rem; font-weight: bold; margin: 5px 0; color: #fff; }
        .packing-info { font-size: 0.8rem; color: var(--gold); margin-bottom: 10px; }

        .qty-control { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; background: #000; padding: 5px; border-radius: 6px; border: 1px solid #333; }
        .btn-q { background: #222; color: #fff; border: none; width: 32px; height: 32px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .btn-q:hover { background: var(--gold); color: #000; }
        .q-val { font-weight: bold; color: var(--gold); min-width: 30px; font-size: 1.2rem; }

        .btn-add { 
            background: linear-gradient(to bottom, #e2c06d, #8a6d3b); 
            color: #000; padding: 12px; border-radius: 8px; 
            font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 1rem;
        }
        .btn-add:hover { filter: brightness(1.2); }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; z-index: 1000; display: none; backdrop-filter: blur(5px); }

        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 320px; } }
    </style>
</head>
