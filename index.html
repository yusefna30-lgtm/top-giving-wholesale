<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 120px; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 15px; background: #222; cursor: pointer; border-radius: 5px; color: #aaa; transition: 0.3s; }
        .tab.active { background: #bfa030; color: #000; font-weight: bold; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        /* تصميم الكرت مع الهالة والزوم */
        .card { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 280px; margin: 10px auto; transition: 0.4s; }
        .card:hover { border-color: #bfa030; box-shadow: 0 0 20px rgba(191,160,48,0.5); }
        .img-box { position: relative; height: 300px; overflow: hidden; border-radius: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .img-box:hover .product-img { transform: scale(1.1); }
        
        .qty-box { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; }
        .btn-qty { background: #333; border: none; color: #fff; width: 40px; height: 40px; border-radius: 5px; cursor: pointer; font-size: 20px; }
        .qty-val { font-size: 20px; font-weight: bold; min-width: 50px; color: #bfa030; }
        
        .btn-add { background: #bfa030; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #333; display: flex; justify-content: center; gap: 10px; z-index: 10; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <div class="tab active" onclick="go('tshirt-page', this)">التيشيرتات</div>
    <div class="tab" onclick="go('set-page', this)">الأطقم</div>
    <div class="tab" onclick="go('short-page', this)">شورتات/بناطيل</div>
</div>

<div id="tshirt-page" class="page active">
    <div class="card">
        <div class="img-box"><img src="smile-white.png" class="product-img"></div>
        <h3>تيشيرت SMILE</h3>
        <p style="color:#bfa030">موديل: 08047</p>
        <div class="qty-box" data-step="16">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">16</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('تيشيرت SMILE - 08047', this)">إضافة للطلب</button>
    </div>
</div>

<div id="set-page" class="page"></div>

<div id="short-page" class="page">
    <div class="card">
        <div class="img-box"><img src="short.png" class="product-img"></div>
        <h3>شورت رياضي</h3>
        <p style="color:#bfa030">موديل: S-01</p>
        <div class="qty-box" data-step="12">
            <button class="btn-qty" onclick="changeQty(this, 1)">+</button>
            <span class="qty-val">12</span>
            <button class="btn-qty" onclick="changeQty(this, -1)">-</button>
        </div>
        <button class="btn-add" onclick="addToCart('شورت رياضي - S-01', this)">إضافة للطلب</button>
    </div>
</div>

<div class="cart-bar">
    <button class="btn-add" style="width:auto;" onclick="sendOrder()">إرسال الطلب 📲</button>
    <button class="btn-add" style="width:auto; background:#444;" onclick="clearCart()">تفريغ السلة 🗑️</button>
</div>

<script>
    let cart = {};
    function go(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    function changeQty(btn, dir) {
        let parent = btn.parentElement;
        let step = parseInt(parent.getAttribute('data-step'));
        let span = parent.querySelector('.qty-val');
        let newVal = parseInt(span.innerText) + (dir * step);
        if(newVal >= step) span.innerText = newVal;
    }
    function addToCart(item, btn) {
        let qty = btn.parentElement.querySelector('.qty-val').innerText;
        cart[item] = qty;
        alert("تمت إضافة: " + item + " - الكمية: " + qty);
    }
    function clearCart() { cart = {}; alert("تم تفريغ السلة"); }
    function sendOrder() {
        if(Object.keys(cart).length === 0) { alert("السلة فارغة!"); return; }
        let msg = "طلب جملة:\n";
        for(let item in cart) { msg += item + ": " + cart[item] + " قطعة\n"; }
        window.open('https://wa.me/966560564719?text=' + encodeURIComponent(msg));
    }
</script>
</body>
</html>
