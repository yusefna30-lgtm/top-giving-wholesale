<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; }
        /* هنا جعلنا الخلفية شفافة تماماً للصور */
        .img-box { position: relative; height: 250px; background: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .qty-control { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 15px 0; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: var(--gold); color: #000; padding: 12px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-weight: 900; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); padding: 15px; text-align: center; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="header">
        <img src="TOP%20GIVING%20logo.jpg" style="max-height:100px;">
    </div>

    <div class="grid" id="product-grid"></div>

    <div class="cart-bar" id="cart-bar">
        <button class="btn-add" style="width: 250px;" onclick="sendOrder()">إرسال الطلب للواتساب 📦</button>
    </div>

    <script>
        // --- قائمة المنتجات (يمكنك إضافة أي منتج هنا) ---
        const products = [
            { id: 'qt01', name: 'تيشيرت سمايل', min: 16, img: 'smile-beige.png' },
            { id: 'qt02', name: 'طقم بحري', min: 12, img: 'sea2-brown.png' }
        ];

        const grid = document.getElementById('product-grid');
        
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <div class="img-box"><img src="${p.img}" class="product-img"></div>
                    <h3>${p.name}</h3>
                    <div class="qty-control">
                        <button class="btn-q" onclick="changeQty('${p.id}', ${p.min}, ${p.min})">+</button>
                        <span id="${p.id}" style="font-weight:bold; font-size:1.2rem;">${p.min}</span>
                        <button class="btn-q" onclick="changeQty('${p.id}', ${p.min}, -${p.min})">-</button>
                    </div>
                    <button class="btn-add" onclick="addToCart('${p.name}', '${p.id}')">إضافة للطلب</button>
                </div>
            `;
        });

        function changeQty(id, min, val) {
            let el = document.getElementById(id);
            let n = parseInt(el.innerText) + val;
            if (n >= min) el.innerText = n;
        }

        let myCart = [];
        function addToCart(name, id) {
            myCart.push({name: name, qty: document.getElementById(id).innerText});
            document.getElementById('cart-bar').style.display = 'block';
            alert("تمت الإضافة للطلب");
        }

        function sendOrder() {
            let msg = "📦 طلب جديد من متجر TOP GIVING:%0A%0A";
            myCart.forEach(i => msg += "• " + i.name + ": " + i.qty + "%0A");
            window.open("https://wa.me/966560564719?text=" + msg);
        }
    </script>
</body>
</html>
