    <style>
        :root { --gold: #D4AF37; --gold-bright: #FFD700; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 130px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 100px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; position: relative; }
        .card.show { display: flex; }
        
        /* تصميم الإطار مع تأثير الانتقال الهادئ */
        .slider-container { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 15px; background: #fff; border-radius: 12px; overflow: hidden; height: 180px; position: relative; transition: all 0.3s ease-in-out; border: 1px solid transparent; }
        
        /* زيادة قوة سطوع الهالة الذهبية على الحواف عند تمرير الماوس */
        .card:hover .slider-container { 
            border-color: var(--gold-bright);
            box-shadow: 0 0 12px 3px var(--gold), 0 0 25px 6px rgba(212, 175, 55, 0.5);
        }
        .card:hover .product-img { 
            transform: scale(1.15); 
        }

        .arrow-btn { background: rgba(0, 0, 0, 0.5); color: var(--gold); border: none; font-size: 1.8rem; width: 35px; height: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; transition: 0.2s; font-weight: bold; position: absolute; top: 0; }
        .arrow-btn.prev { left: 0; }
        .arrow-btn.next { right: 0; }
        .arrow-btn:hover { background: rgba(0, 0, 0, 0.7); color: var(--gold-bright); }
        
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        .model-name { font-size: 1rem; font-weight: 700; margin-bottom: 12px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-clear { background: #333; color: #fff; border: 1px solid #555; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; }
    </style>
</head>

    <script>
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { c.classList.remove('show'); if(c.classList.contains(cat)) c.classList.add('show'); });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }

        function updateSlider(card) {
            let images = JSON.parse(card.getAttribute('data-images'));
            let index = parseInt(card.getAttribute('data-index'));
            card.querySelector('.product-img').src = images[index];
        }

        function nextImg(btn) {
            let card = btn.closest('.card');
            let images = JSON.parse(card.getAttribute('data-images'));
            let index = parseInt(card.getAttribute('data-index'));
            index = (index + 1) % images.length;
            card.setAttribute('data-index', index);
            updateSlider(card);
        }

        function prevImg(btn) {
            let card = btn.closest('.card');
            let images = JSON.parse(card.getAttribute('data-images'));
            let index = parseInt(card.getAttribute('data-index'));
            index = (index - 1 + images.length) % images.length;
            card.setAttribute('data-index', index);
            updateSlider(card);
        }
        
        function c(id, val) { 
            let el = document.getElementById(id); 
            if(!el) return; 
            let curr = parseInt(el.innerText); 
            let min = (id.includes('qsh')) ? 20 : (id.includes('qsea') ? 12 : 16); 
            if (curr + val >= min) el.innerText = curr + val; 
        }
        
        let order = [];
        function add(name, qtyId, btn) { 
            let qty = parseInt(document.getElementById(qtyId).innerText); 
            let card = btn.closest('.card');
            let images = JSON.parse(card.getAttribute('data-images'));
            let index = parseInt(card.getAttribute('data-index'));
            let currentImage = images[index];

            order.push({ name: name, qty: qty, imgFile: currentImage }); 
            document.getElementById('cart-bar').style.display = 'block'; 
            updateTotal(); 
            btn.innerText = "تمت ✅"; 
            setTimeout(() => btn.innerText = btn.id === "it01" ? "إضافة للطلب" : "إضافة", 1500); 
        }
        
        function updateTotal() { 
            let total = order.reduce((sum, i) => sum + i.qty, 0); 
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`; 
        }
        
        function clearCart() { 
            order = []; 
            document.getElementById('cart-bar').style.display = 'none'; 
            document.getElementById('cart-info').innerText = `الإجمالي: 0 حبة`;
        }
        
        function send() { 
            if(order.length === 0) return; 
            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n"; 
            order.forEach(i => { 
                msg += `• *${i.name}* (الصورة: ${i.imgFile}): ${i.qty} حبة\n`; 
            }); 
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank'); 
        }
    </script>
