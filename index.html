<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --beige: #f5f5dc; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; }
        
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 100px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; position: relative; }
        .card.show { display: flex; }
        
        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; }

        /* زر التكبير النظيف والموقع المناسب */
        .zoom-icon { position: absolute; bottom: 8px; left: 8px; cursor: pointer; z-index: 10; font-size: 1.2rem; opacity: 0.7; transition: 0.3s; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5)); }
        .zoom-icon:hover { opacity: 1; transform: scale(1.1); }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; height: 30px; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 5px var(--gold); }
        
        .model-name { font-size: 1rem; font-weight: 700; margin-bottom: 12px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; transition: 0.3s; }

        /* نافذة المعاينة الموزونة */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        #imgFull { max-width: 80%; max-height: 60%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); object-fit: contain; background: #fff; }

        /* حقول بيانات العميل */
        .customer-inputs { display: none; background: #111; padding: 15px; border-top: 1px solid var(--accent); position: fixed; bottom: 85px; left: 0; right: 0; z-index: 999; }
        .input-group { max-width: 1200px; margin: 0 auto; display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; outline: none; }

        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-clear { background: #333; color: #fff; border: 1px solid #555; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; }
        /* كود زر العودة للأعلى */
.back-to-top {
    position: fixed;
    bottom: 150px;
    right: 20px;
    background: #D4AF37;
    color: #000;
    width: 45px;
    height: 45px;

    cursor: pointer;
    z-index: 998;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: 0.3s;
}
    </style>
</head>

    <script>
        let order = [];
        function initApp() {
            const saved = localStorage.getItem('topGivingOrder');
            if(saved) {
                order = JSON.parse(saved);
                if(order.length > 0) {
                    document.getElementById('cart-bar').style.display = 'block';
                    document.getElementById('customer-data').style.display = 'block';
                    updateTotal();
                }
            }
            filterProducts('tshirt');
        }
        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { 
                c.classList.remove('show'); 
                if(c.classList.contains(cat)) c.classList.add('show'); 
            });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function v(id, path, el) { 
            let img = document.getElementById(id); 
            if(img) img.src = path; 
            let dots = el.parentElement.querySelectorAll('.dot'); 
            dots.forEach(d => d.classList.remove('active')); 
            el.classList.add('active'); 
        }
        function openZoom(imgId) {
            document.getElementById("imgFull").src = document.getElementById(imgId).src;
            document.getElementById("imageModal").style.display = "flex";
        }
        function c(id, val) { 
            let el = document.getElementById(id); 
            let curr = parseInt(el.innerText); 
            let min = (id.includes('qsh')) ? 20 : (id.includes('qsea') ? 12 : 16); 
            if (curr + val >= min) el.innerText = curr + val; 
        }
        function add(name, qtyId, btn) { 
            let qty = parseInt(document.getElementById(qtyId).innerText); 
            order.push({ name: name, qty: qty }); 
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('customer-data').style.display = 'block';
            updateTotal();
            localStorage.setItem('topGivingOrder', JSON.stringify(order));
            btn.innerText = "تمت ✅"; 
            setTimeout(() => btn.innerText = "إضافة", 1500); 
        }
        function updateTotal() { 
            let total = order.reduce((sum, i) => sum + i.qty, 0); 
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`; 
        }
        function clearCart() { 
            if(confirm("تصفير السلة؟")) { order = []; localStorage.removeItem('topGivingOrder'); document.getElementById('cart-bar').style.display = 'none'; document.getElementById('customer-data').style.display = 'none'; }
        }
        function send() { 
            let n = document.getElementById('cust-name').value.trim();
            let c = document.getElementById('cust-city').value.trim();
            if(!n || !c) { alert("أدخل الاسم والمدينة لإكمال الطلب"); return; }
            let msg = `📦 *طلب جديد من TOP GIVING*\n👤 العميل: ${n}\n📍 المدينة: ${c}\n----------\n`;
            order.forEach(i => { msg += `• *${i.name}*: ${i.qty} حبة\n`; }); 
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank'); 
        }
        // دالة إظهار الزر عند التمرير وإخفائه عند الصعود
window.onscroll = function() {
    let btn = document.getElementById("btnTop");
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btn.style.display = "flex";
    } else {
        btn.style.display = "none";
    }
};

// دالة الصعود للأعلى بنعومة
function scrollToTop() {
    window.scrollTo({ top: 0, behavior: "smooth" });
}
    </script>
<div id="btnTop" class="back-to-top" onclick="scrollToTop()">⬆️</div>
