<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .img-box { width: 100%; height: 200px; object-fit: cover; }
        .color-dot { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin: 5px; border: 1px solid #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid" id="catalog"></div>

    <script>
        fetch('products.json')
            .then(res => res.json())
            .then(data => {
                const catalog = document.getElementById('catalog');
                catalog.innerHTML = data.map(p => `
                    <div class="card">
                        <img src="${p.img}" class="img-box" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <div>${p.colors.map(c => `<span class="color-dot" style="background:${c}"></span>`).join('')}</div>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
