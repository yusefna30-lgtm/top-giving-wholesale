<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- 1. المتغيرات والألوان الأساسية --- */
        :root { 
            --gold: #D4AF37; 
            --black: #000; 
            --card-bg: #0c0c0e; 
            --accent: #1a1a1a; 
            --white: #ffffff;
        }

        /* --- 2. تنسيق الصفحة العام --- */
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--black); 
            color: var(--white); 
            text-align: center; 
            margin: 0; 
            padding-bottom: 160px; /* مساحة بالأسفل لعدم تغطية المنتجات بشريط السلة */
        }

        .brand { 
            font-size: 2.2rem; 
            color: var(--gold); 
            margin: 25px 0; 
            font-weight: 900; 
            letter-spacing: 3px; 
        }

        .section-header { 
            margin: 40px 0 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .section-header::before, .section-header::after { 
            content: ""; height: 2px; width: 40px; background: var(--gold); margin: 0 15px; border-radius: 2px; 
        }
        .section-title { color: var(--gold); font-size: 1.2rem; font-weight: 700; }

        /* --- 3. شبكة العرض والبطاقات --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* شاشات الجوال */
            gap: 12px; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 10px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid var(--accent); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            min-height: 430px; 
        }

        /* --- 4. إصلاح حجم الصور المتناسق والتوهج --- */
        .img-box { 
            width: 100%; 
            height: 180px; /* تحديد الطول لمنع تضخم الصندوق */
            border-radius: 12px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .product-img { 
            max-width: 75%;  /* تصغير حجم الصورة الفعلي داخل المربع */
            max-height: 75%; /* الحفاظ على أبعاد الصورة صغيرة ومنسقة */
            object-fit: contain; 
            transition: transform 0.4s ease, filter 0.4s ease; /* تنعيم الحركة والتوهج */
        }

        /* التوهج والزوم عند تمرير الماوس فوق الكرت */
        .card:hover .product-img {
            transform: scale(1.1); /* زوم خفيف ومريح للعين */
            filter: drop-shadow(0 0 12px rgba(214, 175, 55, 0.6)); /* توهج ذهبي متناسق ومحدد حول الصورة */
        }

        /* --- 5. دوائر التحكم بالألوان --- */
        .color-dots { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 10px; 
            height: 35px; 
            align-items: center; 
        }
        .dot { 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            border: 2px solid #333; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .dot.active { 
            border-color: var(--gold); 
            transform: scale(1.15); 
            box-shadow: 0 0 8px var(--gold); /* توهج ذهبي ناعم حول الدائرة النشطة فقط */
        }

        .model-name { font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; }

        /* --- 6. أزرار التحكم بالكمية للجملة --- */
        .qty-control { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 12px; 
            background: #151515; 
            padding: 8px; 
            border-radius: 10px; 
        }
        .btn-q { 
            background: #252525; 
            color: #fff; 
            border: none; 
            width: 32px; 
            height: 32px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold;
        }
        .btn-q:active { background: #353535; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 32px; font-size: 1.1rem; }

        /* --- 7. أزرار الطلب والسلة --- */
        .btn-add { 
            background: linear-gradient(135deg, #D4AF37, #8A6D3B); 
            color: #000; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 900; 
            border: none; 
            width: 100%; 
            cursor: pointer; 
            font-family: 'Cairo', sans-serif;
        }

        .cart-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(10, 10, 10, 0.95); 
            border-top: 2px solid var(--gold); 
            padding: 15px; 
            display: none; 
            z-index: 1000; 
        }

        /* --- 8. الشاشات الكبيرة (الكمبيوتر) --- */
        @media (min-width: 992px) { 
            .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } 
            .img-box { height: 220px; } 
        }
    </style>
</head>

    <!-- --- 9. العمليات البرمجية JavaScript --- -->
    <script>
        let cart = {}; 
        let selColors = {};

        // تعيين الألوان الافتراضية عند تحميل الصفحة للمرة الأولى
        function initDefaults() { 
            selColors['01']='أبيض'; 
            selColors['02']='بنفسجي'; 
            selColors['03']='بيج'; 
            selColors['04']='أحمر'; 
            selColors['05']='أبيض'; 
            selColors['sm']='أسود'; 
        }

        // دالة تحديث الصورة واللون عند الضغط على الدوائر الملونة
        function upd(id, src, c, el) {
            let img = document.getElementById('img-' + id);
            if(img) img.src = src;
            
            // إزالة كلاس active عن باقي الدوائر في نفس الكرت لإيقاف التوهج عنها
            el.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            // إضافة التوهج للدائرة التي تم الضغط عليها حالياً
            el.classList.add('active'); 
            selColors[id] = c;
        }

        // دالة التحكم بالكمية بمضاعفات 16 (نظام الشد للجملة)
        function chg(id, v) {
            let q = document.getElementById(id); 
            let res = parseInt(q.innerText) + v;
            
            // منع نقص الكمية عن الشد الأدنى وهو 16 حبة
            if(res < 16) res = 16; 
            q.innerText = res;
        }

        // دالة إضافة المنتجات إلى سلة المشتريات
        function buy(id, name, qId) {
            let color = selColors[id] || "أساسي";
            let qty = document.getElementById(qId).innerText;
            
            // تخزين المنتج في مصفوفة السلة برقم الموديل واللون لمنع التداخل
            cart[id + '_' + color] = { name: name, color: color, qty: qty };
            
            // إظهار شريط السلة السفلي عند إضافة أول منتج
            document.getElementById('cart-bar').style.display = 'block';
            
            // تنبيه سريع للمستخدم بنجاح العملية
            alert(`تمت إضافة ${name} باللون (${color}) كمية ${qty} حبة بنجاح!`);
        }

        // دالة تجميع الطلب وإرساله منسقاً عبر الواتساب
        function sendWA() {
            let lines = []; 
            for (let k in cart) { 
                lines.push(`• ${cart[k].name} (${cart[k].color}) x${cart[k].qty}`); 
            }
            window.location.href = "https://wa.me/966560564719?text=" + encodeURIComponent("طلب جملة جديد:\n" + lines.join("\n"));
        }
    </script>
