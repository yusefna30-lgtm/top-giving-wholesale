<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --beige: #f5f5dc; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; }
        
        /* الهيدر */
        .header { padding: 20px 10px; background: #000; border-bottom: 1px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { max-height: 100px; width: auto; display: block; margin: 0 auto 15px; filter: drop-shadow(0 0 5px var(--gold)); }
        
        /* التبويبات */
        .nav-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        
        /* الشبكة والبطاقات */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); flex-direction: column; align-items: center; position: relative; transition: transform 0.3s; }
        .card.show { display: flex; }
        .card:active { transform: scale(0.98); }

        /* زر التكبير */
        .zoom-icon { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 1.2rem; }

        .img-box { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; background: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; cursor: zoom-in; }
        
        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; height: 30px; align-items: center; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 5px var(--gold); }
        
        .model-name { font-size: 1rem; font-weight: 700; margin-bottom: 12px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #1a1a1a; padding: 8px; border-radius: 10px; width: 100%; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; transition: 0.3s; }

        /* نافذة التكبير */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal img { max-width: 90%; max-height: 80%; border: 2px solid var(--gold); border-radius: 15px; }

        /* حقول بيانات العميل */
        .customer-inputs { display: none; background: #111; padding: 15px; border-top: 1px solid var(--accent); position: fixed; bottom: 85px; left: 0; right: 0; z-index: 999; }
        .input-group { max-width: 1200px; margin: 0 auto; display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo'; outline: none; }
        .input-group input:focus { border-color: var(--gold); }

        /* شريط السلة */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1001; }
        .cart-flex { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-clear { background: #333; color: #fff; border: 1px solid #555; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <img src="TOP GIVING logo.jpg" alt="TOP GIVING" class="brand-logo">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="filterProducts('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="filterProducts('set')">أطقم صيفية</div>
            <div class="tab" id="tab-pants" onclick="filterProducts('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid" id="main-grid">
        <div class="card tshirt show">
            <span class="zoom-icon" onclick="openZoom('it01')">🔍</span>
            <div class="img-box"><img src="n5-back.png.png" id="it01" class="product-img" onclick="openZoom('it01')"></div>
            <div class="color-dots">
                <div class="dot active" style="background:var(--beige);" onclick="v('it01','n5-back.png.png',this)"></div>
                <div class="dot" style="background:purple" onclick="v('it01','n5-purple.png.png',this)"></div>
                <div class="dot" style="background:#fff; border:1px solid #ccc" onclick="v('it01','n5-white.png.png',this)"></div>
                <div class="dot" style="background:black;" onclick="v('it01','n5-black.png.png',this)"></div>
            </div>
            <div class="model-name">تيشيرت 01</div>
            <div class="qty-control">
                <button class="btn-q" onclick="c('qt01',16)">+</button>
                <span id="qt01">16</span>
                <button class="btn-q" onclick="c('qt01',-16)">-</button>
            </div>
            <button class="btn-add" onclick="add('تيشيرت 01','qt01',this)">إضافة للطلب</button>
        </div>

        <div class="card set">
            <span class="zoom-icon" onclick="openZoom('is01')">🔍</span>
            <div class="img-box"><img src="s1-white.png.png" id="is01" class="product-img" onclick="openZoom('is01')"></div>
            <div class="color-dots">
                <div class="dot active" style="background:#fff;" onclick="v('is01','s1-white.png.png',this)"></div>
                <div class="dot" style="background:gray" onclick="v('is01','s1-grey.png.png',this)"></div>
            </div>
            <div class="model-name">طقم 01</div>
            <div class="qty-control"><button class="btn-q" onclick="c('qs01',12)">+</button><span id="qs01">12</span><button class="btn-q" onclick="c('qs01',-12)">-</button></div>
            <button class="btn-add" onclick="add('طقم 01','qs01',this)">إضافة</button>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <span style="position:absolute; top:20px; right:30px; color:#fff; font-size:40px; cursor:pointer;">&times;</span>
        <img id="imgFull" src="">
    </div>

    <div id="customer-data" class="customer-inputs">
        <div class="input-group">
            <input type="text" id="cust-name" placeholder="اسمك الكريم">
            <input type="text" id="cust-city" placeholder="المدينة">
        </div>
    </div>

    <div class="cart-bar" id="cart-bar">
        <div class="cart-flex">
            <div id="cart-info" style="color:var(--gold); font-weight:bold;">الإجمالي: 0 حبة</div>
            <div style="display:flex; gap:10px;">
                <button class="btn-clear" onclick="clearCart()">تصفير 🗑️</button>
                <button class="btn-add" style="width:auto; padding:8px 20px;" onclick="send()">إرسال ✅</button>
            </div>
        </div>
    </div>

    <script>
        let order = [];

        function initApp() {
            // استرجاع السلة المحفوظة عند فتح الصفحة
            const savedOrder = localStorage.getItem('topGivingOrder');
            if (savedOrder) {
                order = JSON.parse(savedOrder);
                if (order.length > 0) {
                    document.getElementById('cart-bar').style.display = 'block';
                    document.getElementById('customer-data').style.display = 'block';
                    updateTotal();
                }
            }
            filterProducts('tshirt');
        }

        function filterProducts(cat) {
            document.querySelectorAll('.card').forEach(c => { 
                c.classList.remove('show'); 
                if(c.classList.contains(cat)) c.classList.add('show'); 
            });
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }

        function v(id, path, el) { 
            let img = document.getElementById(id); 
            if(img) img.src = path; 
            let dots = el.parentElement.querySelectorAll('.dot'); 
            dots.forEach(d => d.classList.remove('active')); 
            el.classList.add('active'); 
        }

        function openZoom(imgId) {
            document.getElementById("imgFull").src = document.getElementById(imgId).src;
            document.getElementById("imageModal").style.display = "flex";
        }

        function c(id, val) { 
            let el = document.getElementById(id); 
            let curr = parseInt(el.innerText); 
            let min = (id.includes('qsh')) ? 20 : (id.includes('qs') ? 12 : 16); 
            if (curr + val >= min) el.innerText = curr + val; 
        }
        
        function add(name, qtyId, btn) { 
            let qty = parseInt(document.getElementById(qtyId).innerText); 
            order.push({ name: name, qty: qty }); 
            
            // تحديث الواجهة
            document.getElementById('cart-bar').style.display = 'block';
            document.getElementById('customer-data').style.display = 'block';
            
            updateTotal();
            localStorage.setItem('topGivingOrder', JSON.stringify(order));

            // تأثير بصري
            btn.innerText = "تمت ✅"; 
            btn.style.background = "#28a745";
            setTimeout(() => { 
                btn.innerText = "إضافة"; 
                btn.style.background = "linear-gradient(135deg, #D4AF37, #8A6D3B)";
            }, 1500); 
        }

        function updateTotal() { 
            let total = order.reduce((sum, i) => sum + i.qty, 0); 
            document.getElementById('cart-info').innerText = `الإجمالي: ${total} حبة`; 
        }

        function clearCart() { 
            if(confirm("هل تريد تصفير السلة؟")) {
                order = []; 
                localStorage.removeItem('topGivingOrder');
                document.getElementById('cart-bar').style.display = 'none'; 
                document.getElementById('customer-data').style.display = 'none';
            }
        }

        function send() { 
            let name = document.getElementById('cust-name').value.trim();
            let city = document.getElementById('cust-city').value.trim();

            if(!name || !city) {
                alert("الرجاء كتابة الاسم والمدينة لتجهيز الطلب");
                return;
            }

            if(order.length === 0) return; 

            let msg = "📦 *طلب جديد من TOP GIVING* 📦\n\n";
            msg += `👤 *العميل:* ${name}\n`;
            msg += `📍 *المدينة:* ${city}\n`;
            msg += `--------------------------\n`;
            
            order.forEach((i, idx) => { 
                msg += `${idx + 1}- *${i.name}*: ${i.qty} حبة\n`; 
            }); 
            
            window.open(`https://wa.me/966560564719?text=${encodeURIComponent(msg)}`, '_blank'); 
        }
    </script>
</body>
</html>
