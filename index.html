<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TOP GIVING | متجر الأقسام</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #000; color: #fff; text-align: center; }
        .tabs { margin: 20px; }
        .tab-btn { background: #333; color: #fff; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: #D4AF37; color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .product-img { width: 100%; height: 150px; object-fit: contain; }
    </style>
</head>
<body>

    <div id="tabs" class="tabs"></div>
    <div class="grid" id="catalog"></div>

    <script>
        let allProducts = [];

        fetch('products.json')
            .then(response => response.json())
            .then(data => {
                allProducts = data;
                renderTabs();
                renderCatalog('الكل');
            });

        function renderTabs() {
            const categories = ['الكل', ...new Set(allProducts.map(p => p.cat))];
            const tabsContainer = document.getElementById('tabs');
            categories.forEach(cat => {
                tabsContainer.innerHTML += `<button class="tab-btn" onclick="filter(this, '${cat}')">${cat}</button>`;
            });
        }

        function renderCatalog(cat) {
            const grid = document.getElementById('catalog');
            grid.innerHTML = '';
            const filtered = (cat === 'الكل') ? allProducts : allProducts.filter(p => p.cat === cat);
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" class="product-img">
                        <p>${p.name}</p>
                    </div>
                `;
            });
        }

        function filter(btn, cat) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCatalog(cat);
        }
    </script>
</body>
</html>
