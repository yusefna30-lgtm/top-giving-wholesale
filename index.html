<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | Wholesale</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; --gray: #888; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 180px; }
        
        .brand { font-size: 2.5rem; color: var(--gold); margin: 30px 0 10px; font-weight: 900; letter-spacing: 3px; }
        .tagline { color: var(--gray); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; }

        /* نظام الأقسام المصلح */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding: 10px; position: sticky; top: 0; background: var(--black); z-index: 100; }
        .tab-btn { background: var(--accent); color: #fff; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .section-content { display: none; }
        .section-content.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); display: flex; flex-direction: column; transition: 0.3s; }
        
        /* تعديلات الصورة: الإطار، الزوم، والتوهج */
        .img-box { 
            width: 100%; 
            height: 220px; /* زيادة الطول قليلاً */
            border-radius: 12px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            border: 2px solid transparent;
            transition: 0.4s;
        }
        .product-img { 
            max-width: 85%; /* تكبير الصورة داخل المربع */
            max-height: 85%; 
            object-fit: contain; 
            transition: 0.5s ease; /* سرعة الزوم */
        }
        /* تأثير عند التمرير على الكرت */
        .card:hover .product-img { 
            transform: scale(1.15); /* زوم للصورة */
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6)); /* توهج ذهبي للصورة نفسها */
        }
        .card:hover .img-box {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .color-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #333; cursor: pointer; }
        .dot.active { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

        .model-name { font-weight: 700; margin-bottom: 10px; font-size: 1.1rem; color: #eee; }
        
        /* الأزرار (إصلاح العمل) */
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #151515; padding: 8px; border-radius: 12px; border: 1px solid #333; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .btn-q:active { background: var(--gold); color: #000; }
        .q-val { color: var(--gold); font-weight: 900; min-width: 35px; font-size: 1.1rem; }

        .btn-add { background: linear-gradient(135deg, #D4AF37, #8A6D3B); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; cursor: pointer; }

        /* سلة الطلبات */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.95); border-top: 2px solid var(--gold); padding: 15px; display: none; z-index: 1000; }
        .cart-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        @media (min-width: 992px) { .grid { grid-template-columns: repeat(4, 1fr); } .img-box { height: 280px; } }
    </style>
</head>
<body>

    <div class="brand">TOP GIVING</div>
    <div class="tagline">WHOLESALE - الشد المشكل الأصلي</div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="openSection('tshirts', this)">التيشيرتات</button>
        <button class="tab-btn" onclick="openSection('sets', this)">الأطقم</button>
        <button class="tab-btn" onclick="openSection('pants', this)">البنطلون والشورت</button>
        <button class="tab-btn" onclick="openSection('shirts', this)">القمصان</button>
    </div>

    <div id="tshirts" class="section-content active">
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="t1-white.png" id="img-01" class="product-img"></div>
                <div class="color-dots">
                    <div class="dot active" style="background: #fff;" onclick="view('01','t1-white.png',this)"></div>
                    <div class="dot" style="background: blue;" onclick="view('01','t1-blue.png',this)"></div>
                    <div class="dot" style="background: gold;" onclick="view('01','t1-yellow.png',this)"></div>
                    <div class="dot" style="background: #000;" onclick="view('01','t1-black.png',this)"></div>
                </div>
                <div class="model-name">تيشيرت موديل 01</div>
                <div class="qty-control">
                    <button class="btn-q" onclick="chg('q01',-16)">-</button>
                    <span id="q01" class="q-val">16</span>
                    <button class="btn-q" onclick="chg('q01',16)">+</button>
                </div>
                <button class="btn-add" onclick="add('تيشيرت موديل 01', 'q01')">إضافة الشد المشكل</button>
            </div>
            </div>
    </div>

    <div class="cart-bar" id="cartBar">
        <div class="cart-container">
            <div id="cartSummary">إجمالي: 0 قطعة</div>
            <button class="btn-add" style="width: auto; padding: 10px 20px;" onclick="send()">طلب عبر واتساب</button>
        </div>
    </div>

    <script>
        let cart = [];
        
        // إصلاح عمل الأقسام
        function openSection(id, btn) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // إصلاح عمل أزرار الكميات
        function chg(id, val) {
            let el = document.getElementById(id);
            let current = parseInt(el.innerText);
            if (current + val >= 16) {
                el.innerText = current + val;
            }
        }

        // معاينة اللون
        function view(id, img, dot) {
            document.getElementById('img-' + id).src = img;
            dot.parentElement.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
        }

        // إضافة للسلة
        function add(name, qtyId) {
            let q = parseInt(document.getElementById(qtyId).innerText);
            let item = cart.find(i => i.name === name);
            if (item) item.qty += q; else cart.push({ name: name, qty: q });
            
            let total = cart.reduce((s, i) => s + i.qty, 0);
            document.getElementById('cartBar').style.display = 'block';
            document.getElementById('cartSummary').innerText = `إجمالي: ${total} قطعة (${total/16} شد)`;
        }

        function send() {
            let msg = "طلب جملة:\n" + cart.map(i => `${i.name}: ${i.qty} قطعة`).join('\n');
            window.open(`https://wa.me/966XXXXXXXXX?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
