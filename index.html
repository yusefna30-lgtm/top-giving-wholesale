<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; margin: 0; padding-bottom: 100px; }
        .header { padding: 20px; border-bottom: 1px solid var(--accent); text-align: center; }
        
        /* الأقسام */
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; padding: 0 10px; }
        .tab-btn { background: #1a1a1a; color: #fff; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active, .tab-btn:hover { background: var(--gold); color: #000; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        .card { display: none; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); }
        .card.show { display: block; }
        
        .img-box { position: relative; width: 100%; height: 250px; border-radius: 12px; overflow: hidden; background: #fff; border: 2px solid #222; transition: 0.4s; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .img-box:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .product-img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.5s ease; }
        .img-box:hover .product-img { transform: scale(1.1); }
        
        .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: var(--gold); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--gold); z-index: 10; }
        .arrow-right { right: 10px; } .arrow-left { left: 10px; }
        
        .product-info { margin: 15px 0; text-align: center; }
        .category-name { font-size: 1.2rem; font-weight: bold; }
        .model-number { font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 15px; background: #1a1a1a; padding: 10px; border-radius: 10px; }
        .btn-q { background: #252525; color: #fff; border: 1px solid var(--gold); width: 40px; height: 40px; border-radius: 8px; cursor: pointer; }
        .btn-add { background: var(--gold); color: #000; padding: 12px; border-radius: 10px; font-weight: 900; border: none; width: 100%; margin-top: 15px; cursor: pointer; }
        
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--gold); padding: 15px; display: none; text-align: center; z-index: 100; }
    </style>
</head>
<body>

    <div class="header"><h1>TOP GIVING</h1></div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="filterSelection('tshirt', this)">تيشيرت</button>
        <button class="tab-btn" onclick="filterSelection('pants', this)">بناطيل</button>
        <button class="tab-btn" onclick="filterSelection('shorts', this)">شورتات</button>
        <button class="tab-btn" onclick="filterSelection('sets', this)">أطقم</button>
        <button class="tab-btn" onclick="filterSelection('shirts', this)">قمصان</button>
    </div>

    <div class="grid">
        <div class="card tshirt show" data-pack="16">
            <div class="img-box">
                <div class="arrow arrow-right" onclick="changeImg('it01', 1)">&gt;</div>
                <img src="n5-back.png" id="it01" class="product-img" 
                     data-imgs="n5-back.png,n5-purple.png,n5-white.png,n5-black.png" data-index="0">
                <div class="arrow arrow-left" onclick="changeImg('it01', -1)">&lt;</div>
            </div>
            <div class="product-info">
                <div class="category-name">تيشيرت أساسي</div>
                <div class="model-number">موديل: N5-01</div>
            </div>
            <div class="qty-control">
                <button class="btn-q" onclick="updateQty('qt01', 16, 16)">+</button>
                <span id="qt01">16</span>
                <button class="btn-q" onclick="updateQty('qt01', 16, -16)">-</button>
            </div>
            <button class="btn-add" onclick="addToCart('تيشيرت N5-01', 'qt01')">إضافة للطلب</button>
        </div>
    </div>

    <div class="cart-bar" id="cart-bar">
        <button class="btn-add" style="width: 250px;" onclick="sendOrder()">إرسال الطلب للواتساب 📦</button>
    </div>

    <script>
        // فلترة الأقسام
        function filterSelection(c, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card').forEach(card => {
                card.classList.remove('show');
                if (card.classList.contains(c)) card.classList.add('show');
            });
        }

        // تغيير الصور
        function changeImg(id, step) {
            let img = document.getElementById(id);
            let imgs = img.getAttribute('data-imgs').split(',');
            let idx = parseInt(img.getAttribute('data-index')) + step;
            if (idx >= imgs.length) idx = 0; if (idx < 0) idx = imgs.length - 1;
            img.src = imgs[idx];
            img.setAttribute('data-index', idx);
        }

        // التحكم بالشد
        function updateQty(id, min, val) {
            let el = document.getElementById(id);
            let curr = parseInt(el.innerText);
            if (curr + val >= min) el.innerText = curr + val;
        }

        let cart = [];
        function addToCart(name, qtyId) {
            let qty = document.getElementById(qtyId).innerText;
            cart.push({name: name, qty: qty});
            document.getElementById('cart-bar').style.display = 'block';
            alert("تمت إضافة " + name + " (كمية: " + qty + ") للطلب");
        }

        function sendOrder() {
            let msg = "طلب جديد من المتجر:%0A";
            cart.forEach(item => { msg += "• " + item.name + " | الكمية: " + item.qty + "%0A"; });
            window.open("https://wa.me/966560564719?text=" + msg);
        }
    </script>
</body>
</html>
