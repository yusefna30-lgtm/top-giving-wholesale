<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP GIVING | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card-bg: #0c0c0e; --accent: #222; }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; text-align: center; margin: 0; padding-bottom: 100px; }
        .header { padding: 20px 10px; background: #000; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .tab { background: #111; color: #fff; padding: 10px 20px; border-radius: 25px; border: 1px solid var(--accent); cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1000px; margin: 0 auto; padding: 15px; }
        .card { display: none; background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid var(--accent); flex-direction: column; align-items: center; }
        .card.show { display: flex; }
        .img-box { width: 100%; height: 180px; position: relative; background: #fff; border-radius: 12px; margin-bottom: 12px; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }
        .zoom-icon { position: absolute; bottom: 8px; left: 8px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        .btn-add { background: var(--gold); color: #000; padding: 10px; border-radius: 8px; font-weight: 900; border: none; width: 100%; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal img { max-width: 90%; max-height: 80%; }
    </style>
</head>
<body onload="f('tshirt')">

    <div class="header">
        <div class="nav-tabs">
            <div class="tab active" id="tab-tshirt" onclick="f('tshirt')">تيشيرتات</div>
            <div class="tab" id="tab-set" onclick="f('set')">أطقم</div>
            <div class="tab" id="tab-pants" onclick="f('pants')">شورتات</div>
        </div>
    </div>

    <div class="grid">
        <div class="card tshirt show"><div class="img-box"><img src="n5-back.png.png" id="t1" class="product-img"><div class="zoom-icon" onclick="z('t1')">🔍</div></div><div>تيشيرت 01</div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="t1-white.png" id="t2" class="product-img"><div class="zoom-icon" onclick="z('t2')">🔍</div></div><div>تيشيرت 02</div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="t2-black.png.png" id="t3" class="product-img"><div class="zoom-icon" onclick="z('t3')">🔍</div></div><div>تيشيرت 03</div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="tr1-red.png.png" id="t4" class="product-img"><div class="zoom-icon" onclick="z('t4')">🔍</div></div><div>تيشيرت 04</div><button class="btn-add">إضافة</button></div>
        <div class="card tshirt show"><div class="img-box"><img src="te1-black.png.png" id="t5" class="product-img"><div class="zoom-icon" onclick="z('t5')">🔍</div></div><div>تيشيرت 05</div><button class="btn-add">إضافة</button></div>

        <div class="card set"><div class="img-box"><img src="s1-white.png.png" id="s1" class="product-img"><div class="zoom-icon" onclick="z('s1')">🔍</div></div><div>طقم 01</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s2-black.jpg" id="s2" class="product-img"><div class="zoom-icon" onclick="z('s2')">🔍</div></div><div>طقم 02</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s3-black.jpg" id="s3" class="product-img"><div class="zoom-icon" onclick="z('s3')">🔍</div></div><div>طقم 03</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s4-black.jpg" id="s4" class="product-img"><div class="zoom-icon" onclick="z('s4')">🔍</div></div><div>طقم 04</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="s5-black.jpg" id="s5" class="product-img"><div class="zoom-icon" onclick="z('s5')">🔍</div></div><div>طقم 05</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea-black.png" id="s6" class="product-img"><div class="zoom-icon" onclick="z('s6')">🔍</div></div><div>طقم Sea 01</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea1-off-withe.png" id="s7" class="product-img"><div class="zoom-icon" onclick="z('s7')">🔍</div></div><div>طقم Sea 02</div><button class="btn-add">إضافة</button></div>
        <div class="card set"><div class="img-box"><img src="sea2-brown.png" id="s8" class="product-img"><div class="zoom-icon" onclick="z('s8')">🔍</div></div><div>طقم Sea 03</div><button class="btn-add">إضافة</button></div>

        <div class="card pants"><div class="img-box"><img src="mps182-beige.png" id="p1" class="product-img"><div class="zoom-icon" onclick="z('p1')">🔍</div></div><div>شورت 182</div><button class="btn-add">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps185-grey.png" id="p2" class="product-img"><div class="zoom-icon" onclick="z('p2')">🔍</div></div><div>شورت 185</div><button class="btn-add">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps0033-heavenly.png" id="p3" class="product-img"><div class="zoom-icon" onclick="z('p3')">🔍</div></div><div>شورت 0033</div><button class="btn-add">إضافة</button></div>
        <div class="card pants"><div class="img-box"><img src="mps176-white.png" id="p4" class="product-img"><div class="zoom-icon" onclick="z('p4')">🔍</div></div><div>شورت 176</div><button class="btn-add">إضافة</button></div>
    </div>

    <div id="modal" class="modal" onclick="this.style.display='none'"><img id="imgFull"></div>

    <script>
        function f(cat) {
            document.querySelectorAll('.card').forEach(c => c.style.display = c.classList.contains(cat) ? 'flex' : 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + cat).classList.add('active');
        }
        function z(id) { document.getElementById('imgFull').src = document.getElementById(id).src; document.getElementById('modal').style.display = 'flex'; }
    </script>
</body>
</html>
